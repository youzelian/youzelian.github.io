 <body>

 <h1>用按钮显示不同事件
 </h1>

<P>点击下列按钮显示不同内容</p>


<button onclick="getElementById('demo').innerHTML=Date()">现在的时间是?</button>
<p id="demo"></p>

<hr style="height:4px">
<button onclick="showone();">藏头诗也藏尾</button>

<button onclick="showtwo();">还是藏头诗</button>


<div style="display:none" id="div1">
<p>想象翠华山空白，</p>
<p>看峰虚无危如丝。</p>
<p>黑云越岭雁去也，</p>
<p>丝丝乡愁人为行。</p>
</div>
<div style="display:none" id="div2">
<p>我最欣赏你这样有文采的人，</p>
<p>嫩嫩的外表下却有一肚子浓墨，</p>
<p>蝶恋花也不如你写的针不戳，</p>
<p>反正你我也不会有结果，</p>
<p>无法表达见不到你的失落，</p>
<p>效仿键侠客写首藏头诗咯？</p>
</div>


<script>

function showone(){
    document.getElementById("div1").style.display="block";
    document.getElementById("div2").style.display="none";
};
function showtwo()
{
   document.getElementById("div2").style.display="block";
   document.getElementById("div1").style.display="none";
}



</script>




<style>
h1 {text-align:center;
    color:#696969 
	}
p {color:#303030 

   }
div
{
    background-color:#b0c4de;
</style>








 </body>
