<h1>
凤求凰
</h1>
<p>
凤兮凤兮归故乡，遨游四海求其凰。
时未遇兮无所将，何悟今兮升斯堂！
有艳淑女在闺房，室迩人遐毒我肠。
何缘交颈为鸳鸯，胡颉颃兮共翱翔！
凰兮凰兮从我栖，得托孳尾永为妃。
交情通意心和谐，中夜相从知者谁？
双翼俱起翻高飞，无感我思使余悲。
</p>
