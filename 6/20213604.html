<!doctype html>
<html lang="en">
 <head>
 <title>Document</title>
<style>
input{
color:blue;
font-size:20px;
}

</style>
 </head>
 <body>
 <div id="s1">
  <input type="button" value="点击按钮1">
  <input type="button" value="点击按钮2">
  <input type="button" value="点击按钮3">
  <h1>王维：送别</h1>
  <p>
下马饮君酒，问君何所之。
君言不得意，归卧南山陲。
但去莫复闻，白云无尽时。

</p>
</div>
  <script>
    var headline = document.querySelector("h1");
    var button = document.querySelector("input");
	button.onclick = function(){
	var p1=下马饮君酒，问君何所之。;
	var p2=君言不得意，归卧南山陲。;
	var p3=但去莫复闻，白云无尽时。;

	headline.textContent = "p1+p2+p3";
	}
	
  </script>
 </body>
</html>
