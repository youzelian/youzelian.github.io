<!doctype html>
<html lang="en">
 <head>
  <meta charset="UTF-8">
  <title>Document</title>
  <style>
input{
      font-size:30px;
      box-shadow:5px 5px 0.2px rgb(150,150,100) ;
      cursor:pointer;
      border-radius:450px;
      color:hsl(200,60%,50%);
      margin:1.5em;
}
h1{
   letter-spacing:0.7em;
   color:rgb(0, 180, 200);
   font-size:40px;
}
p{
   width:180px;
   font-size:30px;
   line-height:2em;
   margin:auto;
}
 body{
     text-align:center;

 }
  </style>
  <script type="text/javascript">
  var gstitle = [];
      gstitle[1] = "王维：送别" ;
	  gstitle[2] = "孟浩然：夏日南亭怀辛大" ;
	  gstitle[3] = "王维：青溪" ;
      gstitle[4] = "李白：关山月" ;
  var gscontent = ["斜光照墟落，穷巷牛羊归。野老念牧童，倚杖候荆扉。雉［句隹］麦苗秀，蚕眠桑叶稀。田夫荷锄立，相见语依依。即此羡闲逸，怅然吟式微。","山光忽西落，池月渐东上。散发乘夜凉，开轩卧闲敞。荷风送香气，竹露滴清响。欲取鸣琴弹，恨无知音赏。感此怀故人，中宵劳梦想。","言入黄花川，每逐青溪水。随山将万转，趣途无百里。声喧乱石中，色静深松里。漾漾泛菱荇，澄澄映葭苇。我心素已闲，清川澹如此。请留盘石上，垂钓将已矣。","明月出天山，苍茫云海间。长风几万里，吹度玉门关。汉下白登道，胡窥青海湾。由来征战地，不见有人还。戍客望边色，思归多苦颜。高楼当此夜，叹息未应闲。"] ;
 </script>
 </head>
 <body>
  <h1 id="gstitle" >
  </h1>
  <p id="gscontent">
  </p>
  <input type="button" value="prew" id="s1">
  <input type="button" value="next" id="s2">
  <script type="text/javascript">
      var h1gs = document.querySelector("h1#gstitle") ;
	  var pgs = document.querySelector("p#gscontent") ;
	  var i= 1;
	  h1gs.textContent = gstitle[1];
	  pgs.textContent = gscontent[1] ;
	  document.querySelector("input#s2").onclick = function(){
		  if(i < gstitle.length){
		   i++ ;
		  }
	    h1gs.textContent = gstitle[i];
	    pgs.textContent = gscontent[i] ;
	 
     
		  if(i >= gstitle.length){
		   i= 0;
		   i++ ;
		  }
	    h1gs.textContent = gstitle[i];
	    pgs.textContent = gscontent[i] ;
	  } ;
	  document.querySelector("input#s1").onclick  = function(){
	  if(i>1){
	    i-- ;
	  } 
	  h1gs.textContent = gstitle[i] ;
	  pgs.textContent = gscontent[i] ;
	 if(i<=1){
		 i=gstitle.length+1 ;
	    i-- ;
	  } 
	  h1gs.textContent = gstitle[i] ;
	  pgs.textContent = gscontent[i] ;
	  } ;
  </script>
 
 </body>
</html>
