 <body> 
 <header>
 <h1>优美古诗欣赏</h1>
 </header>
 <div id="BoxDad">
 <div id="BoxSon1">
 <h2><em>送别</em></h2>
 </div>
 <div id="BoxSon2">
下马饮君酒，问君何所之。</br>
君言不得意，归卧南山陲。</br>
但去莫复闻，白云无尽时。</br>
 </div>
 <div id="BoxSon3">
 <h2><em>长安遇冯著</em></h2>
 </div>
 <div id="BoxSon4">
客从东方来，衣上灞陵雨。</br>
问客何为来，采山因买斧。</br>
冥冥花正开，扬扬燕新乳。</br>
昨别今已春，鬓丝生几缕。</br>
</div>
</div>
