 <body>
  <h1>
  春泛若耶溪
  </h1>
<p>
幽意无断绝，此去随所偶。
</p>
<p>
晚风吹行舟，花路入溪口。
</p>
<p>
际夜转西壑，隔山望南斗。
</p>
<p>
潭烟飞溶溶，林月低向后。
</p>
<p>
生事且弥漫，愿为持竿叟。
</p>
