<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">  
    <title>清平调</title>
    <style>   
        body {
            text-align: center;
            background-image: url(https://gimg2.baidu.com/image_search/src=http%3A%2F%2Fwww.mianfeiwendang.com%2Fpic%2Facd7783148b5e1bc8af6afbe40754a1ea9377339%2F1-810-jpg_6-1080-0-0-1080.jpg&refer=http%3A%2F%2Fwww.mianfeiwendang.com&app=2002&size=f9999,10000&q=a80&n=0&g=0n&fmt=auto?sec=1651237467&t=ab95d74321f837f71c1f6c0af2738e23);
            background-repeat: no-repeat;
            background-size: 100%;
        }
        p {
            font-size: 45px;
            font-family:楷体;
        }
		h1{
            font-size: 60px;
            font-family:楷体;
        }
		h2{
            font-size: 30px;
            font-family:楷体;
        }
        #liu1,
        #liu2,
        #liu3{ box-shadow:5px 5px 5px;
            border:0.5px solid #cccccc;
            padding:0.5em;
            line-height:1em;
            border-radius:10px;
            color:rgb(50,100,100);
            font-size:1.5em;
            }
    </style>
</head>
<body>
    <input type="button" value="其一" id="liu1">
    <input type="button" value="其二" id="liu2">
    <input type="button" value="其三" id="liu3">
    <h1>清平调</h1>
	<h2>【唐】李白</h2>
    <p></p>
    <script>
        var ku1 = document.querySelector("p");
        var ki1 = document.getElementById("liu1");
        var ku2 = document.querySelector("p");
        var ki2 = document.getElementById("liu2");
        var ku3 = document.querySelector("p");
        var ki3 = document.getElementById("liu3");
        ki1.onclick = function () {
            ku1.textContent = "云想衣裳花想容，春风拂槛露华浓。若非群玉山头见，会向瑶台月下逢。";
        }
        ki2.onclick = function () {
            ku2.textContent = "一枝红艳露凝香，云雨巫山枉断肠。借问汉宫谁得似？可怜飞燕倚新妆。";
        }
        ki3.onclick = function () {
            ku3.textContent = "名花倾国两相欢，常得君王带笑看。解释春风无限恨，沉香亭北倚阑干。";
        }
        
    </script>
</body>

</html>
