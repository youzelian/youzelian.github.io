 <body>
  <h2>古诗欣赏</h2>  
 <input type = "button" value = "上一篇" id ="s1" >  
 <input type = "button" value = "下一篇" id ="s2">  
 <h1></h1>  
 <p></p >  
 <script type="text/javascript" > 
 var poetry = "桃夭佚名〔先秦〕桃之夭夭，灼灼其华。之子于归，宜其室家。桃之夭夭，有蕡其实。之子于归，宜其家室。桃之夭夭，其叶蓁蓁。之子于归，宜其家人。《望月怀远》唐·张九龄海上生明月，天涯共此时。情人怨遥夜，竟夕起相思。灭烛怜光满，披衣觉露滋。不堪盈手赠，还寝梦佳期。《击鼓》先秦死生契阔， 与子成说。执子之手， 与子偕老。于嗟阔兮， 不我活兮。于嗟洵兮， 不我信兮。"
 var next = document.getElementById("next");
 var pre = document.getElementById("pre");
 var breaking = poetry.split("。");
 var wang = [];  
 var poetry = [];

 wang[1] = "桃夭 ——佚名 〔先秦〕" ;  
 wang[2] = "《望月怀远》——唐·张九龄" ;  
 wang[3] = "《击鼓》——先秦" ;  
 poetry[1] = "桃之夭夭，灼灼其华。之子于归，宜其室家。桃之夭夭，有蕡其实。之子于归，宜其家室。桃之夭夭，其叶蓁蓁。之子于归，宜其家人。" ;  
 poetry[2] = " 海上生明月，天涯共此时。情人怨遥夜，竟夕起相思。灭烛怜光满，披衣觉露滋。不堪盈手赠，还寝梦佳期。" ;  
 poetry[3] = " 死生契阔， 与子成说。执子之手， 与子偕老。于嗟阔兮， 不我活兮。于嗟洵兮， 不我信兮。" ;  
 var title = document.querySelector("h1") ;  
 var content = document.querySelector("p") ;  
 var prew = document.querySelector("input#s1") ;  
 var next = document.querySelector("input#s2") ;  
 var i = 1; 
 next.onclick = function(){  
 title.textContent = wang[i] ;  
 content.textContent = poetry[i] ;  
 i++ ;  
 if(i>=4){  
 i=0;  
 i++;  
 }  
 }  
 prew.onclick = function(){  
 title.textContent = wang[i] ;  
 content.textContent = poetry[i] ;  
 i-- ;  
 if(i<1){  
 i=4;  
 i--;  
 } 
 }  
 </script>
