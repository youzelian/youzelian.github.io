 <h2><em>《重荣桧》  <a href="https://baike.baidu.com/item/%E8%91%A3%E5%97%A3%E6%9D%B2/3755987" target="_blank">——董嗣杲 • 宋朝</a> </em></h2>

 <div id="BoxSon2">
一株苍桧卧龙身，受得隋朝雨露深。<br>
地下仙根将换骨，人间劫火不烧心。<br>
死条节节蕃春信，生意枝枝蓊翠阴。<br>
此木岂知魂可返，争传咒水出丛林。<br>
