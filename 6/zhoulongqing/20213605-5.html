 <h1>李清照诗集</h1>

<P>点击下列按钮显示不同内容</p>

<button onclick="showone();">凤凰台上忆吹箫·香冷金猊</button>

<button onclick="showtwo();">点绛唇·蹴罢秋千</button>

<button onclick="showthree();">忆秦娥·临高阁</button>

<button onclick="showfour();">清空</button>

<div style="display:none" id="div1">
<p>香冷金猊，被翻红浪，起来慵自梳头。任宝奁尘满，日上帘钩。生怕离怀别苦，多少事、欲说还休。新来瘦，非干病酒，不是悲秋。，</p>
<p>休休，这回去也，千万遍《阳关》，也则难留。念武陵人远，烟锁秦楼。惟有楼前流水，应念我、终日凝眸。凝眸处，从今又添，一段新愁。</p>
</div>

<div style="display:none" id="div2">
<p>蹴罢秋千，起来慵整纤纤手。露浓花瘦，薄汗轻衣透。</p>
<p>见客入来，袜刬金钗溜。和羞走，倚门回首，却把青梅嗅。</p>
</div>

<div style="display:none" id="div3">
<p>临高阁，乱山平野烟光薄。烟光薄，栖鸦归后，暮天闻角。</p>
<p>断香残酒情怀恶，西风催衬梧桐落。梧桐落，又还秋色，又还寂寞。</p>
</div>
<script>

function showone()
{
    document.getElementById("div1").style.display="block";
    document.getElementById("div2").style.display="none";
	document.getElementById("div3").style.display="none";
};
function showtwo()
{
   document.getElementById("div1").style.display="none";
   document.getElementById("div2").style.display="block";
   document.getElementById("div3").style.display="none";
}
function showthree()
{
   document.getElementById("div1").style.display="none";
   document.getElementById("div2").style.display="none";
   document.getElementById("div3").style.display="block";
}
function showfour()
{
   document.getElementById("div1").style.display="none";
   document.getElementById("div2").style.display="none";
   document.getElementById("div3").style.display="none";
}


</script>
