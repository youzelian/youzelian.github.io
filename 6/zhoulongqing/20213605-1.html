  <h1>
  《重荣桧》

  </h1>
  <h2>
          ———董嗣杲  宋朝
  </h2>
  <p>
  一株苍桧卧龙身，受得隋朝雨露深。

 地下仙根将换骨，人间劫火不烧心。

 死条节节蕃春信，生意枝枝蓊翠阴。

 此木岂知魂可返，争传咒水出丛林。
 </p>
