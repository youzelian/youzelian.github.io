<!doctype html>
<html lang="en">
 <head>
  <meta charset="UTF-8">
  <title>作业10</title>
  
  <script src="https://lijianhong19720904.github.io/ts300.js">
  </script>
    <style type="text/css">
  body{
  font-size:20px;
  text-align:center;
  background-color: grey;
  }
    div#anliu input{
            width: 80px;
            height: 80px;
            margin: 0 20px;
            border-radius: 45px;
            font-size: 25px;
            box-shadow: 6px 6px 3px gray;
        }
    div#anliu {
	            font-size: 35px;
				font-family:黑体;}
			/*	   
			div#anliu input:hover{
	       border:outset :
           box-shadow: 6px 6px 3px yellow;
        }
			 div#anliu input:active{
           box-shadow: none;
	       border:inset;
		   }		   */

        div#anliu,div#tsTitle,div#tsContent{
			margin:1em auto;
			border:1px solid grey;
        }
		div#tsTitle{
		font-family:楷体;
		font-size:1.8em ;
		font-weight:bold;
		line-height: 50px;
		}

		 p{ 
		 width:320px;
		 font-size:1.3em;
		font-family:楷体;
		line-height: 50px;
		margin:auto ;
		}
  </style>


 </head>
 <body>
<div id="anliu">
  <input type="button" value="上一首" id="prev">
  唐诗鉴赏
  <input type="button" value="下一首" id="next">
</div>
  <div  id = "tsTitle">
  </div>
   <p id ="tsContent">
  </p>
  <div p id ="tsContent">
  </div>
  <script type="text/javascript">


	var ts = [] ,
	    tsTitle = [] ,
		tsContent =[] ;
    //将js文件中的古诗分割分别放入相应的数组中

	var BEGIN = 100 ,
	    END = 300 ,
		i  ,
		p1 ,
		p2 ;
	for (i=0 ; i < END - BEGIN ; i++ ){
        p1 = ts300.search(i+BEGIN) ;
		p2 = ts300.search(i+1+BEGIN)
		ts[i] = ts300.substring(p1,p2);
	}
	for (i=0; i < ts.length ; i++ ){ 
		p1 = 3 ;
		p2 = ts[i].search("\n");
        tsTitle[i] = ts[i].substring(p1,p2) ;
		tsContent[i] = ts[i].substring(p2) ;
	}
	
	   i=0 ;
       showTs(i);
	   var tsTitleDom = document.getElementById("tsTitle");
       var tsContentDom = document.getElementById("tsContent");
  	   var prevDom = document.getElementById("prev");
	   var nextDom = document.getElementById("next");
 		
	//按钮点击古诗翻页功能
    //加入两个if语句对i控制使循化形成闭环

		prevDom.onclick = function(){
		  i-- ;
		  if (i < 0)
	  {
	   i = 200;   
	   i--;
	  }
		  showTs(i);
		};
		nextDom.onclick = function(){
		  i++ ;
		  if (i>=200) 
		  {i = -1;
		  i++;
		  }
		  showTs(i);
		};
		function showTs(i){
		   var tsTitleDom = document.getElementById("tsTitle");
           var tsContentDom = document.getElementById("tsContent");
	        tsTitleDom.textContent = tsTitle[i] ;
		    tsContentDom.textContent = tsContent[i] ;
		}
	
  </script>
 </body>
</html>
