  <p align="center">
  <font size="8" color="blue" face="楷体">
 轻汗微微透碧纨，明朝端午浴芳兰。<br>
 流香涨腻满晴川，彩线轻缠红玉臂。<br>
 小符斜挂绿云鬟。佳人相见一千年。<br>

 <h1>
 <font size="6" >
 端午节的由来
 </h1>
 <p align="left">
 <font size="6" color="blue">
 端午节是流行于中国以及汉字文化圈诸国的传统文化节日传说战国时期的楚国诗人屈原在五月五日跳汨罗江自尽，后人亦将端午节作为纪念屈原的节日；也有纪念伍子胥、曹娥及介子推等说法。端午节的起源涵盖了古老星象文化、人文哲学等方面内容，蕴含着深邃丰厚的文化内涵，在传承发展中杂糅了多种民俗为一体，各地因地域文化不同而又存在着习俗内容或细节上的差异
