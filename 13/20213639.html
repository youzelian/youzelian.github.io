<body>
<font  color="#ff33ff">
    <p>阅读登金陵凤凰台</p>
</font>
    <input type="button" value="1" id="jing1">
    <input type="button" value="2" id="jing2">
    <input type="button" value="3" id="jing3">
    <input type="button" value="4" id="jing4">
    <input type="button" value="5" id="jing5">
    <input type="button" value="6" id="jing6">
    <h1></h1>
    <h2></h2>
    <h3></h3>
    <h4></h4>
    <h5></h5>
    <h6></h6>
    <script>
        var z1 = document.querySelector("h1");
        var j1 = document.getElementById("jing1");
        var z2 = document.querySelector("h2");
        var j2 = document.getElementById("jing2");
        var z3 = document.querySelector("h3");
        var j3 = document.getElementById("jing3");
        var z4 = document.querySelector("h4");
        var j4 = document.getElementById("jing4");
        var z5 = document.querySelector("h5");
        var j5 = document.getElementById("jing5");
        var z6 = document.querySelector("h6");
        var j6 = document.getElementById("jing6");

        j1.onclick = function () {
            z1.textContent = "登金陵凤凰台";
        }
        j2.onclick = function () {
            z2.textContent = "唐·李白";
        }
        j3.onclick = function () {
            z3.textContent = "凤凰台上凤凰游，凤去台上江自流。";
        }
        j4.onclick = function () {
            z4.textContent = "吴宫花草埋幽径，晋代衣冠成古丘。";
        }
        j5.onclick = function () {
            z5.textContent = "三山半落青天外，二水中分白鹭洲。";
        }
        j6.onclick = function () {
            z6.textContent = "总为浮云能蔽日，长安不见使人愁。";
        }
    </script>
	<div>
	<p align="left">
译文：<br>
凤凰台上曾经有凤凰来悠游，凤去台空只有江水依旧奔流。<br>
吴国宫殿的鲜花芳草遮没荒凉小径，晋代多少王族已成荒冢古丘。<br>
三山云雾中隐现如落青天外，江水被白鹭洲分成两条河流。<br>
那些悠悠浮云总是遮蔽太阳的光辉，登高不见长安城，怎么不让人内心沉痛忧郁。<br>	
	</p>
