</body><p1>
    <font size="3" color="white">
        我要说的故事，开始于上一个千年。<br>
        “南风守护”驱逐贵族，“西风守护”初创成型，“北风守护”流浪归来定居狼林。四风流转,重生的自由之城，百废待兴。<br>
        风神探望西风之鹰的首领，可惜狮牙骑士并不领情。火红头发的少女发出驱赶松鼠的声音，说自己没空听歌，拜风神所赐，案牍劳形。<br>
        风神探望奔狼的领主，劝它安分守己，收敛魔神的天性。北风的王狼发出威胁的低吼：“爱捣乱的诗人，这话，还是说给你自己听！”<br>
        风神探望最初的眷属，助它吹散冰雪，守护绿野与自由之民。巨龙似乎认为，来自神明的帮助，不该是一边为它加油，一边，弹奏竖琴：<br>

</p1>

    <font size="7" color="white" face="宋体">
