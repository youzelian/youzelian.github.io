<script type="text/javascript">
document.body.style.height = window.innerHeight - 30 +'px';
var kouHao = ['精力充沛的青春，是不怎么容易灭亡的。','错误经不起失败，但是真理却不怕失败。','只要一息尚存，一个人就不应当放弃希望。','不管何人，若是失往了耐心，就失往了灵魂。','越是接近真理，便愈加发现真理的迷人。','我不能选择那最好的。是那最好的选择我。','最可怕的敌人，就是没有坚强的信念。','我所能奉献的，只有热血辛劳汗水与眼泪。','只要我们能善用时间，就永远不愁时间不够用。','青春是一种持续的陶醉，是理智的狂热。'];
var headerDom = document.querySelector("div#header");
var i = 0;
function showHeader(){
	headerDom.textContent = kouHao[i];
	if(i<kouHao.length-1){
		i++;
	}else{
		i = 0;
	}
	window.setTimeout(showHeader,3000);
}
window.setTimeout(showHeader,3000);
</script>
