<!doctype html>
<html lang="en">
    <head>  
    <meta charset="UTF-8"> 
     <title>第五次作业</title> 
    </head>
     <style type="text/css"> 
     body
     {
      text-align:center;
     }
      p
       { 
     font-family:楷体;
     font-size:40px; 
     color:#ff5100; 
    } 
    h1, h2, h3, h4, h5, h6 
     { 
        font-family:宋体; 
       font-size:40px; 
       margin:30px;
       letter-spacing:0.5em;
       color: rgb(127, 157, 255);
      }
     	#jing1,#jing2,#jing3,#jing4,#jing5,#jing6
         {
   display: inline-block;
     width: 90px;
    height: 90px;
              font-size: 20px;
               border-radius: 10px;/*允许为元素添加圆角边框*/
                box-shadow: 5px 5px rgb(221, 47, 47);
          }
                     </style>
     <body>   
   <p>敬请欣赏虞美人</p> 
   <input type="button" value="1" id="jing1"> 
  <input type="button" value="2" id="jing2">   
    <input type="button" value="3" id="jing3">  
  <input type="button" value="4" id="jing4">  
 <input type="button" value="5" id="jing5"> 
      <input type="button" value="6" id="jing6"> 
   <h1></h1>  
    <h2></h2>  
 <h3></h3> 
     <h4></h4>    
   <h5></h5> 
  <h6></h6> 
     <script>     
     var z1 = document.querySelector("h1"); 
   var j1 = document.getElementById("jing1"); 
   var z2 = document.querySelector("h2"); 
  var j2 = document.getElementById("jing2");        
   var z3 = document.querySelector("h3");        
  var j3 = document.getElementById("jing3");        
  var z4 = document.querySelector("h4");        
  var j4 = document.getElementById("jing4");        
  var z5 = document.querySelector("h5");        
  var j5 = document.getElementById("jing5");        
  var z6 = document.querySelector("h6");        
  var j6 = document.getElementById("jing6");        
  j1.onclick = function () 
  {            
      z1.textContent = "虞美人";        
      }        
      j2.onclick = function () 
      {            
          z2.textContent = "五代.李煜";        
          }        
          j3.onclick = function () 
          {            z3.textContent = 
            "春花秋月何时了，往事知多少。";        
          }        
          j4.onclick = function () 
          {            
              z4.textContent = "小楼昨夜又东风，故国不堪回首月明中。";        
              }       
               j5.onclick = function () 
              {            
                  z5.textContent = "雕栏玉砌应犹在，只是朱颜改。";       
                  }        
                  j6.onclick = function () 
                  {
                                  z6.textContent = "问君能有几多愁，恰似一江春水向东流。";        
                    }
 </script>
  </body>
   </html>
