<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>计算器外观</title>
    <style>
        body {
            text-align: center;
            margin: 0;
            padding: 0;
        }

        input#output {
            text-align: center;
            width: 350px;
        }

        input#d {
            width: 350px;
        }

        input {
            text-align: center;
            width: 70px;
            height: 70px;
            margin: 10px;
            border-radius: 10px;
            font-size: 40px;
        }

        input:hover {
            box-shadow: 0 12px 16px 0 rgba(239, 232, 181, 0.24), 0 17px 50px 0 rgba(214, 181, 181, 0.19);
        }

        input:active {
            background-color: rgb(219, 246, 165);
            box-shadow: 0 5px rgb(222, 219, 177);
            transform: translateY(4px);
        }

        h1 {
            margin-left: 10px;
            font-family: 微软雅黑;
            font-weight: 700;
            font-size: 50px;
        }
    </style>
</head>

<body>
    <h1>计算器</h1>
    <input type="text" id="output">
    <script>
        var SYMBOL = ["+", "-", "*", "/", "7", "8", "9", "Del", "4", "5", "6", ".", "1", "2", "3", "=", "0"];
        var serial = ["a", "b", "c", "d"];
        for (var i = 0; i < SYMBOL.length / 4; i++) {
            var div = document.createElement('div');
            for (var j = 0; j < 4; j++) {
                if (i * 4 + j < SYMBOL.length) {
                    var input = document.createElement('input');
                    input.type = "button";
                    input.value = SYMBOL[i * 4 + j];
                    input.id = serial[i - 1];
                    div.appendChild(input);
                };
            };
            document.body.appendChild(div);
        };
    </script>
</body>

</html>
