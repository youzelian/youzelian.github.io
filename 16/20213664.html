    <input type="button" value="静夜思" id="jys">
    <input type="button" value="春夜洛城闻笛" id="cylcwd">
    <input type="button" value="早发白帝城" id="zfbdc">
    <h1>↑点击按钮选择古诗</h1>
    <div id="st"></div>
    <div id="nd"></div>
    <div id="rd"></div>
    <script>
        var div0=document.getElementById("st");
        var div1=document.getElementById("nd");
        var div2=document.getElementById("rd");
        var button1=document.getElementById("jys");
        button1.onclick=function(){
            div0.textContent="静夜思";
            div1.textContent="床前明月光，疑是地上霜。";
            div2.textContent="举头望明月，低头思故乡。";

        };
        var button2=document.getElementById("cylcwd");
        button2.onclick=function(){
            div0.textContent="春夜洛城闻笛";
            div1.textContent="谁家玉笛暗飞声，散入春风满洛城。";
            div2.textContent="此夜曲中闻折柳，何人不起故园情。";
        };
        var button3=document.getElementById("zfbdc")
        button3.onclick=function(){
            div0.textContent="早发白帝城";
            div1.textContent="朝辞白帝彩云间，千里江陵一日还。";
            div2.textContent="两岸猿声啼不住，轻舟已过万重山。";
        };
    </script>
