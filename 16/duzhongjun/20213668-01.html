        <h1>
            溪居
        </h1>
        
        
        <p>
   
          久为簪组累，幸此南夷谪。<br>
         闲依农圃邻，偶似山林客。<br>
         晓耕翻露草，夜榜响溪石。<br>
         来往不逢人，长歌楚天碧。  <br>
    </p>
