
<!doctype html>
<html lang="en">
 <head>
  <meta charset="UTF-8">
  <title>第七次作业</title>
 </head>
 <style type="text/css">
body
{
text-align:center;
font-family:楷体;
}
input
{
cursor:pointer;
transition-duration: 0.4s; /* 检索或设置对象过渡的持续时间 */
background-color:#ccffff;
display: inline-block;
width: 90px;
height: 90px;
font-size: 20px;
border-radius: 10px;/*允许为元素添加圆角边框*/
}
h1,
h2
{
font-size:40px;
 color:#3399ff;
 margin:35px;
}
p
{
text-shadow:5px 5px #999;
 font-size:30px;
 margin:auto;
 letter-spacing:0.6em;
 width:250px;

}
#prev:hover
{
    background-color: #66cc99;
    color: blue];
	box-shadow: 0 12px 16px 0 rgba(0,0,0,0.24), 0 17px 50px 0 rgba(0,0,0,0.19);
}
#next:hover
{
    background-color: #66cc99;
    color: white;
	box-shadow: 0 12px 16px 0 rgba(0,0,0,0.24), 0 17px 50px 0 rgba(0,0,0,0.19);
}
#prev:active
{
  background-color: #3e8e41;
  box-shadow: 0 5px #666;
  transform: translateY(4px);/*通过给定Y方向的数目指定一个translation*/
}
#next:active
{
  background-color: #3e8e41;
  box-shadow: 0 5px #666;
  transform: translateY(4px);
}
 </style>
 <body>
 
 <input type="button" value="上一首" id="prev">
 <input type="button" value="下一首" id="next">
 <h1 id="tsTitle"></h1>
 <p id="tsContent"></p>

  <script> 

	var tsTitle = [];
	    tsTitle[0] = ["春晓"];
	    tsTitle[1] = ["春晓"];
	    tsTitle[2] = ["静夜思"];
		tsTitle[3] = ["静夜思"];
    var tsContent=["春眠不觉晓，处处闻啼鸟。夜来风雨声，花落知多少。","春眠不觉晓，处处闻啼鸟。夜来风雨声，花落知多少。","床前明月光，疑是地上霜。举头望明月，低头思故乡","床前明月光，疑是地上霜。举头望明月，低头思故乡"]

    var h1Dom = document.querySelector("h1#tsTitle") ;
    var pDom =  document.querySelector("p#tsContent");
	var prevBt = document.querySelector("input#prev");
    var nextBt = document.querySelector("input#next");

         h1Dom.textContent = tsTitle[0] ;
         pDom.textContent = tsContent[0] ;
       var i= 0 ;
       document.querySelector("input#next").onclick = function(){
        if (i< tsTitle.length-1) {
          i++ ;
		 }
		 else
		   {i=i-3;}
         h1Dom.textContent = tsTitle[i] ;
         pDom.textContent = tsContent[i] ;
		
		   } ;
	   document.querySelector("input#prev").onclick = function(){
		 if (i > 0) {
          i-- ;
		 }
		 else
		   {i=3;}
         h1Dom.textContent = tsTitle[i] ;
         pDom.textContent = tsContent[i] ;
	   } ;

	
  </script>
 </body>
</html>
