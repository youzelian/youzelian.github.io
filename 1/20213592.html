    <style>
        html,body{  /*定义适应所有电子设备*/
            text-align: center;
            height: 100%;
            margin: 0;
            padding: 0; 
        }
        /*css对文本修饰*/
        div#title{  
            height: 30%;
            background-color: antiquewhite;
            font-size: large;
        }
        img{
            float: right;
            width: 30%;
            height: 80%; 
        }
        div#title>h1{
        float:left;
        }
        div#content{
            height: 30%;
            background-color: burlywood;
        } 
        div#content>p{
            width: 100%;line-height:350%
        }
        div#content>p>a{
            text-decoration: none;
            border: solid 1px;
            line-height: 15px;
            margin: 10px;
        }
        div#content>p>a:hover{
            border: outset;
        }
        div#describe{
            height: 30%;
            background-color: blanchedalmond;
            font-size: 50px;
        }
        footer{
            background-color: darkgray;
            height: 10%;
        }

    <body>
        <hr>
        <div id="title">    <!--定义四大基本结构title,content,describe,foonter-->
           <p></p>图片实现
           <img src="https:gimg2.baidu.com/image_search/src=http%3A%2F%2Fimg.jj20.com%2Fup%2Fallimg%2F1114%2F113020142315%2F201130142315-1-1200.jpg&amp;refer=http%3A%2F%2Fimg.jj20.com&amp;app=2002&amp;size=f9999,10000&amp;q=a80&amp;n=0&amp;g=0n&amp;fmt=auto?sec=1656839042&amp;t=a5979c640a8486e13f0e0c7a8edde816" alt="">

        <script> 
        //javascript对yitle里的内容补充文字,图片,时间等   
          var p=document.querySelector("div#title>p");
          var saying=["坚持爬过这座山，你就会发现不一样的风景，加油，相信自己！","别害怕，这不是你的错，只是你还在流浪而已，等到了家你就会发现一切都是值得的","只要还在这个世界，一切都还是有机会的，真正的英雄是认清生活后，依然热爱生活的人"]
          var number=0;
          function showSaying(){//文案实现
          number=Math.floor(Math.random()*3);
          p.textContent=saying[number];
          } 
          var date=document.querySelector("div#title>h1");
          function showTime(){//时间实现
          var dat=new Date();
         var year=dat.getFullYear();
         var month=dat.getMonth()+1;
         var day=dat.getDay();
         var hour=dat.getHours();
         var min=dat.getMinutes();
         date.textContent=year+"年"+month+"月"+day+"日"+hour+"时"+min+"分";
          }
          window.setInterval("showTime()",1000);
          window.setInterval("showSaying()",1000);   
       </script>
