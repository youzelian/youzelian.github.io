          var dat=new Date();

         var hour=dat.getHours();
         var min=dat.getMinutes();
         date.textContent="现在是北京时间"+year+"年"+month+"月"+day+"日"+hour+"时"+min+"分";

          window.setInterval("showTime()",2000);
          window.setInterval("showSaying()",2000);
