var poet ="李商隐:锦瑟\n锦瑟无端五十弦，一弦一柱思华年。\n庄生晓梦迷蝴蝶，望帝春心托杜鹃。\n沧海月明珠有泪，蓝田日暖玉生烟。\n此情可待成追忆，只是当时已惘然。\n佚名:渡易水歌\n风萧萧兮易水寒，壮士一去兮不复还。\n探虎穴兮入蛟宫，仰天呼气兮成白虹。\n佚名:相鼠\n相鼠有皮，人而无仪！人而无仪，不死何为？\n相鼠有齿，人而无止！人而无止，不死何俟？\n相鼠有体，人而无礼！人而无礼，胡不遄死？\n司马相如:凤求凰其一\n有一美人兮，见之不忘。\n一日不见兮，思之如狂。\n凤飞翱翔兮，四海求凰。\n无奈佳人兮，不在东墙。\n将琴代语兮，聊写衷肠。\n何时见许兮，慰我彷徨。\n愿言配德兮，携手相将。\n不得於飞兮，使我沦亡。\n司马相如:凤求凰其二\n凤兮凤兮归故乡，遨游四海求其凰。\n时未遇兮无所将，何悟今兮升斯堂！\n有艳淑女在闺房，室迩人遐毒我肠。\n何缘交颈为鸳鸯，胡颉颃兮共翱翔！\n凰兮凰兮从我栖，得托孳尾永为妃。\n交情通意心和谐，中夜相从知者谁？\n双翼俱起翻高飞，无感我思使余悲。\n"

<script type="text/javascript">
  var h1Dom=document.querySelector("h1#tsTitle");
  var pDom=document.querySelector("p#tsContent");
    var i=0;
    document.querySelector("input#next").onclick=function(){
        if(i<tsTitle.length-1){
            i++;
        }
        h1Dom.textContent =tsTitle[i];
        pDom.textContent=tsContent[i];
    };
