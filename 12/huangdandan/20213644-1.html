 <h1>
 皂罗袍
 </h1>
 <p>
 原来姹紫嫣红开遍；
 </p>
 <p>
 似这般都付与断井颓垣,
 </p>
 <p>
 良辰美景奈何天，
 </p>
 <p>
 便赏心乐事谁家院。
 </p>
 <p>
 在台下，我早已听得魂飞天外，不知道想到哪里去了。
 </p>
