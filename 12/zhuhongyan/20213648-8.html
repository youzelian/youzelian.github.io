<!doctype html>
<html lang="en">
 <head>
  <meta charset="UTF-8">

  <title>唐诗三百首</title>
  <style type="text/css">
	body{
        font-family: 楷体;
        text-align: center;
        font-size:20px;
	    margin:auto;
    }
  h1,p{
      font-size: 50px;
      width: 600px ;
      margin: auto ;
      line-height: 60px;
    }
  input{
    display: inline-block;
    padding: 10px 20px;
    font-size: 18px;
    cursor: pointer;
    text-align: center;
    text-decoration: none;
    outline: none;
    color: #000000;
    background-color: #ffffff;
    border: 2px solid  rgb(0, 0, 0);
    border-radius: 8px;
    box-shadow: 0 9px rgb(0, 0, 0);
    margin: 20px;
  }
    input:active {
    background-color: #ffffff;
    box-shadow: 0 5px rgb(0, 0, 0);
    transform: translateY(4px);
  }
  </style>
  <script src="ts300.js">
  </script>
 </head>
 <body>
 <h1>唐诗三百首</h1>
  <input type="button" value="上一首" id="prev">  
  <input type="button" value="下一首" id="next">
  <h1 id="tsTitle"></h1>
  <p id="tsContent"></p>
 <script type="text/javascript">
 var BEGIN = 100 ;
 var END = 300 ;
var tsArr = [] ;
	for (var i = BEGIN ; i <= END ; i++){
	   var pos1 = ts300.search(i)  ;
	   var pos2 = ts300.search(i + 1) ;
       tsArr[i - BEGIN] = ts300.substring(pos1,pos2);
	}//实现分离唐诗的功能。以i为界提取唐诗，放到数组tsArr中
	var tsTitle = [] ,
	    tsContent = [] ;//分标题组和内容组
  for (var i=0; i < tsArr.length; i++){
     var sTmp = tsArr[i] ;
	  tsTitle[i] = sTmp.substring(3,sTmp.search("\n")) ; 
	  tsContent[i] = sTmp.substring(sTmp.search("\n"));
    }
  var i = 0 ;
  var tsTitleDom = document.querySelector("h1#tsTitle") ;
  var tsContentDom = document.querySelector("p#tsContent") ;
  tsTitleDom.textContent = tsTitle[i] ;
  tsContentDom.textContent = tsContent[i] ;//点开页面为tsTitle[0]和tsContent[0]的内容
   document.querySelector("input#prev").onclick = function(){
    if (i >0 ){
		i-- ;
    }else{
	    i = tsTitle.length -1 ;
	}
    var tsTitleDom = document.querySelector("h1#tsTitle") ;
   var tsContentDom = document.querySelector("p#tsContent") ;
   tsTitleDom.textContent = tsTitle[i] ;
   tsContentDom.textContent = tsContent[i] ;//依据上述循环，分别将标题组的内容和内容组的内容放到tsTitleDom和tsConcentDom
   } ;
   document.querySelector("input#next").onclick = function(){
    if (i < tsTitle.length -1){
		i++ ;
    }else{
	    i = 0 ;
	}
    var tsTitleDom = document.querySelector("h1#tsTitle") ;
   var tsContentDom = document.querySelector("p#tsContent") ;
   tsTitleDom.textContent = tsTitle[i] ;
   tsContentDom.textContent = tsContent[i] ;
   } ;
 </script>
 </body>
</html>
