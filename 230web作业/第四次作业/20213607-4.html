        body {

            height: 100px;

        }

            list-style: none;
        }

        ul li a {
            display: inline-block;
            height: 100px;
            width: 120px;
            color: white;
            text-decoration: none;
            font-size: 25px;
            padding-left: 20px;
        }

        .class1 ul li a:hover {
            background: rgba(0, 0, 0, 0.3);
            color: #e4b653;
        }

        h3,
        ul,
        ul>li {
            float: left;
        }

        .yu {
            width: 1920px;
            height: 150px;
            /* margin: 600px auto 0 auto; */
            margin-top: 600px;
            text-align: center;
        }

        .yu img {
            border-radius: 10px;
            box-shadow: 5px 5px gray;
        }

        .yu a {
            display: inline-block;
            width: 291px;
            height: 134px;
            margin: 10px;
        }

        .yu a:hover {
            transform: scale(1.01);
        }
    </style>
