<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>第五次作业</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        body {
            text-align: center;
            background-image: url(https://img.zcool.cn/community/015f245bd59883a8012099c8221ec1.jpg@3000w_1l_0o_100sh.jpg);
            background-repeat: no-repeat;
            background-size: 30%;
        }

        p {
            font-size: 30px;
            font-family: 中易宋体, 微软雅黑, 楷体;
            text-shadow: 3px 3px gray;
        }

        #liang1,
        #liang2,
        #liang3,
        #liang4,
        #liang5,
        #liang6 {
            display: inline-block;
            width: 100px;
            height: 100px;
            font-size: 20px;
            border-radius: 10px;
            box-shadow: 5px 5px gray;
        }

        h1,
        h2,
        h3,
        h3,
        h4,
        h5,
        h6 {
            font-size: 30px;
            font-family: 宋体, 微软雅黑, 楷体, 草书;
            margin: 30px;
        }

        .yu {
            height: 60px;
            font-size: 35px;
            line-height: 60px;
            font-family: 楷体, 微软雅黑, 黑体;
            color: #fadcdc;
            background-color: #808080;
            text-align: center;
            margin: 300px auto 0 auto;
        }
    </style>
</head>

<body>
    <p>敬请欣赏静夜诗</p>
    <input type="button" value="1" id="liang1">
    <input type="button" value="2" id="liang2">
    <input type="button" value="3" id="liang3">
    <input type="button" value="4" id="liang4">
    <input type="button" value="5" id="liang5">
    <input type="button" value="6" id="liang6">
    <h1></h1>
    <h2></h2>
    <h3></h3>
    <h4></h4>
    <h5></h5>
    <h6></h6>
    <div class="yu">CopyRight Belongs to 尤泽利安</div>
    <script>
        var yu1 = document.querySelector("h1");
        var ze1 = document.getElementById("liang1");
        var yu2 = document.querySelector("h2");
        var ze2 = document.getElementById("liang2");
        var yu3 = document.querySelector("h3");
        var ze3 = document.getElementById("liang3");
        var yu4 = document.querySelector("h4");
        var ze4 = document.getElementById("liang4");
        var yu5 = document.querySelector("h5");
        var ze5 = document.getElementById("liang5");
        var yu6 = document.querySelector("h6");
        var ze6 = document.getElementById("liang6");

        ze1.onclick = function () {
            yu1.textContent = "静夜思";
        }
        ze2.onclick = function () {
            yu2.textContent = "朝代：唐代/作者：李白";
        }
        ze3.onclick = function () {
            yu3.textContent = "床前明月光，";
        }
        ze4.onclick = function () {
            yu4.textContent = "疑是地上霜。";
        }
        ze5.onclick = function () {
            yu5.textContent = "举头望明月，";
        }
        ze6.onclick = function () {
            yu6.textContent = "低头思故乡。";
        }
    </script>
</body>

</html>
