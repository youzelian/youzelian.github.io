<h1>
  011杜甫：梦李白二首其一
</h1>
<p>
<p>
死别已吞声，生别常恻恻。
</p>
<p>
江南瘴疠地，逐客无消息。
</p>
<p>
故人入我梦，明我长相忆。
</p>
<p>
君今在罗网，何以有羽翼？
</p>
<p>
恐非平生魂，路远不可测。
</p>
<p>
魂来枫林青，魂返关塞黑。
</p>
<p>
落月满屋梁，犹疑照颜色。
</p>
<p>
水深波浪阔，无使蛟龙得。
</p>


</p>
