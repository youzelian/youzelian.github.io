<!doctype html>
<html lang="en">
 <head>
  <meta charset="UTF-8">
  <title>Document</title>
  <style type="text/css">
    body{
	     text-align:center;
		 font-size:16px;
		 color:#00FFFF;
		 }
    h1#tsTitle{
	          }
	p#tsContent{
	            font-size:2em;
				width:8em;
				margin:auto;
				color:pink;
				}
	input{
	      font-size:1.5em;
		   color:#E8A317;
		  }
  </style>
  <script type="text/javascript">
  var tsTitle=[];
  tsTitle[0]="王维：九月九日忆山东兄弟";
  tsTitle[1]="李商隐：嫦娥";
  tsTitle[2]="杜牧：泊秦淮";
  var tsContent=["独在异乡为异客，每逢佳节倍思亲。\n遥知兄弟登高处，遍插茱萸少一人。","云母屏风烛影深，长河渐落晓星沉。\n嫦娥应悔偷灵药，碧海青天夜夜心。","烟笼寒水月笼沙，夜泊秦淮近酒家。\n商女不知亡国恨，隔江犹唱后庭花。"];
  </script>
 </head>
 <body>
  <h1 id="tsTitle">
  标题
  </h1>
  <p id="tsContent">
  内容
  </P>
  <div id=""class="">
  <input type="button" value="Prev" id="prev">
  <input type="button" value="Next" id="next">
  </div>
  <script type="text/javascript">
 
   
   var h1Dom=document.querySelector("h1#tsTitle");
   var pDom=document.querySelector("p#tsContent");
   //h1Dom.textContent=tsTitle[0];
   //pDom.textContent=tsContent[0];
   var i=0;
     document.querySelector("input#next").onclick=function(){
		 
         h1Dom.textContent=tsTitle[i];
         pDom.textContent=tsContent[i];
   if(i<tsTitle.length-1){
    i++;
   }
  };
     document.querySelector("input#prev").onclick=function(){
		 
         h1Dom.textContent=tsTitle[i];
         pDom.textContent=tsContent[i];
   if(i >0){
    i--;
   }
  };
     
  </script>
 </body>
</html>
