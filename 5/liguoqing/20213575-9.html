<!doctype html>
<html lang="en">
 <head>
  <meta charset="UTF-8">
  <title>Document</title>
  <style type="text/css">
  h1{
     text-shadow:0 0 4px #FFF,
	              0 -5px 4px #FF3,
				  2px -10px 6px #FD3,
				  -2px -15px 11px #F80,
				  2px 15px 18px #F20;
				  }
  p{
    width:380px;
	margin:auto;
	}
  body{
      font-size:30px;
	  color:pink;
	  text-align:center;
	  }
  input{
       font-size:20px;
	   color:#f47920;
	   background:#FFE485;
	   }
  div{
      border:15px dashed #D88FD8;
	  width:1000px;
	  height:700px;
	  margin:auto;
	  }
  div.div1{
           background-clip:border-box;
		   -moz-background-clip:border-box;
		   -webkit-background-clip:border-box;
		   -o-background-clip:border-box;
		   }
  </style>
<script src="https://lijianhong19720904.github.io/ts300.js
">

</script>
 </head>
 <body>
  <div class="div1">
 <input type="button" value="上一首"id="prev">
<input type="button" value="下一首"id="next">
  <h1 id="tsTitle">
  
  </h1>
  <p id="tsContent">

  </p >
  <script type="text/javascript">
   var ts=[],
       tsTitle=[],
    tsContent=[];
   var BEGIN=100,
       END=300,
   i,
   p1,
   p2;
   for(i=0;i<END-BEGIN;i++){
    p1=ts300.search(i+BEGIN);
    p2=ts300.search(i+1+BEGIN);
    ts[i]=ts300.substring(p1,p2);
   }
   for(i=0;i<ts.length;i++){
    p1=3;
    p2=ts[i].search("\n");
    tsTitle[i]=ts[i].substring(p1,p2);
    tsContent[i]=ts[i].substring(p2);
   }
   i=0;
    showTs(i);
   var prevDom=document.getElementById("prev");
    var nextDom=document.getElementById("next");
    prevDom.onclick=function(){
     if(i<=0){
      i=tsTitle.length-1;
     }else{

           i--;}
     showTs(i);
    };
     nextDom.onclick=function(){
      if(i>=tsTitle.length-1){
       i=0;
      }else{
           i++;
      }
     showTs(i);
    };
    function showTs(i){
     var tsTitleDom=document.getElementById("tsTitle");
           var tsContentDom=document.getElementById("tsContent");
              tsTitleDom.textContent=tsTitle[i];
              tsContentDom.textContent=tsContent[i];
        }
   
  </script>
 </div>
 </body>
</html>
