<html lang="en">

<head>
    <meta charset="UTF-8">

        h1 {
            color: aqua;

        }
        
        body {
            padding-top: 50px;
            font-family: "宋体";

        p {
            font-size: 16px;

            border: 2px solid black;
            text-align: center;

            font-size: 15px;

<body background="https://bpic.588ku.com/back_origin_min_pic/19/04/12/bb890750d0b17afd80062b8c93f1ae1e.jpg!/fw/750/quality/99/unsharp/true/compress/true">
    <h1>唐诗三百首</h1>
    <input type="button" value="ok" id="1">
    <input type="button" value="hello" id="2">
    <p>
        佳人<br> 杜甫
        <br> 绝代有佳人，幽居在空谷。
        <br/> 自云良家子，零落依草木。
        <br/> 关中昔丧乱，兄弟遭杀戮。
        <br/> 官高何足论，不得收骨肉。
        <br/> 世情恶衰歇，万事随转烛。
        <br/> 夫婿轻薄儿，新人美如玉。
        <br/> 合昏尚知时，鸳鸯不独宿。
        <br/> 但见新人笑，那闻旧人哭！
        <br/> 在山泉水清，出山泉水浊。
        <br/> 侍婢卖珠回，牵萝补茅屋。
        <br/> 摘花不插发，采柏动盈掬。
        <br/> 天寒翠袖薄，日暮倚修竹。

    </p>
    <div>
        <button style="display: block;margin: 15px auto;align-content: center;"><br></button>
    </div>

    <script>
        var headline = document.querySelector("p");
        var button = document.querySelector("input#1");
        button.onclick = function() {

            // alert("hello");
            document.write("送杨氏女" + "</br>");
            document.write("韦应物" + "</br>");
            document.write("永日方戚戚，出行复悠悠。" + "</br>");
            document.write("女子今有行，大江溯轻舟。" + "</br>");
            document.write("尔辈苦无恃，抚念益慈柔。" + "</br>");
            document.write("幼为长所育，两别泣不休。" + "</br>");
            document.write("对此结中肠，义往难复留！" + "</br>");
            document.write("自小阙内训，事姑贻我忧。" + "</br>");
            document.write("赖兹托令门，仁恤庶无尤。" + "</br>");
            document.write("贫俭诚所尚，资从岂待周？" + "</br>");
            document.write("孝恭遵妇道，容止顺其猷。" + "</br>");
            document.write("别离在今晨，见尔当何秋。" + "</br>");
            document.write("居闲始自遣，临感忽难收。" + "</br>");
            document.write("归来视幼女，零泪缘缨流。" + "</br>");
        };
    </script>
</body>

</html>
