<!doctype html>
<html lang="en">
 <head>
  <meta charset="UTF-8">
  <style type="text/css">
  h1{
  color:cyan;
  font-size:50px;
  width:600px;}
  input{
  font-size:25px;
  color:pink;}
  </style>
 </head>
 <body>  
 <input type="button" value="点击出现古诗内容" >
  <h1>韦庄：菩萨蛮</h1>
  <script>
   var headline=document.querySelector("h1");
   var button=document.querySelector("input");
   button.onclick=function(){
     headline.textContent="人人尽说江南好，游人只合江南老。春水碧于天，画船听雨眠。垆边人似月，皓腕凝霜雪。未老莫还乡，还乡须断肠。";
   };
  </script>
 </body>
</html>
