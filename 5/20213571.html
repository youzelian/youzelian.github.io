<!doctype html>
<html lang="en">
 <head>
  <meta charset="UTF-8">
  <style type="text/css">
  h1{
  color:skyblue;
  font-size:50px;
  width:600px;}
  input{
  font-size:25px;
  color:pink;}
  </style>
 </head>
 <body>  
 <input type="button" value="点击出现古诗内容" >
  <h1>王维：青溪</h1>
  <script>
   var headline=document.querySelector("h1");
   var button=document.querySelector("input");
   button.onclick=function(){
     headline.textContent="言入黄花川，每逐青溪水。随山将万转，趣途无百里。声喧乱石中，色静深松里。漾漾泛菱荇，澄澄映葭苇。我心素已闲，清川澹如此。请留盘石上，垂钓将已矣。";
   };
  </script>
 </body>
</html>
