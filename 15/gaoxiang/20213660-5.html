<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>按钮</title>
</head>
<style>
    h3{
        font-family: fantasy;
        color: aqua;
        
    }
    p{
        font-family: fantasy;
        margin: auto;
        color: aqua;
    }
</style>
<body>
    <h3>按钮在这：</h3>
    <p></p>
    <input type="button" value="点击查看">
    <script>
        var headline = document.querySelector("h3");
        var content = document.querySelector("p");
        var button = document.querySelector("input");
        button.onclick = function(){
           headline.textContent = "静夜思";
           content.textContent = "床前明月光，疑是地上霜。举头望明月，低头思故乡。";
        }
    </Script>
</body>
</html>
