
<!DOCTYPE html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8">
        <title>唐诗三百首</title>
        <style>
            h1{
                text-align: center;
                font-size:60px;
            }
            p{
                text-align: center;
                font-size: 40px;
                width: 12em;
                margin-left: 500px;
            }
            input{
                margin-left: 950px;
                height: 50px;
                width: 100px;
                line-height: 50px;
                font-size: 20px;
            }
            input:hover{
                color:aliceblue;
            }
        </style>
        <script src="https://lijianhong19720904.github.io/ts300.js">
            
        </script>
    </head>
    <body>
        <h1 id="tsTitle">
            标题
        </h1>
        <p id="tsContent">
           内容
        </p>
        <input type="button" value="上一首" id="prev">
        <input type="button" value="下一首" id="next">
        <script>
            var prev=document.getElementById("prev");
            var next=document.getElementById("next");
            var tsTitle=document.getElementById("tsTitle");
            var tsContent=document.getElementById("tsContent");
            var ts=[],i,j=0,h=(i+j);
            var tit=[],con=[];
            for(i=10;i<100;i++)
            {
               p1=ts300.search(i);
               p2=ts300.search(i+1);
               ts[i]=ts300.substring(p1,p2);
            };
            for(i=100;i<320;i++){
                p3=ts300.search(i);
                p4=ts300.search(i+1);
                ts[i]=ts300.substring(p3,p4);
            }
            for(i=10;i<100;i++){
                p6=ts[i].search("\n");
                
                tit[i]=ts[i].substring(2,p6);
                con[i]=ts[i].substring(p6,ts[i].search("\n0"));
                con[99]=ts[99].substring(p6);
            }
            
            for(i=100;i<320;i++){
                p5=ts[i].search("\n");
                tit[i]=ts[i].substring(3,p5);
                con[i]=ts[i].substring(p5);
            }
            i=10;
           
            next.onclick=function(){
                if(i<319){
                    i++;
                }
                else{
                    i=10;
                }
                show(i);
            }
            prev.onclick=function(){
                if(i>10){
                    i--;
                }
                else{
                    i=319;
                }
                show(i);
            }
            function show(i){
                tsTitle.textContent=tit[i];
                tsContent.textContent=con[i];
            };
        </script>
    </body>
</html>
