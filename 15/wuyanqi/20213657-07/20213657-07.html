<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style type="text/css">
body{
    text-align: center;
    font-size: 16px;
 }
 p#tsContent{
     font-size: 2em;
     width:12em;
     margin:auto;
 }
 a{
     font-size: 2em;
     text-decoration: none;
     color:blue;
 }
 a:hover{
     color:blueviolet;
}
</style>
<script type="text/javascript">
var tsTitle = [];
tsTitle[0] ="春思:李白" ;
tsTitle[1] ="望岳:杜甫" ;
tsTitle[2] ="送别:王维" ;
tsTitle[3] ="塞下曲:王昌龄" ;

var tsContent = ["燕草如碧丝，秦桑低绿枝。当君怀归日，是妾断肠时。 春风不相识，何事入罗帏。","岱宗夫如何？齐鲁青未了。造化钟神秀，阴阳割昏晓。荡胸生曾云，决眦入归鸟。会当凌绝顶，一览众山小。","下马饮君酒，问君何所之？君言不得意，归卧南山陲。但去莫复问，白云无尽时。","饮马渡秋水，水寒风似刀。平沙日未没，黯黯见临洮。昔日长城战，咸言意气高。黄尘足今古，白骨乱蓬蒿。"];
</script>
<body>
    <h1 id="tsTitle">标题</h1>
    <p id="tsContent">内容</p>
    <div>
        <input type="button" value="上一页" id="prev">
        <input type="button" value="下一页" id="next">
    </div>
    <script type="text/javascript">
        var h1Dom = document.querySelector("h1#tsTitle");
        var pDom = document.querySelector("p#tsContent");
        h1Dom.textContent = tsTitle[0];
        pDom.textContent = tsContent[0];
        var i = 0;
        document.querySelector("input#next").onclick = function(){
            if(i < tsTitle.length-1){
                i++;
            }
            else{
                h1Dom.textContent = tsTitle[0];
                pDom.textContent = tsContent[0];
                i=0;
            }
            h1Dom.textContent = tsTitle[i];
            pDom.textContent = tsContent[i];
        };
        document.querySelector("input#prev").onclick = function(){
            if(i > 0){
                i--;
            }
            else{
                h1Dom.textContent = tsTitle[3];
                pDom.textContent = tsContent[3];
                i=3;
            }
            h1Dom.textContent = tsTitle[i];
            pDom.textContent = tsContent[i];
            
        };
    </script>
    <a href="http://www.dzkbw.com/gushi/tssbs/">更多诗集</a>
</body>
</html>
