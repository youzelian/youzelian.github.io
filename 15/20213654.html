<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>button的使用</title>
    <style>
        input {
            font-size: 20px;
            font-family: "Micrsort yahei";
            text-align: right;
        }

    </style>
</head>

<body>
    <input type = "button" value = "点击显示古诗">
    <h2> </h2>
    <script>       
        var bt = document.querySelector("input") ;   
        var headline = document.querySelector("h2");
        bt.onclick = function(){
            headline.textContent = "洞房昨夜停红烛，待晓堂前拜舅姑。 妆罢低声问夫婿，画眉深浅入时无.";
        }
    </script>
    
</body>

</html>
