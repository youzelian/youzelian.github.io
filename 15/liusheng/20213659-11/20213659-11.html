<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>我的计算器</title>
    <style type="text/css">
        input{
            border: outset 8px solid;
            border-radius: 8px;
            width: 50px;
            height: 50px;
            font-size: 25px;
            text-align: center;
            margin: 10px;
            color: rgb(50, 250, 0);
            background-color: rgb(100, 100, 100);
            cursor: pointer;
        }

        input:hover{
            background-color: rgb(190,190,190);
        }
        input:active{
            color: rgb(250,250,250);
            border: inset 250px solid;
        }
        input#output{
            display: block;
            width: 260px;
        }
    </style>
</head>
<body>
    <h1>普 教 计 算 器</h1>
    <input type="text" value="" id="output">
    <script>
        var SYMBOL =
        ['1/x','x*x','√x','/','7','8','9','*','4','5','6','-','1','2','3','+','<-','0','.','='];

        for(var i=0;i<SYMBOL.length/4;i++){
            var div = document.createElement('div');
            for(var j=0; j<4; j++){
                if(i*4 + j <SYMBOL.length){
                    var input = document.createElement('input');
                    input.type = "button";
                    input.value = SYMBOL[i*4 + j];
                    div.appendChild(input);
                }
            }

            document.body.appendChild(div);
        }
    </script>
</body>
</html>
