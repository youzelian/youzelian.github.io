<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>button的使用</title>
    <style>
        input {
            font-size: 20px;
            font-family: "Micrsort yahei";
            text-align: right;
        }
    </style>
</head>

<body>
    <input type="button" value="古诗">
    <input class ="demo" type="button" value="原神">
    <h2> </h2>




    <script>       
        var bt = document.querySelector("input") ; 
        var ba = document.querySelector(".demo") ; 
        var headline = document.querySelector("h2");
        ba.onclick = function(){
            headline.textContent = "在七种元素交汇的大陆——「提瓦特」，每个人都可以成为神。";
        }

        bt.onclick = function(){
         
           
            headline.textContent = "赠汪伦 李白（唐代） 李白乘舟将欲行，忽闻岸上踏歌声。桃花潭水深千尺，不及汪伦送我情。";
        }
        

    </script>
     



</body>

<html>
