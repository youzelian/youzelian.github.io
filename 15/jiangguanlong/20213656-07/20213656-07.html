		p {

		}

		input {
			color: rgb(255, 0, 0);
			width: 100px;
			height: 50px;

			font-size: 25px;
			line-height: 50px;
		}

		input:hover {
			color: azure;
			background-color: rgb(243, 71, 71);
		}

		div {
			text-align: right;
		}

		a {
			color: red;
		}

		a:hover {
			color: black;
	</style>
	<script>
		var a = [];
		a[1] = "赠汪伦";
		a[2] = "望庐山瀑布";
		a[3] = "黄鹤楼送孟浩然之广陵"
		var b = [];
		b[1] = "李白乘舟将欲行，忽闻岸上踏歌声。桃花潭水深千尺，不及汪伦送我情。";
		b[2] = "日照香炉生紫烟，遥望瀑布挂前川。飞流直下三千尺，疑是银河落九天。";
		b[3] = "故人西辞黄鹤楼，烟花三月下扬州。孤帆远影碧空尽，唯见长江天际流。";
	</script>

</head>

<body background="../图片img/唐诗.jpg">

	<h1>赠汪伦</h1>
	<h4> ——李白</h4>
	<p id="ppp">李白乘舟将欲行，忽闻岸上踏歌声。桃花潭水深千尺，不及汪伦送我情。</p>
	<div><input type="button" value="上一首" id="bt2"></div>
	<div><input type="button" value="下一首" id="bt1"></div>

	<script>

		var h1 = document.querySelector("h1");
		var bt1 = document.querySelector("input#bt1");
		var bt2 = document.querySelector("input#bt2");
		var p = document.querySelector("p#ppp");
		var i = 1;
		bt1.onclick = function () {
			if (i < a.length - 1) {
				i++;
			}
			h1.textContent = a[i];
			p.textContent = b[i];
		}
		bt2.onclick = function () {
			if (i > 1) {
				i--;
			}
			h1.textContent = a[i];
			p.textContent = b[i];
		}
	</script>

</body>
