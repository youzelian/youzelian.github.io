<!DOCTYPE html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8">
        <title>唐诗三百首</title>
        <style>
            h1{
                color:rgb(232, 32, 32);
                text-align: center;
                font-size:70px;
                background: rgb(118, 230, 236);
            }
            p{
                color:rgb(246, 170, 77);
                text-align: center;
                font-size: 40px;
                width: 12em;
                margin-left: 500px;
            }
            input{
                margin-left: 950px;
                height: 50px;
                width: 100px;
                color:rgb(246, 67, 67);
                background:white;
                line-height: 50px;
                font-size: 20px;
                
            }
            input:hover{
                color:aliceblue;
                background-color: rgb(246, 67, 67);
            }
        </style>
        <script src="ts300.js">
            
        </script>
    </head>
    <body>
        <h1 id="tt">
            唐诗三百首
        </h1>
        <p id="ct">
           
        </p>
        <input type="button" value="上一首" id="prev">
        <input type="button" value="下一首" id="next">
        <script>
            var prev=document.getElementById("prev");
            var next=document.getElementById("next");
            var tt=document.getElementById("tt");
            var ct=document.getElementById("ct");
            var ts=[],i,j=0,h=(i+j);
            var tit=[],con=[];
            for(i=10;i<100;i++)
            {
               p1=ts300.search(i);
               p2=ts300.search(i+1);
               ts[i]=ts300.substring(p1,p2);
            };
            for(i=100;i<=320;i++){
                p3=ts300.search(i);
                p4=ts300.search(i+1);
                ts[i]=ts300.substring(p3,p4);
            }
            for(i=10;i<100;i++){
                p6=ts[i].search("\n");
                
                tit[i]=ts[i].substring(2,p6);
                con[i]=ts[i].substring(p6,ts[i].search("\n0"));
                con[99]=ts[99].substring(p6);
            }
            for(i=100;i<=320;i++){
                p5=ts[i].search("\n");
                tit[i]=ts[i].substring(3,p5);
                con[i]=ts[i].substring(p5);
            }
            i=10;
           
            
            next.onclick=function(){
                if(i<320){
                    i++;
                }
                else if(i=320){
                    i=10;
                }
                show(i);
            }
            prev.onclick=function(){
                if(i>10){
                    i--;
                }
                else if(i=10){
                    i=320;
                }
                show(i);
            }
            function show(i){
                tt.textContent=tit[i];
                ct.textContent=con[i];
            }






        </script>











    </body>
</html>
