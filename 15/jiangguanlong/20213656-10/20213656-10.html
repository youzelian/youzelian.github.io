<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>唐诗三百首</title>
    <style>
        body{
            text-align: center;
        }
        h1 {

            color: rgb(232, 32, 32);
            text-align: center;
            font-size: 70px;
            background: rgb(118, 230, 236);
        }

        p {
            color: rgb(246, 170, 77);
            text-align: center;
            font-size: 40px;
            width: 12em;
            margin-left: 500px;
        }

        div input {
            /* margin-left: 950px; */
            margin: 1px 2em;
            /* margin-left: 500px; */
            height: 50px;
            width: 100px;
            color: rgb(246, 67, 67);
            background: white;
            line-height: 50px;
            font-size: 20px;

        }


        input:hover {
            color: aliceblue;
            background-color: rgb(246, 67, 67);
        }
    </style>
    <script src="https://lijianhong19720904.github.io/ts300.js">

    </script>
</head>

<body>
    <div>
        <input type="button" value="上一首" id="prev">
        <input type="button" value="下一首" id="next">
        <input type="button" value="抽一首" id="random">
    </div>
    <h1 id="tt">
        唐诗三百首
    </h1>
    <p id="ct">

    </p>

    <script>

        var ts = [], i, j = 0, h = (i + j);
        var tit = [], con = [];



        for (i = 10; i <= 320; i++) {
            p1 = ts300.search(tostring(i));
            p2 = ts300.search(tostring(i + 1));
            if (p1 != -1 && p2 != -1) {
                ts[i] = ts300.substring(p1, p2);
            }
            ts[i]=ts300.substring(p1);


        };

        function tostring(i) {
            if (i < 100) {
                return ('0' + i);
            }
            else {
                return (i);
            }
        }
        console.log(ts.length);

        for (i = 10; i <= 320; i++) {
            if (ts[i] === undefined) {

                console.log('undefined:' + i);
                ts[i] = ts[ts.length - 1];
                ts.pop;
            }
            else {


                p6 = ts[i].search("\n");

                tit[i] = ts[i].substring(3, p6);
                con[i] = ts[i].substring(p6);
                

            }

        }
        function show(i) {
            var prev = document.getElementById("prev");
            var next = document.getElementById("next");
            var tt = document.getElementById("tt");
            var ct = document.getElementById("ct");
            var random = document.getElementById("random");
            var abc=document.createElement("p");
            tt.textContent = tit[i];
            ct.textContent = con[i];
            

        }

        next.onclick = function () {
            if (i < 320) {
                i++;
            }
            else if (i = 320) {
                i = 10;
            }
            show(i);
        }
        prev.onclick = function () {
            if (i > 10) {
                i--;
            }
            else if (i = 10) {
                i = 320;
            }
            show(i);
        }
        random.onclick = function () {
            var rd = Math.random() * ts.length - 1;
            i = Math.floor(Math.random() * ts.length - 1);
            show(i);
        }











    </script>











</body>

</html>
