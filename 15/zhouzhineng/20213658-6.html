<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>古诗浏览</title>
    <style>
        body {
            text-align: center;
        }

        p {
            font-size: 20px;
            width: 160px;
            margin: auto;
            line-height: 50px;
        }

        input {
            font-size: 2em;
            cursor: pointer;
        }
    </style>

    <script>
        var title = ["黄鹤楼送孟浩然之广陵", "望庐山瀑布", "赠汪伦"];
        var poem = ["故人西辞黄鹤楼，烟花三月下扬州。孤帆远影碧空尽，唯见长江天际流。",
            "日照香炉生紫烟，遥看瀑布挂前川。 飞流直下三千尺，疑是银河落九天。",
            "李白乘舟将欲行，忽闻岸上踏歌声。桃花潭水深千尺，不及汪伦送我情。"]
    </script>
</head>

<body>
    <input type="button" value="上一首" id="prev">
    <input type="button" value="下一首" id="next">
    <h1>望庐山瀑布 </h1>
    <h2> 唐朝 李白 </h2>
    <p> 日照香炉生紫烟，遥看瀑布挂前川。
        飞流直下三千尺，疑是银河落九天。
    </p>
    <script>
        var head = document.querySelector("h1");
        var content = document.querySelector("p");
        var prevBt = document.querySelector("input#prev");
        var nextBt = document.querySelector("input#next");

        head.textContent = title[1];
        content.textContent = poem[1];
        var i = 1;


        prevBt.onclick = function(){   
            if(i==0){;}
            else if(i == 1) {
                head.textContent = title[0];
                content.textContent = poem[0];  
                i = 0;
            }
            else {
                head.textContent = title[1];
                content.textContent = poem[1];  
                i = 1;
            }
        }

        nextBt.onclick = function(){
            if(i==2){;}
            else if(i == 0) {
                head.textContent = title[1];
                content.textContent = poem[1];  
                i = 1
            }
            else {
                head.textContent = title[2];
                content.textContent = poem[2];      
                i = 2;
            }
                
        }
 


    </script>

</body>

</html>
