<!doctype html>
<html lang="en">
 <head>
  <meta charset="UTF-8">
  <title>20213600-6</title>
  <style type="text/css">
	input{
	width:150px;
	height:60px;
	border:none;
	font-size:30px;
	background:#00ccff;
	color:white;
	}
	div{
	height:80px;
	}
	h1{
    color:#ff3333;
    text-align:center;
    font-family:"楷体";
    font-size:4.5em;
    }
    h2{
    text-align:center;
    font-size:3em;
    }
    p{
    color:#3366ff;
    text-align:center;
    font-family:"楷体";
	font-size:50px;
	width:350px;
	line-height:58px;
	margin:auto;
  }
  </style>
 </head>
 <body>
  <div>
   <div style="float:left">
    <input type="button" value="上一首" onclick="" id="m">
   </div>
   <div style="float:right">
    <input type="button" value="下一首" onclick="" id="n">
   </div>
 </div>
 <h1></h1>
 <h2></h2>
 <p></p>
<script type="text/javascript">
	var a=[];
	a[1]="送春";
	a[2]="望庐山瀑布";
	a[3]="登飞来峰";
	var b=[];
	b[1]="王令";
	b[2]="李白";
	b[3]="王安石";
	var c=[];
	c[1]="三月残花落更开 小檐日日燕飞来 子规夜半犹啼血 不信东风唤不回";
	c[2]="日照香炉生紫烟 遥看瀑布挂前川 飞流直下三千尺 疑是银河落九天";
	c[3]="飞来山上千寻塔 闻说鸡鸣见日升 不畏浮云遮望眼 只缘身在最高层";
	var x=0;
	var q=document.querySelector("h1");
	var w=document.querySelector("h2");
	var e=document.querySelector("p");
	m.onclick=function(){
    if(x<=1){
			x=3;			
			}
	else{
		x--;
		}
	q.textContent=a[x];
	w.textContent=b[x];
	e.textContent=c[x];
	}
	n.onclick=function(){
	if(x>=3){
			x=1;			
			}
	else{
		x++;
		}
	q.textContent=a[x];
	w.textContent=b[x];
	e.textContent=c[x];
	}
</script>
  
 </body>
</html>
