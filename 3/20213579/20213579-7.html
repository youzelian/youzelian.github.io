 <div id="tsContent">
010杜甫：佳人绝代有佳人，幽居在空谷。自云良家子，零落依草木。关中昔丧乱，兄弟遭杀戮。官高何足论，不得收骨肉。世情恶衰歇，万事随转烛。夫婿轻薄儿，新人美如玉。合昏尚知时，鸳鸯不独宿。但见新人笑，那闻旧人哭！在山泉水清，出山泉水浊。侍婢卖珠回，牵萝补茅屋。摘花不插发，采柏动盈掬。天寒翠袖薄，日暮倚修竹。
</div>
<input type="button" value="上一页" id="prev">
<input type="button" value="下一页" id="next">
 </body>
<script>
	//var h1Dom = document.querySelector("h1");
	var contentDom = document.querySelector("div#tsContent");
	var prev = document.getElementById("prev");
	var next = document.getElementById("next");
    var poet = "010杜甫：佳人\n\n绝代有佳人，幽居在空谷。\n自云良家子，零落依草木。\n关中昔丧乱，兄弟遭杀戮。\n官高何足论，不得收骨肉。\n世情恶衰歇，万事随转烛。\n夫婿轻薄儿，新人美如玉。\n合昏尚知时，鸳鸯不独宿。\n但见新人笑，那闻旧人哭！\n在山泉水清，出山泉水浊。\n侍婢卖珠回，牵萝补茅屋。\n摘花不插发，采柏动盈掬。\n天寒翠袖薄，日暮倚修竹。\n\n011杜甫：梦李白二首之一\n\n死别已吞声，生别常恻恻。\n江南瘴疠地，逐客无消息。\n故人入我梦，明我长相忆。\n君今在罗网，何以有羽翼？\n恐非平生魂，路远不可测。\n魂来枫林青，魂返关塞黑。\n落月满屋梁，犹疑照颜色。\n水深波浪阔，无使蛟龙得。\n\n012杜甫：梦李白二首之二\n\n浮云终日行，游子久不至。\n三夜频梦君，情亲见君意。\n告归常局促，苦道来不易。\n江湖多风波，舟楫恐失坠。\n出门搔白首，若负平生志。\n冠盖满京华，斯人独憔悴。\n孰云网恢恢，将老身反累。\n千秋万岁名，寂寞身后事。\n\n013王维：送别\n\n下马饮君酒，问君何所之。\n君言不得意，归卧南山陲。\n但去莫复闻，白云无尽时。\n\n014王维：送綦毋潜落第还乡\n\n圣代无隐者，英灵尽来归。\n遂令东山客，不得顾采薇。\n既至金门远，孰云吾道非？\n江淮度寒食，京洛缝春衣。\n置酒长安道，同心与我违。\n行当浮桂棹，未几拂荆扉。\n远树带行客，孤城当落晖。\n吾谋适不用，勿谓知音稀。\n\n015王维：青溪\n\n言入黄花川，每逐青溪水。\n随山将万转，趣途无百里。\n声喧乱石中，色静深松里。\n漾漾泛菱荇，澄澄映葭苇。\n我心素已闲，清川澹如此。\n请留盘石上，垂钓将已矣。\n\n016王维：渭川田家\n\n斜光照墟落，穷巷牛羊归。\n野老念牧童，倚杖候荆扉。\n雉［句隹］麦苗秀，蚕眠桑叶稀。\n田夫荷锄立，相见语依依。\n即此羡闲逸，怅然吟式微。\n\n017王维：西施咏\n\n艳色天下重，西施宁久微。\n朝为越溪女，暮作吴宫妃。\n贱日岂殊众，贵来方悟稀。\n邀人傅脂粉，不自著罗衣。\n君宠益娇态，君怜无是非。\n当时浣纱伴，莫得同车归。\n持谢邻家子，效颦安可希！\n\n018孟浩然：秋登兰山寄张五\n\n北山白云里，隐者自怡悦。\n相望始登高，心随雁飞灭。\n愁因薄暮起，兴是清秋发。\n时见归村人，沙行渡头歇。\n天边树若荠，江畔洲如月。\n何当载酒来，共醉重阳节。\n\n019孟浩然：夏日南亭怀辛大\n\n山光忽西落，池月渐东上。\n散发乘夜凉，开轩卧闲敞。\n荷风送香气，竹露滴清响。\n欲取鸣琴弹，恨无知音赏。\n感此怀故人，中宵劳梦想。\n\n020孟浩然：宿业师山房待丁大不至\n\n夕阳度西岭，群壑倏已暝。\n松月生夜凉，风泉满清听。\n樵人归欲尽，烟鸟栖初定。\n之子期宿来，孤琴候萝径。\n\n"
	var p = [];
	var s = [];//存放诗并输出的数组
	var j = 0;//控制数组的多少
	var k = 0;//控制按钮翻页
	var i = 0;
	for(j=0;j<20;j++)
	{
		p[j] = poet.search(i);
		//t[j] = a.search(i);//找到标题的索引
		i = i*1 + 1 //让i成为数字后加1
		p[j+1] = poet.search(i);
		//Title[j] = a[t[j]];
		s[j] = poet.substring(p[j],p[j+1]);//将每首诗放到一个数组中
		
	}
	prev.onclick = function(){
			if(k==0){
		k=291;//实现诗歌首尾连接
			}
			if(k>0)
		{
			k--;
			}
		
		//h1Dom.textContent = Title[k];
		contentDom.textContent = s[k];
	
		}

	next.onclick = function(){
		if(k<s.length-1)
		{
			k++;
			}
		if(k==290){
		k=0;//实现诗歌首尾连接
		}
		//h1Dom.textContent = Title[k];
		contentDom.textContent = s[k];
			}
		
</script>
