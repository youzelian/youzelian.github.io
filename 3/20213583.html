<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            border: 2px solid red ;
            width: 100% ;
        }
        div{
            border: 1px solid blue;
        }
        div#header{
            height: 15% ;
            font-size: 30px ;
            font-weight: bolder ;/*加粗*/
            background-color: aquamarine;
        }
        div#nav{
            height: 30% ;
            background-color: rgba(200,50,4,0.3);
        }
        div#article{
            height: 30% ;
            font-size: 50px ;
            background-color: rgba(170,100,120,0.5);
        }
        div#footer{
            height: 25% ;
            font-size: 30px ;
            color: red ;
            text-align: center ;
            background-color: rgba(9,100,200,0.3);

        }
        a{
            text-decoration: none ;
            font-size: 40px ;
        }
        a:hover{
            cursor: pointer ;
            color: blue ;
        }
        a:visited{
            color: gray ;
        }
    </style>
</head>
<body>
    <div id="header">
        锲而舍之，朽木不折；锲而不舍，金石可镂。——荀况
    </div>
    <div id="nav">
        
    </div>
    <div id="article">
        
    </div>
    <div id="footer">
        20213583 万一苇 21计科1班 13970051366
    </div>
</body>
<script>
     document.body.style.height = window.innerHeight  - 30 + 'px' ;//获取网页的高度并赋值给body的height
     var famouseWord = ["人生就像奕棋，一步失误，全盘皆输。——弗洛伊德","想成功，你必须自我制造机会，绝不能愚蠢地坐在路边，等待有人经过，邀请你同往财富与幸福之路。——歌夫","我所学到的任何有价值的知识都是由自学中得来的。——达尔文","当你的期望一个个落空，你也要坚定，要沉着！——朗费罗","人背信则名不达。——刘向","恢弘志士之气，不宜妄自菲薄。——诸葛亮","在人生的道路上，当你的期望一个个落空的时候，你也要坚定，要沉着。——朗费罗","友谊是灵魂的结合，这个结合是能够离异的，这是两个敏感，正直的人之间心照不宣的契约。——伏尔泰","锲而舍之，朽木不折；锲而不舍，金石可镂。——荀况"] ;//名人名言
     var i = 0;
     var l = 0
     function showFW(){
         var divDom = document.getElementById("header") ;//获取Id为header的对象
         divDom.textContent = famouseWord[l] ;//用数组里的内容替换原本divDom里的内容
         if(l < famouseWord.length - 1){
             l++ ;
         }else{
            l = 0
         }
         window.setTimeout(showFW,2000) ;//递归该函数，并5s变换一次名人名言
     }//showFW结束
         window.setTimeout(showFW,2000) ;//当i再次等于0时，上面的递归结束，下面重新开始
         //header部分结束

         var navDom = document.getElementById("nav") ;//获取Id为nav的对象
         var Name = ["第二次作业 ","第三次作业 ","第四次作业 ","第五次作业 ","第六次作业 ","第七次作业 ","第八次作业 ","第九次作业 ","第十次作业 ","第十一次作业 ","第十二次作业 ","第十三次作业 ","第十四次作业 ","第十五次作业 ","第十六次作业 "] ;
         for(i = 0 ; i < Name.length / 4 ; i++){
             var div = document.createElement("div") ;
             for(var j = 0 ; j < 4 ; j++){             
                if(i * 4 + j < Name.length){
                    var a = document.createElement("a") ;
                    a.innerText = Name[i * 4 + j] ;//a的内容
                    a.href = "20213583/20213583-" + eval(i * 4 + j + 2) +".html";//a所链接的超链接
                    a.target = "_blank" ;//点击链接后添加一个新的空白页打开
                }//判断结束
                div.appendChild(a) ;//将a添加到div中
             }//循环结束
             navDom.appendChild(div) ;//将div添加到navDom中
         }//循环结束

         var aT = document.querySelectorAll("a") ;
         for(i = 0 ; i < Name.length ; i++){
            aT[i].onmouseover = function(){//当鼠标移到a标签上时
             var articleDom = document.getElementById("article") ;
             articleDom.textContent = this.innerText ;//将标签里的内容赋给articleDom
         } ;

            aT[i].onmouseout = function(){//当鼠标移出a标签时
            var articleDom = document.getElementById("article") ;
             articleDom.textContent = "" ;
          }
    }
       

</script>
</html>
