<h3>作者简介<h3>
</a>
王维（701年－761年，一说699年—761年），唐朝河东蒲州（今山西运城）人，祖籍山西祁县，唐朝著名诗人、画家，字摩诘，号摩诘居士。开元十九年（731年），王维状元及第。历官右拾遗、监察御史、河西节度使判官。唐玄宗天宝年间，王维拜吏部郎中、给事中。安禄山攻陷长安时，王维被迫受伪职。长安收复后，被责授太子中允。唐肃宗乾元年间任尚书右丞，故世称“王右丞”。
