  <title>啊哈</title>
 <style>
        div{
		    font-size:25px;
			margin:auto;
		    width:300px;	
		}
		h1{
			font-size:30px;

		      width:100%;

 <body>
<h1>杜甫：佳人</h1>	
  <div>
绝代有佳人，幽居在空谷。
自云良家子，零落依草木。
关中昔丧乱，兄弟遭杀戮。
官高何足论，不得收骨肉。
世情恶衰歇，万事随转烛。
夫婿轻薄儿，新人美如玉。
合昏尚知时，鸳鸯不独宿。
但见新人笑，那闻旧人哭！
在山泉水清，出山泉水浊。
侍婢卖珠回，牵萝补茅屋。
摘花不插发，采柏动盈掬。
天寒翠袖薄，日暮倚修竹。 
  </div>
  <input type="button" value="上一页" id="O">
  <input type="button" value="下一页" id="o">
 </body>
 <script>
        var A=document.querySelector("h1");
		var B=document.querySelector("div");
		var I=1;
	    var C=document.getElementById("O");
	    var D=document.getElementById("o");
        C.onclick=function (){
				  if(I==1){
						   A.textContent="杜甫：佳人";
						   B.textContent="绝代有佳人，幽居在空谷。"+
								        "自云良家子，零落依草木。"+

									    "侍婢卖珠回，牵萝补茅屋。"+
									    "摘花不插发，采柏动盈掬。"+
									    "天寒翠袖薄，日暮倚修竹。";
				  };
				  if(I==2){
						    A.textContent="孟浩然：夏日南亭怀辛大";
						    B.textContent="山光忽西落，池月渐东上。"+
                                         "散发乘夜凉，开轩卧闲敞。"+
                                         "荷风送香气，竹露滴清响。"+
                                         "欲取鸣琴弹，恨无知音赏。"+
                                         "感此怀故人，中宵劳梦想。";
										 I--;
				   };		
		 };
         D.onclick=function (){
			       if(I==2){
					        A.textContent="王维：渭川田家";
						    B.textContent="斜光照墟落，穷巷牛羊归。"+

                                         "田夫荷锄立，相见语依依。"+
                                         "即此羡闲逸，怅然吟式微。";
