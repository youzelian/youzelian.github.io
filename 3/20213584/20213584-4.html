 <body>
    <div id="new1">
		<h1>
		  如梦令·昨夜雨疏风骤
		</h1>
		<h2>
		  【宋】李清照
		</h2>
		<p>
		  昨夜雨疏风骤，浓睡不消残酒。<br>
		  试问卷帘人，却道海棠依旧。<br>
	      知否，知否？应是绿肥红瘦。<br>
		</p>
    </div>
    <div id="new2">
	    <ol>
           <li>译文：昨天夜里雨点虽然稀疏，但是风却劲吹不停。我酣睡一夜，然而醒来之后依然觉得还有一点酒意没有消尽。于是就问正在卷帘的侍女，外面的情况如何，她说海棠花依然和昨天一样。你可知道，你可知道，这个时节应该是绿叶繁茂，红花凋零了。</li>
