var poet="224王维：鹿柴\n空山不见人，但闻人语响。\n返景入深林，复照青苔上。\n225王维：竹里馆\n独坐幽篁里，弹琴复长啸。\n深林人不知，明月来相照。\n226王维：送别\n山中相送罢，日暮掩柴扉。\n春草明年绿，王孙归不归？\n227王维：相思\n红豆生南国，春来发几枝？\n愿君多采撷，此物最相思。\n228王维：杂诗\n君自故乡来，应知故乡事。\n来日绮窗前，寒梅著花未？\n229裴迪：送崔九\n归山深浅去，须尽丘壑美。\n莫学武陵人，暂游桃源里。\n230祖咏：终南望馀雪\n终南阴岭秀，积雪浮云端。\n林表明霁色，城中增暮寒。\n231孟浩然：宿建德江\n移舟泊烟渚，日暮客愁新。\n野旷天低树，江清月近人。\n232孟浩然：春晓\n春眠不觉晓，处处闻啼鸟。\n夜来风雨声，花落知多少？\n233李白：夜思\n床前明月光，疑是地上霜。\n举头望明月，低头思故乡。\n234李白：怨情\n美人卷珠帘，深坐蹙蛾眉。\n但见泪痕湿，不知心恨谁？\n235杜甫：八阵图\n功盖三分国，名成八阵图。\n江流石不转，遗恨失吞吴。\n236王之涣：登鹳雀楼\n白日依山尽，黄河入海流。\n欲穷千里目，更上一层楼。\n237刘长卿：送灵澈\n苍苍竹林寺，杳杳钟声晚。\n荷笠带斜阳，青山独归远。\n238刘长卿：弹琴\n泠泠七弦上，静听松风寒。\n古调虽自爱，今人多不弹。\n239刘长卿：送上人\n孤云将野鹤，岂向人间住！\n莫买沃洲山，时人已知处。\n240韦应物：秋夜寄邱员外\n怀君属秋夜，散步咏凉天。\n空山松子落，幽人应未眠。\n241李端：听筝\n鸣筝金粟柱，素手玉房前。\n欲得周郎顾，时时误拂弦。\n242王建：新嫁娘\n三日入厨下，洗手作羹汤。\n未谙姑食性，先遣小姑尝。\n243权德舆：玉台体\n昨夜裙带解，今朝［虫喜］子飞。\n铅华不可弃，莫是藁砧归。\n244柳宗元：江雪\n千山鸟飞绝，万径人踪灭。\n孤舟蓑笠翁，独钓寒江雪。\n245元稹：行宫\n寥落古行宫，宫花寂寞红。\n白头宫女在，闲坐说玄宗。\n246白居易：问刘十九\n绿蚁新醅酒，红泥小火炉。\n晚来天欲雪，能饮一杯无？\n247张祜：何满子\n故国三千里，深宫二十年。\n一声何满子，双泪落君前。\n248李商隐：登乐游原\n向晚意不适，驱车登古原。\n夕阳无限好，只是近黄昏。\n249贾岛：寻隐者不遇\n松下问童子，言师采药去。\n只在此山中，云深不知处。\n250李频：渡汉江\n岭外音书绝，经冬复立春。\n近乡情更怯，不敢问来人。\n251金昌绪：春怨\n打起黄莺儿，莫教枝上啼。\n啼时惊妾梦，不得到辽西。\n252西鄙人：哥舒歌\n北斗七星高，哥舒夜带刀。\n至今窥牧马，不敢过临洮。\n253崔颢：长干行二首之一\n君家何处住，妾住在横塘。\n停船暂借问，或恐是同乡。\n254崔颢：长干行二首之二\n家临九江水，来去九江侧。\n同是长干人，生小不相识。\n255李白：玉阶怨\n玉阶生白露，夜久侵罗袜。\n却下水晶帘，玲珑望秋月。\n256卢纶：塞下曲四首之一\n鹫翎金仆姑，燕尾绣蝥弧。\n独立扬新令，千营共一呼。\n257卢纶：塞下曲四首之二\n林暗草惊风，将军夜引弓。\n平明寻白羽，没在石棱中。\n258卢纶：塞下曲四首之三\n月黑雁飞高，单于夜遁逃。\n欲将轻骑逐，大雪满弓刀。\n259卢纶：塞下曲四首之四\n野幕蔽琼筵，羌戎贺劳旋。\n醉和金甲舞，雷鼓动山川。\n260李益：江南曲\n嫁得瞿塘贾，朝朝误妾期。\n早知潮有信，嫁与弄潮儿。"
