<html>
<body bgcolor=Silver>
<input type ="button" value="上一首" id="prev">
<input type ="button" value="下一首" id="next">
<p id="tsTitle">
</p>
<h1 id="tsContent">
</h1>
<script type="text/javascript">
var title=document.querySelector("p");
var content=document.querySelector("h1");
var prevBt=document.querySelector("input#prev");
var nextBt=document.querySelector("input#next");
var begin=10,
	end=320,
	i,
	k,
	p1,
	p2;
var ts=[],
	tsTitle=[],
	tsContent=[];
for (i=0;i<end-begin ;i++ ){			//诗句循环
	p1=ts300.search(toString(i+begin));//重点查找
	p2=ts300.search(toString(i+1+begin));
	ts[i]=ts300.substring(p1,p2);
}
function toString(i){			//当i<100时，他为0+数字，所以要特殊限制一下
		if (i<100)
		{
			return '0'+i;
		}else {
			return i+'';
		}
	}
	console.log(ts.length);		
for (i=0;i<ts.length ;i++ ){
	p1=0;
	p2=ts[i].search("\n");
	tsTitle[i]=ts[i].substring(p1,p2);
	tsContent[i]=ts[i].substring(p2);
}
i=0;
showTs(i);
var prevDom=document.getElementById("prev");//导航搜索
var nextDom=document.getElementById("next");
prevDom.onclick=function(){					//诗句反向衔接
		if (i==0)
		{
			i=309;
		}else if (i==166)				//跳过那首不存在的诗句
		{
			i=164;
		}
		i--;
		showTs(i);
}
nextDom.onclick=function(){				//	诗句正向衔接
		if (i==309)
		{
			i=0;
		}else if (i==163)
		{
			i=165;
		}
		i++;
		showTs(i);
}
function showTs(i){			
	var tsTitleDom=document.getElementById("tsTitle");
	var tsContentDom=document.getElementById("tsContent");
		tsTitleDom.textContent=tsTitle[i];
		tsContentDom.textContent=tsContent[i];
		}
</script>
