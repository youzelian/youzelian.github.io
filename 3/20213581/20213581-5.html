<script>
var headline = document.querySelector("h1");
	var bt = document.getElementById("古诗1");
	bt.onclick=function(){
		alert("静夜思-李白");
		headline.textContent ="床前明月光，疑是地上霜。举头望明月，低头思故乡。《静夜思》-李白";};
var headline = document.querySelector("h1");
	var bt = document.getElementById("古诗2");
	bt.onclick=function(){
		alert("望庐山瀑布-李白");
		headline.textContent ="日照香炉生紫烟，遥看瀑布挂前川。飞流直下三千尺，疑是银河落九天。《望庐山瀑布》-李白";};
var headline = document.querySelector("h1");
	var bt = document.getElementById("古诗3");
		bt.onclick=function(){
			alert("赠汪伦-李白");
			headline.textContent ="李白乘舟将欲行，忽闻岸上踏歌声。桃花潭水深千尺，不及汪伦送我情。《赠汪伦-李白》";};
var headline = document.querySelector("h1");
	var bt = document.getElementById("古诗4");
	bt.onclick=function(){
		alert("送杜少府之任蜀州-王勃");
		headline.textContent ="城阙辅三秦，风烟望五津。与君离别意，同是宦游人。海内存知己，天涯若比邻。无为在歧路，儿女共沾巾。《送杜少府之任蜀州》-王勃";};
var headline = document.querySelector("h1");
	var bt = document.getElementById("古诗5");
	bt.onclick=function(){
		alert("卜算子·我住长江头-李之仪");
		headline.textContent ="我住长江头，君住长江尾。日日思君不见君，共饮长江水。此水几时休，此恨何时已。只愿君心似我心，定不负相思意。《卜算子·我住长江头》-李之仪";};
