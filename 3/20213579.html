<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            border: 2px solid red ;
            width: 100% ;
        }
        div{
            border: 1px solid blue;
        }
        div#header{
            height: 15% ;
            font-size: 30px ;
            font-weight: bolder ;/*加粗*/
            background-color: aquamarine;
        }
        div#nav{
            height: 30% ;
            background-color: rgba(200,50,4,0.3);
        }
        div#article{
            height: 30% ;
            font-size: 50px ;
            background-color: rgba(170,100,120,0.5);
        }
        div#footer{
            height: 25% ;
            font-size: 30px ;
            color: red ;
            text-align: center ;
            background-color: rgba(9,100,200,0.3);

        }
        a{
            text-decoration: none ;
            font-size: 40px ;
        }
        a:hover{
            cursor: pointer ;
            color:yellow ;
        }
        a:visited{
            color: gray ;
        }
    </style>
</head>
<body>
    <div id="header">
        我们大家要学习他毫无自私自利之心的精神。从这点出发,就可以变为大有利于人民的人。一个人能力有大小,但只要有这点精神,就是一个高尚的人,一个纯粹的人,一个有道德的人,一个脱离了低级趣味的人,一个有益于人民的人。——毛泽东
    </div>
    <div id="nav">
        
    </div>
    <div id="article">
        
    </div>
    <div id="footer">
        20213583 杨益 21计科1班 15390887187
    </div>
</body>
<script>
     document.body.style.height = window.innerHeight  - 30 + 'px' ;//获取网页的高度并赋值给body的height
     var famouseWord = ["我们的教育方针,应该使受教育者在德育、智育、体育几方面都得到发展,成为有社会主义觉悟的,有文化的劳动者。——毛泽东","房子是应该经常打扫的,不打扫就会积满了灰尘;脸是应该经常洗的,不洗也就会灰尘满面。——毛泽东","人类的历史,就是一个不断地从必然王国向自由王国发展的历史。——毛泽东","为中华崛起而读书。——周恩来","我们爱我们的民族,这是我们自信心的泉源。——周恩来","恢弘志士之气，不宜妄自菲薄。——诸葛亮","在人生的道路上，当你的期望一个个落空的时候，你也要坚定，要沉着。——朗费罗","友谊是灵魂的结合，这个结合是能够离异的，这是两个敏感，正直的人之间心照不宣的契约。——伏尔泰"] ;//名人名言
     var k = 0;

     function showFW(){
         var divDom = document.getElementById("header") ;//获取Id为header的对象
         divDom.textContent = famouseWord[k] ;//用数组里的内容替换原本divDom里的内容
         if(k < famouseWord.length - 1){
             k++ ;
         }
		 else{
            k = 0
         }
         window.setTimeout(showFW,2000) ;//递归该函数，并2s变换一次名人名言
     }//showFW结束
         window.setTimeout(showFW,2000) ;//当i再次等于0时，上面的递归结束，下面重新开始
         //header部分结束

         var navDom = document.getElementById("nav") ;//获取Id为nav的对象
         var Name = ["第二次作业 ","第三次作业 ","第四次作业 ","第五次作业 ","第六次作业 ","第七次作业 ","第八次作业 ","第九次作业 ","第十次作业 ","第十一次作业 ","第十二次作业 ","第十三次作业 ","第十四次作业 ","第十五次作业 ","第十六次作业 "] ;
         for(var i = 0 ; i < Name.length / 4 ; i++){
             var div = document.createElement("div") ;
             for(var j = 0 ; j < 4 ; j++){             
                if(i * 4 + j < Name.length){
                    var a = document.createElement("a") ;
                    a.innerText = Name[i * 4 + j] ;//a的内容
                    a.href = "https://youzelian.github.io/3/20213579/20213579-"+eval(i * 4 + j + 2)+".html";
                    a.target = "_blank" ;//点击链接后添加一个新的空白页打开
                }//判断结束
                div.appendChild(a) ;//将a添加到div中
             }//循环结束
             navDom.appendChild(div) ;//将div添加到navDom中
         }//循环结束

         var aT = document.querySelectorAll("a") ;
         for(var i = 0 ; i < Name.length ; i++){
            aT[i].onmouseover = function(){//当鼠标移到a标签上时
             var articleDom = document.getElementById("article") ;
             articleDom.textContent = this.innerText ;//将标签里的内容赋给articleDom
         } ;

            aT[i].onmouseout = function(){//当鼠标移出a标签时
            var articleDom = document.getElementById("article") ;
             articleDom.textContent = "" ;
          }
    }
       

</script>
</html>
