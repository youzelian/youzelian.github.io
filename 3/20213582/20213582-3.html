   <h1>登高</h1>
   <h2>杜甫</h2>
   <div>
     风急天高猿啸哀，渚清沙白鸟飞回。
     无边落木萧萧下，不尽长江滚滚来。
     万里悲秋常作客，百年多病独登台。
     艰难苦恨繁霜鬓，潦倒新停浊酒杯。
   </div>
	<hr color="red" size="2" width="80%"/><!--添加横线-->
	<h3>译文:<h3>
	<p>
	  风急天高猿猴啼叫显得十分悲哀，水清沙白的河洲上有鸟儿在盘旋。
      无边无际的树木萧萧地飘下落叶，望不到头的长江水滚滚奔腾而来。 　
      悲对秋景感慨万里漂泊常年为客，一生当中疾病缠身今日独上高台。 　
      历尽了艰难苦恨白发长满了双鬓，衰颓满心偏又暂停了消愁的酒杯。
	</p>
