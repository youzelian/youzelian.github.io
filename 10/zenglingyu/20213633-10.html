<!doctype html>
<html lang="en">
 <head>
  <meta charset="UTF-8">
  <title>20213633曾令昱</title>
  <style>
        input {            
			width: 80px;
            height: 80px;
            margin: 0 20px;
            border-radius: 45px;
            cursor:pointer;
			font-size: 25px;
            box-shadow: 6px 6px 3px rgb(90,90,90);
        }        
        input:hover { 		    
			box-shadow: 6px 6px 6px rgb(20,20,20);			
        } 
	    input:active { 
		    border:outset;
			box-shadow: 8px 8px 5px yellow;			
        } 
		h1 {            
			margin: 20px;
            font-size: 70px;
            font-weight: 600px;
            font-family: 华文新魏;
        }
		body {            
            text-align: center;
            font-family: 楷体;
        }
        h2 {
            color:red;
			margin: 20px;
            font-size: 70px;
            font-weight: 600px;
            font-family: 华文新魏;
        }
        p { 
		    white-space: pre-line;
			color:blue;
            font-size: 25px;
            font-family: 楷体;
            line-height: 50px;
        }
  </style>
 <script src = "https://kongzhuoz.github.io/ts300.js">
	
  </script>
 </head>
 <body>

 <h1>
 唐诗三百首
 </h1>

 <input type="button" value="上一首" id = "prev">
 <input type="button" value="抽一首" id = "rand">
 <input type="button" value="下一首" id = "next">

 <h3 id = "tsTitle">

 </h3>

 <p id = "tsContent">

 </p>

  <script type="text/javascript">
	var ts = [] ,
		tsTitle = [] ,
		tsContent = [] ;

	var BEGIN = 10 ,
	    END = 321 ,
		i ,
		p1 ,
		p2 ;

	for (i = 0 ; i < END - BEGIN ; i++ ){
		p1 = ts300.search(i + BEGIN) ;
		p2 = ts300.search(i + 1 + BEGIN) ;
		ts[i] = ts300.substring(p1,p2) ;
	}
	for (i =0 ; i < ts.length ; i++ ){
		if (i<90){
			p1 = 2 ;
		}else
		p1 = 3;
		p2 = ts[i].search("\n") ;
		tsTitle[i] = ts[i].substring(p1,p2) ;
		tsContent[i] = ts[i].substring(p2) ;
	}

  i = 0 ;
  showTs(i);
      
       var prevDom = document.getElementById("prev");
       var nextDom = document.getElementById("next");
	   var randDom = document.getElementById("rand");

  prevDom.onclick = function(){
	  if (i > 0)
	  {
		  i--;
	  }else
	  i = END - BEGIN -1;
	  showTs(i);
  };

  nextDom.onclick = function(){
	  if (i < END - BEGIN - 1)
	  {
		  i++;
	  }else
	  i = 0;
	  showTs(i);
  };
  randDom.onclick = function(){
	  i = Math.floor(Math.random()* (END - BEGIN) );
	  // 返回 0 至 (END - BEGIN -1) 之间的数
	  showTs(i);
  }
  function showTs(){
	  var tsTitleDom = document.getElementById("tsTitle");
	  var tsContentDom = document.getElementById("tsContent");
		 tsTitleDom.textContent = tsTitle[i];
		 tsContentDom.textContent = tsContent[i];
  }

  </script>
 </body>
</html>
