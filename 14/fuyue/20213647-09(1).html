<!doctype html>
<html lang="en">
 <head>
  <meta charset="UTF-8">
  <title>第八次作业</title>
  <style type="text/css">
body
{
font-size:25px;
text-align:center;
font-family:楷体;
}
input
{
cursor:pointer;
transition-duration: 0.4s; /* 检索或设置对象过渡的持续时间 */
background-color:#ccffff;
display: inline-block;
width: 90px;
height: 90px;
font-size: 20px;
border-radius: 10px;/*允许为元素添加圆角边框*/
}
h1,
h2
{
font-size:40px;
 color:#3399ff;
 margin:35px;
}

}
#prev:hover
{
    background-color: #66cc99;
    color: white;
	box-shadow: 0 12px 16px 0 rgba(0,0,0,0.24), 0 17px 50px 0 rgba(0,0,0,0.19);
}
#next:hover
{
    background-color: #66cc99;
    color: white;
	box-shadow: 0 12px 16px 0 rgba(0,0,0,0.24), 0 17px 50px 0 rgba(0,0,0,0.19);
}
#prev:active
{
  background-color: #3e8e41;
  box-shadow: 0 5px #666;
  transform: translateY(4px);/*通过给定Y方向的数目指定一个translation*/
}
#next:active
{
  background-color: #3e8e41;
  box-shadow: 0 5px #666;
  transform: translateY(4px);
}
  </style>

  <script src="ts300.js">
    var ts300 = "  ";
 
  </script>
  </head> 
  <body>
  <input type="button" value="上一首" id="prev">
  <input type="button" value="下一首" id="next">
  <h1 id="tsTitle">
  </h1>
  <p id="tsContent">
  </p>
  <script type="text/javascript">
	var ts = [];
	var tsTitle = [];
	var tsContent = [];
    var Begin = 101,
	    End = 320,
		i,
		p1,
		p2;
   for ( i=0 ; i < End-Begin ; i++ ){
	   p1 = ts300.search(i+Begin);
	   p2 = ts300.search(i+1+Begin);
       ts[i] = ts300.substring(p1,p2);

   }
   for ( i=0; i < ts.length ; i++ ){
	   p1 = 3;
	   p2 = ts[i].search("\n");
	   tsTitle[i] = ts[i].substring(p1,p2);
	   tsContent[i] = ts[i].substring(p2);
   }
    
    i=0;
	showTs(i);
    var prevDom = document.getElementById("prev");
	var nextDom = document.getElementById("next");

	prevDom.onclick = function(){
		showTs(i);
		if (i>0)
		{
			i--;
		}
		else{
			i=218;
		}
	};
	nextDom.onclick = function(){
		
		showTs(i);
		if (i<ts.length-1)
		{
			i++;
		}
		else{
			i=i-218;
		}

	};
	function showTs(i){   
		var tsTitleDom =document.getElementById("tsTitle");
	    var tsContentDom = document.getElementById("tsContent");
	   tsTitleDom.textContent = tsTitle[i];
	   tsContentDom.textContent = tsContent[i];

	};

  </script>
 </body>
</html>
