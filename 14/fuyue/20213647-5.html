    <h1 align="center" style="color: white; font-size:50px;">
        红花会
    </h1>
    <DIV style="color: gold; font-size:25px;" align="center">

        <p>
            红花会是中国西北地区继乱战门之后最具代表性的HIPHOP文化团体之一。红花会于2011年11月5日由弹壳成立。
        </p>
        <p>
            “红花会”之名出自金庸首部小说《书剑恩仇录》， [4]  创立者弹壳(K9999)取名意在团结坚定,战无不胜。
             以此精神为内核的说唱团体红花会以惊人的速度发展壮大，并迅速成为中国最具代表性和号召力的说唱团体之一。
        </p>
        <p>
            团队中不乏在涂鸦、beatbox方面有特长的人才,并且团队幕后还有专业的混音师,制作人,策划人和宣传媒体,是一个完整并多元化的说唱团体。
        </p>
        <p>
            2019年8月6日,红花会宣布团队解散，称“我们原地解散，就此消失”。
        </p>
    </DIV>
