<!doctype html>
<html lang="en">
 <head>
  <meta charset="UTF-8">
  <title>第五次作业</title>
 </head>
 <style type="text/css">
 
body
{
text-align:center;
font-family:楷体;
}
p
 {
 font-size:40px;
 }

 h1,
 h2,
 h3,
 h4,
 h5,
 h6
 {
 text-shadow:2px 2px #999;
 font-size:30px;
 margin:30px;
 letter-spacing:0.6em;
 }

	
#zsy1,
#zsy2,
#zsy3,
#zsy4,
#zsy5,
#zsy6
{
transition-duration: 0.4s; /* 检索或设置对象过渡的持续时间 */
background-color:#ccffff;
display: inline-block;
width: 90px;
height: 90px;
font-size: 20px;
border-radius: 10px;/*允许为元素添加圆角边框*/
}


#zsy1:hover
{
    background-color: #66cc99;
    color: white;
	box-shadow: 0 12px 16px 0 rgba(0,0,0,0.24), 0 17px 50px 0 rgba(0,0,0,0.19);
}
#zsy2:hover
{
    background-color: #66cc99;
    color: blue;
	box-shadow: 0 12px 16px 0 rgba(0,0,0,0.24), 0 17px 50px 0 rgba(0,0,0,0.19);
}
#zsy3:hover
{
    background-color: #66cc99;
    color: red;
	box-shadow: 0 12px 16px 0 rgba(0,0,0,0.24), 0 17px 50px 0 rgba(0,0,0,0.19);
}
#zsy4:hover
{
    background-color: #66cc99;
    color: yellow;
	box-shadow: 0 12px 16px 0 rgba(0,0,0,0.24), 0 17px 50px 0 rgba(0,0,0,0.19);
}
#zsy5:hover
{
    background-color: #66cc99;
    color: purple;
	box-shadow: 0 12px 16px 0 rgba(0,0,0,0.24), 0 17px 50px 0 rgba(0,0,0,0.19);
}
#zsy6:hover
{
    background-color: #66cc99;
    color: green;
	box-shadow: 0 12px 16px 0 rgba(0,0,0,0.24), 0 17px 50px 0 rgba(0,0,0,0.19);
}
#zsy1:active
{
  background-color: #3e8e41;
  box-shadow: 0 5px #666;
  transform: translateY(4px);/*通过给定Y方向的数目指定一个translation*/
}
#zsy2:active
{
  background-color: #3e8e41;
  box-shadow: 0 5px #666;
  transform: translateY(4px);
}
#zsy3:active
{
  background-color: #3e8e41;
  box-shadow: 0 5px #666;
  transform: translateY(4px);
}
#zsy4:active
{
  background-color: #3e8e41;
  box-shadow: 0 5px #666;
  transform: translateY(4px);
}
#zsy5:active
{
  background-color: #3e8e41;
  box-shadow: 0 5px #666;
  transform: translateY(4px);
}
#zsy6:active
{
  background-color: #3e8e41;
  box-shadow: 0 5px #666;
  transform: translateY(4px);

 </style>
 
<body>
<font  color="#ff33ff">
    <p>登高</p>
</font>
    <input type="button" value="1" id="zsy1">
    <input type="button" value="2" id="zsy2">
    <input type="button" value="3" id="zsy3">
    <input type="button" value="4" id="zsy4">
    <input type="button" value="5" id="zsy5">
    <input type="button" value="6" id="zsy6">
    <h1></h1>
    <h2></h2>
    <h3></h3>
    <h4></h4>
    <h5></h5>
    <h6></h6>
    <script>
        var z1 = document.querySelector("h1");
        var j1 = document.getElementById("zsy1");
        var z2 = document.querySelector("h2");
        var j2 = document.getElementById("zsy2");
        var z3 = document.querySelector("h3");
        var j3 = document.getElementById("zsy3");
        var z4 = document.querySelector("h4");
        var j4 = document.getElementById("zsy4");
        var z5 = document.querySelector("h5");
        var j5 = document.getElementById("zsy5");
        var z6 = document.querySelector("h6");
        var j6 = document.getElementById("zsy6");

        j1.onclick = function () {
            z1.textContent = "登高";
        }
        j2.onclick = function () {
            z2.textContent = "唐·杜甫";
        }
        j3.onclick = function () {
            z3.textContent = "风急天高猿啸哀，渚清沙白鸟飞回。";
        }
        j4.onclick = function () {
            z4.textContent = "无边落木萧萧下，不尽长江滚滚来。";
        }
        j5.onclick = function () {
            z5.textContent = "万里悲秋常作客，百年多病独登台。";
        }
        j6.onclick = function () {
            z6.textContent = "艰难苦恨繁霜鬓，潦倒新停浊酒杯。";
        }
    </script>
	<div>
	<p align="left">
译文：<br>
风急天高猿猴啼叫显得十分悲哀，水清沙白的河洲上有鸟儿在盘旋。<br>
无边无际的树木萧萧地飘下落叶，望不到头的长江水滚滚奔腾而来。 　<br>
悲对秋景感慨万里漂泊常年为客，一生当中疾病缠身今日独上高台。 　<br>
历尽了艰难苦恨白发长满了双鬓，衰颓满心偏又暂停了消愁的酒杯。<br>
	</p>
	</div>
</body>
</html>
