    <p>阅读登金陵凤凰台</p>

    <input type="button" value="1" id="jing1">

    <h6></h6>
    <script>
        var z1 = document.querySelector("h1");
        var j1 = document.getElementById("jing1");
        var z2 = document.querySelector("h2");
        var j2 = document.getElementById("jing2");
        var z3 = document.querySelector("h3");
        var j3 = document.getElementById("jing3");
        var z4 = document.querySelector("h4");
        var j4 = document.getElementById("jing4");
        var z5 = document.querySelector("h5");
        var j5 = document.getElementById("jing5");
        var z6 = document.querySelector("h6");
        var j6 = document.getElementById("jing6");
        var z7 = document.querySelector("h7");
        var j7 = document.getElementById("jing7");

        j1.onclick = function () {
            z1.textContent = "《迢迢牵牛星》";
        }
        j2.onclick = function () {
            z2.textContent = "两汉·佚名";
        }
        j3.onclick = function () {
            z3.textContent = "迢迢牵牛星，皎皎河汉女。";
        }
        j4.onclick = function () {
            z4.textContent = "纤纤擢素手，札札弄机杼。";
        }
        j5.onclick = function () {
            z5.textContent = "终日不成章，泣涕零如雨。";
        }
        j6.onclick = function () {
            z6.textContent = "河汉清且浅，相去复几许。";
        }
        j7.onclick = function () {
            z7.textContent = "盈盈一水间，脉脉不得语。";
        }
    </script>
	<div>
	<p align="left">
译文：<br>
看那遥远的牵牛星，明亮的织女星。<br>
织女伸出细长而白皙的手，摆弄着织机织着布，发出札札的织布声。<br>
一整天也没织成一段布，哭泣的眼泪如同下雨般零落。<br>
这银河看起来又清又浅，两岸相隔又有多远呢？<br>	
虽然只隔一条清澈的河流，但他们只能含情凝视，却无法用语言交谈。<br>
	</p>
