 <h1>
卖痴呆词
</h1>
<h2>
范成大 〔宋代〕
</h2>
<p>
除夕更阑人不睡，厌禳钝滞迎新岁；
小儿呼叫走长街，云有痴呆召人买。
二物于人谁独无？就中吴侬仍有余；
巷南巷北卖不得，相逢大笑相揶揄。
栎翁块坐重帘下，独要买添令问价。
儿云翁买不须钱，奉赊痴呆千百年。
</p>
