<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>第十一次作业</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        body {
            text-align: center;
        }

        .jishuanqi {
            width: 280px;
            height: 45px;
            font-size: 0px;
            margin: 100px auto 0 auto;
        }

        .jishuanqi input {
            width: 35px;
            height: 45px;
        }

        .jishuanqi .out {
            width: 208px;
            height: 45px;
            border: 1px solid #007acc;
        }

        input {
            width: 70px;
            height: 45px;
            outline: none;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="jishuanqi">
        <input type="text" class="out" id="shuchukuang">
        <input type="button" value="CE" id="CE">
        <input type="button" value="退格" id="退格">
    </div>
    <script>
        var i, m;
        var symbol = ["1", "2", "3", "+", "4", "5", "6", "-", "7", "8", "9", "*", "0", ".", "=", "/"];
        for (i = 0; i < symbol.length / 4; i++) {
            var div = document.createElement("div");
            for (m = 0; m < symbol.length / 4; m++) {
                var input = document.createElement("input");
                input.type = "button";
                input.value = symbol[i * 4 + m];
                input.id = i * 4 + m;
                div.appendChild(input);
                input.onclick = function () {
                    // this指的是调用函数的对象，此处指的是input
                    shuchukuang.value += this.value;
                }
            }
            document.body.appendChild(div);
        }
        // 定义最后输出内容按钮
        var results = document.getElementById("14");
        results.onclick = function () {
            var shuchu = "=" + eval(shuchukuang.value);
            shuchukuang.value += shuchu;
        }
        // 定义清零CE按钮
        var clear = document.getElementById("CE");
        clear.onclick = function () {
            shuchukuang.value = "";
        }
        // 定义退格按钮
        var Backspace = document.getElementById("退格");
        Backspace.onclick = function () {
            var back = shuchukuang.value;
            var Backed = back.substring(0, back.length - 1);
            shuchukuang.value = Backed;
        }
    </script>
</body>

</html>
