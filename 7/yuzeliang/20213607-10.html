<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>第十次作业</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #e1e0c7;
            text-align: center;
        }

        input {
            width: 60px;
            height: 60px;
            background-color: #ccffff;
            border-radius: 30px;
            border: none;
            font-size: 18px;
        }

        input:hover {
            background-color: #66cc99;
            color: white;
            box-shadow: 0 12px 16px 0 rgba(0, 0, 0, 0.24), 0 17px 50px 0 rgba(0, 0, 0, 0.19);
            cursor:pointer;
        }

        /* .gushi {
            white-space: pre-line;
        } */

        h3 {
            margin-bottom: 20px;
            font: 500 50px 楷体, 微软雅黑;
        }

        p {
            font: 33px/45px 楷体, 微软雅黑;
        }

        .guanggao1 a img {
            position: fixed;
            top: 200px;
            left: 0;
            width: 350px;
            height: 150px;
            border-radius: 30px;
            cursor:pointer;
        }

        .guanggao2 a img {
            position: fixed;
            top: 200px;
            right: 0;
            width: 350px;
            height: 150px;
            border-radius: 30px;
            cursor:pointer;
        }

        .guanggao3 a img {
            position: fixed;
            bottom: 0;
            left: 50%;
            margin-left: -500px;
            width: 1000px;
            height: 100px;
            cursor:pointer;
        }
    </style>
    <!-- 此处poem结尾的字符串补全bug（加一个301）是为了补全字符串处理中poem.search(arr[i]), poem.search(arr[i + 1])的bug，因为如果不加301的话最后一个就会特殊化没有poem.search(arr[i + 1]) -->
    <script src="https://youzelian.github.io/ts300.js">
    </script>
</head>

<body>
    <input type="button" value="上一首" id="pre">
    <input type="button" value="下一首" id="next">
    <input type="button" value="抽一首" id="rand">
    <!-- <div class="gushi"> -->
    <h3></h3>
    <!-- </div> -->
    <div class="guanggao1">
        <a href="#">
            <img src="https://images.xiaoyuasan.xyz/5bdcde9a8eb29e7d2c4ce7be4ba649cc.gif">
        </a>
    </div>
    <div class="guanggao2">
        <a href="#">
            <img src="https://images.xiaoyuasan.xyz/5bdcde9a8eb29e7d2c4ce7be4ba649cc.gif">
        </a>
    </div>
    <div class="guanggao3">
        <a href="#">
            <img
                src="https://tse1-mm.cn.bing.net/th/id/R-C.fc075d3ec7a688cdf0ae215f6c3ff5fe?rik=PKpTHA6oL6mLdQ&riu=http%3a%2f%2fwww.quanboo.com%2faa%2f0712.gif&ehk=jGUkkw0kCujAmTuUPhZpkP%2f8v%2f1%2bl%2f2cH7IqrBPcIhc%3d&risl=&pid=ImgRaw&r=0">
        </a>
    </div>
    <script>
        //定义向前向后和抽一首的按钮
        var pre = document.getElementById("pre");
        var next = document.getElementById("next");
        var rand = document.getElementById("rand");
        //定义标题和内容
        var h3 = document.querySelector("h3");
        var p = document.querySelector("p");
        // 搜索所有的数字
        var arr = poem.match(/\d+(.\d+)?/g);
        var i, x;
        var poemall = [],
            poemtitle = [],
            poemcontent = [],
            poemcontentbreaking = [];
        //将字符串分成数组保存
        for (i = 0; i < arr.length; i++) {
            poemall[i] = poem.substring(poem.search(arr[i]), poem.search(arr[i + 1]));
            poemtitle[i] = poemall[i].substring(0, poemall[i].search("\n"));
            poemcontent[i] = poemall[i].substring(poemall[i].search("\n"), poemall[i].length);
        }
        //定义功能show，分开标题和内容
        function show() {
            // 为了清除页面上可能残余的p标签
            // 获取所有p元素
            var element,
                pElements = document.getElementsByTagName('p');
            // 删除所有P元素
            while (pElements.length > 0) {
                element = pElements[0];
                element.parentElement.removeChild(element);
            }
            h3.textContent = poemtitle[i];
            // 将内容数组用split分开
            poemcontentbreaking = poemcontent[i].split('\n');
            // 去除由于poemcontentbreaking数组前面一个\n和后面一个\n导致的数组的增多
            poemcontentbreaking.splice(0, 1);
            poemcontentbreaking.splice(poemcontentbreaking.length - 1, 1);
            // 根据古诗内容，循环增加p的个数
            for (x = 0; x < poemcontentbreaking.length; x++) {
                var pdom = document.createElement('p');
                pdom.textContent = poemcontentbreaking[x];
                document.body.appendChild(pdom);
            }
        }
        i = 0;
        show(i);
        // 定义pre向前按钮
        pre.onclick = function () {
            if (i == 0) {
                i = arr.length - 2;
                show(i);
            }
            else {
                i--;
                show(i);
            }
        }
        // 定义next向后按钮
        next.onclick = function () {
            if (i == 299) {
                i = 0;
                show(i);
            }
            else {
                i++;
                show(i);
            }
        }
        // 定义rand抽一首按钮
        rand.onclick = function () {
            // Math.random()求得0~299.0的随机数
            // Math.round()是对里面的数进行四舍五入
            i = Math.round(Math.random() * 299);
            show(i);
        }
    </script>
</body>

</html>
