<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>第六次作业</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #e1e0c7;
            text-align: center;
        }

        .start {
            font-size: 30px;
            color: #5d6146;
        }

        input {
            /* 自身属性 */
            width: 80px;
            height: 80px;
            margin: 0 20px;
            border-radius: 45px;
            /* 文本属性 */
            font-size: 25px;
            /* 其他属性 */
            box-shadow: 6px 6px 3px gray;
        }

        h4 {
            margin: 20px;
            font-size: 30px;
            font-weight: 590;
            font-family: 楷体;
        }

        p {
            font-size: 25px;
            font-family: 楷体;
            line-height: 50px;
        }

        .finish1 {
            margin: 50px 0;
            font-size: 40px;
            color: pink;
        }

        .yu {
            /* 布局定位属性 */
            float: right;
            /* 自身属性 */
            margin-top: 250px;
            /* 文本属性 */
            font-size: 15px;
        }
    </style>
</head>

<body>
    <h3 class="start">
        敬请欣赏优美的古诗
    </h3>
    <input type="button" value="上一首" id="pre">
    <input type="button" value="下一首" id="next">
    <h4 id="a1"></h4>
    <h4 id="a2"></h4>
    <p id="a3"></p>
    <p id="a4"></p>
    <p id="a5"></p>
    <p id="a6"></p>
    <p id="a7"></p>
    <div id="b" class="finish1"></div>
    <div class="yu">--copy right to 尤泽利安</div>
    <script>
        var poetry = "第一首诗\n《短歌行》\n曹操 〔两汉〕\n对酒当歌，人生几何。\n譬如朝露，去日苦多。\n慨当以慷，忧思难忘。\n何以解忧？唯有杜康。\n第二首诗\n《春夜喜雨》\n 唐·杜甫\n好雨知时节，当春乃发生。\n随风潜入夜，润物细无声。\n野径云俱黑，江船火独明。\n晓看红湿处，花重锦官城。\n第三首诗\n《秋日登吴公台上寺远眺 》\n唐·刘长卿\n古台摇落后，秋入望乡心。\n野寺来人少，云峰隔水深。\n夕阳依旧垒，寒磬满空林。\n惆怅南朝事，长江独自今。\n第四首诗\n《使至塞上》\n唐· 王维\n单车欲问边，属国过居延。\n征遂出汉塞，归雁入胡天。\n大漠孤烟直，长河落日圆。\n萧关逢候骑，都护在燕然。\n第五首诗\n《 早春夜宴 》\n唐· 武则天　\n九春开上节，千门敞夜扉。\n兰灯吐新焰，桂魄朗圆辉。\n送酒惟须满，流杯不用稀。\n务使霞浆兴，方乘泛洛归。\n第六首诗\n《春望》\n唐·杜甫\n国破山河在，城春草木深。\n感时花溅泪，恨别鸟惊心。\n烽火连三月，家书抵万金。\n白头搔更短，浑欲不胜簪。\n";
        var next = document.getElementById("next");
        var pre = document.getElementById("pre");
        // 定义被分割开的每首诗形成的数组，共42个分为7行共6首
        var breaking = poetry.split("\n");
        // 定义一首诗，共七行
        var content1 = document.getElementById("a1");
        var content2 = document.getElementById("a2");
        var content3 = document.getElementById("a3");
        var content4 = document.getElementById("a4");
        var content5 = document.getElementById("a5");
        var content6 = document.getElementById("a6");
        var content7 = document.getElementById("a7");
        var finish = document.getElementById("b");
        // 定义i为每一首诗
        var i = 0;
        // 点击下一首，当i=6时点击下一首会空白，但是加了if(i==7时就不同了)
        next.onclick = function () {
            if (i < breaking.length / 7) {
                content1.textContent = breaking[0 + 7 * i];
                content2.textContent = breaking[1 + 7 * i];
                content3.textContent = breaking[2 + 7 * i];
                content4.textContent = breaking[3 + 7 * i];
                content5.textContent = breaking[4 + 7 * i];
                content6.textContent = breaking[5 + 7 * i];
                content7.textContent = breaking[6 + 7 * i];
                i++;
            }
            // 点击了六次
            if (i == 7) {
                finish.textContent = "感谢观赏";
            }
        }
        // 点击上一首，当i=1时点击上一首不会改变
        pre.onclick = function () {
            if (i > 0) {
                // 现在的数减去7   1+7*i-7
                content1.textContent = breaking[0 + 7 * (i - 1)];
                content2.textContent = breaking[1 + 7 * (i - 1)];
                content3.textContent = breaking[2 + 7 * (i - 1)];
                content4.textContent = breaking[3 + 7 * (i - 1)];
                content5.textContent = breaking[4 + 7 * (i - 1)];
                content6.textContent = breaking[5 + 7 * (i - 1)];
                content7.textContent = breaking[6 + 7 * (i - 1)];
                i--;
            }
            if (i == 6) {
                finish.textContent = "";
            }
        }
    </script>
</body>

</html>
