    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
            font-family: 'Courier New', Courier, monospace;
            color: white;
        }

        body {
            text-align: center;
            background-image: url("https://c-ssl.duitang.com/uploads/item/201901/08/20190108183421_hQwj4.thumb.1000_0.jpeg");
            background-repeat: no-repeat;
            background-position: center;
            background-size: 100%;
        }

        header,
        nav,
        article,
        footer {
            border: 1px solid #1b6dcb;
            font-size: 1.3vw;
        }

        header {
            position: relative;
            height: 20%;
            white-space: pre-line;
            font-size:20px;
        }

        header p {
            position: absolute;
            bottom: 0;
            right: 1%;
            z-index: 2;
        }
        nav {
            height: 25%;
        }
        article {
            height: 40%;
            font-size: 1.5em;
        }
        input {
            width: 100px;
            margin: 2px;
            box-shadow: 2px 2px 2px gray;
            background-color: #1b6dcb;
            border: none;
            border-radius: 25px;
            font-size: 0.5em;
            color: black;
            outline: none;
            cursor: pointer;
            line-height: 250%;
        }
        footer {
            height: 15%;
        }
        footer p {
            margin-top: 50px;
            font-size: 50px;
        }
    </style>
