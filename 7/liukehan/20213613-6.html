 <script>
var lkhdsg=[];
 lkhdsg[1]="登金陵凤凰台";
 lkhdsg[2]="[唐]李白";
 lkhdsg[3]="凤凰台上凤凰游，凤去台空江自流。吴宫花草埋幽径，晋代衣冠成古丘。三山半落青天外，二水中分白鹭洲。总为浮云能蔽日，长安不见使人愁。";
 lkhdsg[4]="李白（701—762），字太白，号青莲居士。是屈原之后最具个性特色的浪漫主义诗人。有“诗仙”之美誉，与杜甫并称“李杜”。其诗以抒情为主，表现出蔑视权贵的傲岸精神，对人民疾苦表示同情，又善于描绘自然景色，表达对祖国山河的热爱。诗风雄奇豪放，想像丰富，语言流转自然，音律和谐多变，善于从民间文艺和神话传说中吸取营养和素材，构成其特有的瑰玮绚烂的色彩，达到盛唐诗歌艺术的巅峰。存世诗文千余篇，有《李太白集》三十卷。";
 lkhdsg[5]="《登金陵凤凰台》是李白集中为数不多的七言律诗之一。此诗一说是天宝六载（747年）作者奉命“赐金还山”，被排挤离开长安，南游金陵时所作，一说是作者流放夜郎遇赦返回后所作；也有人称是李白游览黄鹤楼，并留下“眼前有景道不得，崔颢题诗在上头”后写的，是想与崔颢的《黄鹤楼》争胜。";
 lkhdsg[6]= "凤凰台上曾有凤凰来游，凤凰飞去后楼台空荡长江自己在奔流。吴国宫殿里的花草埋没在幽僻的小路上，晋代的豪门贵族已经变成了古墓。三山的半截山峰落在青天的外面，白鹭洲从中分开了一条水流。总是因为浮云能遮蔽太阳，不见长安使人忧愁。";
 lkhdsg[7]="游山西村";
 lkhdsg[8]="[宋]陆游";
 lkhdsg[9]="莫笑农家腊酒浑，丰年留客足鸡豚。山重水复疑无路，柳暗花明又一村。箫鼓追随春社近，衣冠简朴古风存。从今若许闲乘月，拄杖无时夜叩门。";
 lkhdsg[10]="陆游（1125—1210），宋代爱国诗人、词人。字务观，号放翁，越州山阴（今浙江绍兴）人。他具有多方面文学才能，尤以诗的成就为最，在生前即有“小李白”之称，不仅成为南宋一代诗坛领袖，而且在中国文学史上享有崇高地位，存诗9300多首，是文学史上存诗最多的诗人。其诗在思想上、艺术上取得了卓越成就。词作数量不如诗篇巨大，但和诗同样贯穿了气吞残虏的爱国主义精神。有《剑南诗稿》《渭南文集》《南唐书》《老学庵笔记》《放翁词》、《渭南词》等数十个文集传世。"
 lkhdsg[11]="此诗作于宋孝宗乾道三年（1167）初春，当时陆游正罢官闲居在家。在此之前，陆游曾任隆兴府（今江西南昌市）通判，因在隆兴二年（1164）积极支持抗金将帅张浚北伐，符离战败后，遭到朝廷中主和投降派的排挤打击。乾道二年（1166），以“交结台谏，鼓唱是非，力说张浚用兵”的罪名，从隆兴府通判任上罢官归里。陆游回到家乡的心情是相当复杂的，苦闷和激愤的感情交织在一起，然而他并不心灰意冷。“慷慨心犹壮”（《闻雨》）的爱国情绪，使他在农村生活中感受到希望和光明，并将这种感受倾泻到自己的诗歌创作里。此诗即在故乡山阴（今浙江绍兴）所作。";
 lkhdsg[12]="不要笑农家腊月里酿的酒浊而又浑，在丰收屿年景里待客菜肴非常丰繁。山峦重叠水流曲折正担心无路可走，柳绿花艳忽然眼前又出现一个山村。吹着箫打起鼓春社的日子已经接近，村民们衣冠简朴古代风气仍然保存。今后如果还能乘大好月色出外闲游，我一定拄着拐杖随时来敲你的家门。";
lkhdsg[13]="雁门太守行";
lkhdsg[14]="[唐]李贺";
lkhdsg[15]="黑云压城城欲摧，甲光向日金鳞开。角声满天秋色里，塞上燕脂凝夜紫。半卷红旗临易水，霜重鼓寒声不起。报君黄金台上意，提携玉龙为君死。";
lkhdsg[16]="李贺（790—816），唐代诗人。字长吉，福昌（今河南宜阳西）人。唐皇室远支，家世早已没落，生活困顿，仕途偃蹇。曾官奉礼郎。因避家讳，被迫不得应进士科考试。早岁即工诗，见知于韩愈、皇甫湜，并和沈亚之友善，死时仅二十六岁。其诗长于乐府，多表现政治上不得意的悲愤。善于熔铸词采，驰骋想像，运用神话传说，创造出新奇瑰丽的诗境，在诗史上独树一帜，严羽《沧浪诗话》称为“李长吉体”。有些作品情调阴郁低沉，语言过于雕琢。有《昌谷集》。";
lkhdsg[17]="关于此诗系年，有两种说法。第一种说法认为此诗作于唐宪宗元和九年（814）。当年唐宪宗以张煦为节度使，领兵前往征讨雁门郡之乱（振武军之乱），李贺即兴赋诗鼓舞士气，作成了这首《雁门太守行》。第二种说法，据唐张固《幽闲鼓吹》载：李贺把诗卷送给韩愈看，此诗放在卷首，韩愈看后也很欣赏。时在元和二年（807）。中国古代散文学会原常务理事朱世英则从有关《雁门太守行》这首诗的一些传说和材料记载推测，认为此诗可能是写朝廷与藩镇之间的战争。李贺生活的时代藩镇叛乱此伏彼起，发生过重大的战争。如史载，元和四年（809），王承宗的叛军攻打易州和定州，爱国将领李光颜曾率兵驰救。元和九年（814），他身先士卒，突出、冲击吴元济叛军的包围，杀得敌人人仰马翻，狼狈逃窜。";
lkhdsg[18]="黑云压下城头，城墙像要塌陷一样；盔甲映着日光，金鳞似的闪亮。号角的声音在秋色里响彻天空，塞上将士的血迹在寒夜中凝为紫色。寒风半卷红旗，轻骑驰向易水边；天寒霜气凝重，战鼓声低沉不起。为报答国君招纳重用贤才的诚意，挥舞着利剑甘愿为君王血战到死！";
lkhdsg[19]="蜀相";
lkhdsg[20]="[唐]杜甫";
lkhdsg[21]="丞相祠堂何处寻，锦官城外柏森森。映阶碧草自春色，隔叶黄鹂空好音。三顾频烦天下计，两朝开济老臣心。出师未捷身先死，长使英雄泪满襟。";
lkhdsg[22]="杜甫（712～770年），字子美，尝自称少陵野老。举进士不第，曾任检校工部员外郎，故世称杜工部。是唐代最伟大的现实主义诗人，宋以后被尊为“诗圣”，与李白并称“李杜”。其诗大胆揭露当时社会矛盾，对穷苦人民寄予深切同情，内容深刻。许多优秀作品，显示了唐代由盛转衰的历史过程，因被称为“诗史”。在艺术上，善于运用各种诗歌形式，尤长于律诗；风格多样，而以沉郁为主；语言精炼，具有高度的表达能力。存诗1400多首，有《杜工部集》。";
lkhdsg[23]="《蜀相》一诗，依照仇兆鳌注，断为唐肃宗上元元年（760年）春天，杜甫“初至成都时作”。唐肃宗乾元二年（759年）十二月，杜甫结束了为时四年的寓居秦州、同谷（今甘肃省成县）的颠沛流离的生活，到了成都，在朋友的资助下，定居在浣花溪畔。成都是当年蜀汉建都的地方，城西北有诸葛亮庙，称武侯祠。唐肃宗上元元年（760年）春天，他探访了诸葛武侯祠，写下了这首感人肺腑的千古绝唱。";
lkhdsg[24]="诸葛丞相的祠堂去哪里寻找？锦官城外翠柏长得郁郁苍苍。碧草映照石阶自有一片春色，黄鹂在密叶间空有美妙歌声。当年先主屡次向您求教大计，辅佐先主开国扶助后主继业。可惜您却出师征战病死军中，常使古今英雄感慨泪湿衣襟。";
