	   <h1>013王维：送别</h1>
	   <p>
	下马饮君酒，问君何所之。
	君言不得意，归卧南山陲。
	但去莫复闻，白云无尽时。
	   </p>

	   <h1>015王维：青溪</h1>
	   <p>
	言入黄花川，每逐青溪水。
	随山将万转，趣途无百里。
	声喧乱石中，色静深松里。
	漾漾泛菱荇，澄澄映葭苇。
	我心素已闲，清川澹如此。
	请留盘石上，垂钓将已矣
		</p>
