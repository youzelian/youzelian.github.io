  <script type="text/javascript">
   var novel="  第一章\n    凡是有钱的单身汉，总想娶位太太，这已经成了一条举世公认的真理。这样的单身汉，每逢新搬到一个地方，四邻八舍虽然完全不了解他的性情如何，见解如何，可是，既然这样的一条真理早已在人们心目中根深蒂固，因此人们总是把他看作自己某一个女儿理所应得的一笔财产。有一天班纳特太太对她的丈夫说：“我的好老爷，尼日斐花园终于租出去了，你听说过没有？”班纳特先生回答道，他没有听说过。“的确租出去了，”她说，“朗格太太刚刚上这儿来过，她把这件事的底细，一五一十地告诉了我。”班纳特先生没有理睬她。“你难道不想知道是谁租去的吗？”太太不耐烦地嚷起来了。“既是你要说给我听，我听听也无妨。”这句话足够鼓励她讲下去了。“哦！亲爱的，你得知道，郎格太太说，租尼日斐花园的是个阔少爷，他是英格兰北部的人；听说他星期一那天，乘着一辆驷马大轿车来看房子，看得非常中意，当场就和莫理斯先生谈妥了；他要在‘米迦勒节’以前搬进来，打算下个周未先叫几个佣人来住。”“这个人叫什么名字？”“彬格莱。”“有太太的呢，还是单身汉？”“噢！是个单身汉，亲爱的，确确实实是个单身汉！一个有钱的单身汉；每年有四五千磅的收入。真是女儿们的福气！”“这怎么说？关女儿女儿们什么事？”“我的好老爷，”太太回答道，“你怎么这样叫人讨厌！告诉你吧，我正在盘算，他要是挑中我们一个女儿做老婆，可多好！”“他住到这儿来，就是为了这个打算吗？”“打算！胡扯，这是哪儿的话！不过，他倒作兴看中我们的某一个女儿呢。他一搬来，你就得去拜访拜访他。”“我不用去。你带着女儿们去就得啦，要不你干脆打发她们自己去，那或许倒更好些，因为你跟女儿们比起来，她们哪一个都不能胜过你的美貌,你去了，彬格莱先生倒可能挑中你呢？”“我的好老爷，你太捧我啦。从前也的确有人赞赏过我的美貌，现在我可有敢说有什么出众的地方了。一个女人家有了五个成年的女儿，就不该对自己的美貌再转什么念头。”“这样看来，一个女人家对自己的美貌也转不了多少念头喽。”“不过，我的好老爷，彬格莱一搬到我们的邻近来，你的确应该去看看他。”“老实跟你说吧，这不是我份内的事。”“看女儿的份上吧。只请你想一想，她们不论哪一个，要是攀上了这样一个人家，够多么好。威廉爵士夫妇已经决定去拜望他，他们也无非是这个用意。你知道，他们通常是不会拜望新搬来的邻居的。你的确应该去一次，要是你不去，叫我们怎么去。”“你实在过分心思啦。彬格莱先生一定高兴看到你的；我可以写封信给你带去，就说随便他挑中我哪一个女儿，我都心甘情愿地答应他把她娶过去；不过，我在信上得特别替小丽萃吹嘘几句。”“我希望你别这么做。丽萃没有一点儿地方胜过别的几个女儿；我敢说，论漂亮，她抵不上吉英一半；论性子，好抵不上丽迪雅一半。你可老是偏爱她。”“她们没有哪一个值得夸奖的，”他回答道；“他们跟人家的姑娘一样，又傻，又无知；倒是丽萃要比她的几个姐妹伶俐些。”“我的好老爷，你怎么舍得这样糟蹋自己的新生亲生女儿？你是在故意叫我气恼，好让你自己得意吧。你半点儿也不体谅我的神经衰弱。”“你真错怪了我，我的好太太。我非常尊重你的神经。它们是我的老朋友。至少在最近二十年以来，我一直听道你慎重其事地提到它们。”“啊！你不知道我怎样受苦呢！”“不过我希望你这毛病会好起来，那么，象这种每年有四千镑收入的阔少爷，你就可以眼看着他们一个个搬来做你的邻居了。”“你既然不愿意去拜访他们，即使有二十个搬了来，对我们又有什么好处！”“放心吧，我的好太太，等到有了二十个，我一定去一个个拜望到。”班纳特先生真是个古怪人，他一方面喜欢插科打浑，爱挖苦人，同时又不拘言笑，变幻莫测，真使他那位太太积二十三年之经验，还摸不透他的性格。太太的脑子是很容易加以分析的。她是个智力贫乏、不学无术、喜怒无常的女人，只要碰到不称心的事，她就以为神经衰弱。她生平的大事就是嫁女儿；她生平的安慰就是访友拜客和打听新闻。                             \n第二章\n    班纳特先生尽管在自己太太面前自始至终都说是不想去拜访彬格莱先生，事实上一直都打算去拜访他，而且还是跟第一批人一起去拜访他的。等到他去拜访过以后，当天晚上太太才知道实情。这消息透露出来的经过是这样的－－他看到第二个女儿在装饰帽子，就突然对她说：“我希望彬格莱先生会喜欢你这顶帽子，丽萃。”她母亲气愤愤地说：“我们既然不预备去看彬格莱先生，当然就无从知道他喜欢什么。”“可是你忘啦，妈妈，”伊丽莎白说，“我们将来可以在跳舞会上碰到他的，郎格太太不是答应过把他介绍给我们吗？”“我不相信郎格太太肯这么做。她自己有两个亲侄女。她是个自私自利、假仁假义的女人，我睢不起她。”“我也瞧不起她，”班纳特先生说；“你倒不指望她来替你效劳，这叫我听到高兴。”班纳特太太没有理睬他，可是忍不住气，便骂起女儿来。“别那么咳个不停，吉蒂，看老天爷份上吧！稍许体谅一下我的神经吧。你简直叫我的神经要胀裂啦。”“吉蒂真不知趣，”她的父亲说；“咳嗽也不知道拣个时候。”“我又不是故意咳着玩儿。”吉蒂气恼地回答道。“你们的跳舞会定在那一天开，丽萃？”“从明天算起，还得再过两个星期。”“唔，原来如此，”她的母亲嚷道，“郎格太太可要挨到开跳舞会的前一天才能赶回来；那么，她可来不及把他介绍给你们啦，她自己也还不认识他呢。”“那么，好太太，你正可以占你朋友的上风，反过来替她介绍这位贵人啦。”“办不到，我的好老爷，办不到，我自己还不认识他呢；你怎么可以这样嘲笑人？”“我真佩服你想得这般周到。两个星期的认识当然谈不上什么。跟一个人相处了两个星期，不可能就此了解他究竟是怎样一个人。不过，要是我们不去尝试尝试，别人可少不了要尝试的。话说到底，郎格太太和她的侄女一定不肯错过这个良机。因此，要是你不愿意办这件事，我自己来办好了，反正她会觉得这是我们对她的一片好意。”女儿们都对父亲瞪着眼。班纳特太太只随口说了声：“毫无意思！”“你怎么这样大惊小怪！”他嚷道。“你以为替人家效点儿劳介绍是毫无意思的事吗？你这样的说法我可不大同意。你说呢，曼丽？我知道你是个有独到见解的少女，读的书都是皇皇巨著，而且还要做札记。”曼丽想说几句有见识的话可又不知道怎么说才好。于是班纳特先生接下去说：“让曼丽仔细想一想再发表意见吧，我们还是重新来谈谈彬格莱先生。”“我就讨厌谈彬格莱先生，”他的太太嚷起来了。“遗憾得很，你竟会跟我说这种话；你怎么不早说呢？要是今天上午听到你这样说，那我当然不会去拜访他啦。这真叫不凑巧。现在既然拜访也拜访过了，我们今后就少不了要结交这个朋友。“果然不出他所料，娘儿们一听此说，一个个都大这惊异，尤其是班纳特太太，比谁都惊异得厉害；不过，这样欢天喜地地喧嚷了一阵以后，她便当众宣布，说这件事她早就料到的。“你真是个好心肠的人，我的好老爷！我早就知道你终究会给我说服的。你既然疼爱自己的女儿，当然就不会把这样一个朋友不放在心上。我真太高兴了！你这个玩笑开得真太有意思，谁想到你竟会今天上午去拜访他，而且到现在一字不提。”“吉蒂，现在你可以放心大胆地咳嗽啦，”班纳特先生一面说，一面走出房间，原来他看到太太那样得意忘形，不免觉得有些厌恶。门一关上，班纳特太太便对她的几个女儿说“孩子们，你们的爸爸真太好了，我不知道你们怎样才能报答他的恩典；再说，你们还应该好好报答我一番呢。老实跟你们说吧，我们老夫妻活到这么一把年纪了，哪儿有兴致天天去交朋结友；可是为了你们，我们随便什么事都乐意去做。丽迪雅，乖宝贝，虽然你年纪最小，开起跳舞会来，彬格莱先生或许就偏偏要跟你跳呢。”“噢！”丽迪雅满不在乎地说。 “我才不当它一回事。年纪虽然是我最小，个儿算我顶高。” 于是她们一方面猜测那位贵人什么时候会来回拜班纳特先生，一方面盘算着什么时候请他来吃饭，就这样把一个晚上的工夫在闲谈中度过去了。              \n 第三章\n        尽管班纳特太太有了五个女儿帮腔，向她丈夫问起彬格莱先生这样那样，可是丈夫的回答总不能叫她满意。母女们想尽办法对付他－－赤裸裸的问句，巧妙的设想，离题很远的猜测，什么办法都用到了；可是他并没有上她们的圈套。最后她们迫不得已，只得听取邻居卢卡斯太太的间接消息。她的报道全是好话。据说威廉爵士很喜欢他。他非常年轻，长得特别漂亮，为人又极其谦和，最重要的一点是，他打算请一大群客人来参加下次的舞会。这真是再好也没有的事；喜欢跳舞是谈情说爱的一个步骤；大家都热烈地希望去获得彬格莱先生的那颗心。 “我只要能看到一个女儿在尼日斐花园幸福地安了家，”班纳特太太对她的丈夫说，“看到其他几个也匹配得这样门当户对，此生就没有别的奢望了。” 不到几天功夫，彬格莱先生上门回拜班纳特先生，在他的书房里跟他盘桓了十分钟左右。他久仰班纳特先生几位小姐的年轻美貌，很希望能够见见她们；但是他只见到了她们的父亲。倒是小姐们比他幸运，他们利用楼上的窗口，看清了他穿的是蓝外套，骑的是一匹黑马。 班府上不久就发请贴请他吃饭；班纳特太太已经计划了好几道菜，每道菜都足以增加她的体面，说明她是个会当家的贤主妇，可是事不凑巧，彬格莱先生第二天非进城不可，他们这一番盛意叫他无法领情，因此回信给他们，说是要迟一迟再说。班纳特太太大为不安。她想，此人刚来到哈福德郡，怎么就要进城有事，于是她开始担心思了；照理他应该在尼日斐花园安安定定住下来，看现在的情形，莫不是他经常都得这样东漂西泊，行踪不定？亏得卢卡斯太太对她说，可能他是到伦敦去邀请那一大群客人来参加舞会，这才使她稍许减除了一些顾虑。外面马上就纷纷传说彬格莱先生并没有带来十二个女宾，仅仅只带来六个，其中五个是他自己的姐妹，一个是表姐妹，这个消息才使小姐们放了心。后来等到这群贵客走进舞场的时候，却一共只有五个人－－彬格莱先生，他的两个姐妹，姐夫，还有另外一个青年。 彬格莱先生仪表堂堂，大有绅士风度，而且和颜悦色，没有拘泥做作的气习。他的姐妹也都是些优美的女性，态度落落大方。他的姐夫赫斯脱只不过像个普通绅士，不大引人注目，但是他的朋友达西却立刻引起全场的注意，因为他身材魁伟，眉清目秀，举止高贵，于是他进场不到五分钟，大家都纷纷传说他每年有一万磅的收入。男宾们都称赞他的一表人才，女宾们都说他比彬格莱先生漂亮得多。人们差不多有半个晚上都带着爱慕的目光看着他。最后人们才发现他为人骄傲，看不起人，巴结不上他，因此对他起了厌恶的感觉，他那众望所归的极盛一时的场面才黯然失色。他既然摆起那么一副讨人嫌惹人厌的面貌，那么，不管他在德比郡有多大的财产，也挽救不了他，况且和他的朋友比起来，他更没有什么大不了。 彬格莱先生很快就熟悉了全场所有的主要人物。他生气勃勃，为人又不拘泥，每一场舞都可以少不了要跳。使他气恼的是，舞会怎么散场得这样早。他又谈起他自己要在尼日斐花园开一次舞会。他这些可爱的地方自然会引起人家对他发生好感。他跟他的朋友是多么显著的对照啊！达西先生只跟赫斯脱太太跳了一次舞，跟彬格莱小姐跳了一次舞，此外就在室内踱来踱去，偶而找他自己人谈谈，人家要介绍他跟别的小姐跳舞，他怎么也不肯。大家都断定他是世界上最骄傲，最讨人厌的人，希望他不要再来。其中对他反感最厉害的是班纳特太太，她对他的整个举止都感到讨厌，而且这种讨厌竟变本加厉，形成了一种特殊的气愤，因为他得罪了他的一个女儿。 由于男宾少，伊丽莎白·班纳特有两场舞都不得不空坐。达西先生当时曾一度站在她的身旁，彬格莱先生特地歇了几分钟没有跳舞，走到他这位朋友跟前，硬要他去跳，两个人谈话给她听到了。 “来吧，达西，”彬格莱说，“我一定要你跳。我不愿看到你独个儿这么傻里傻气地站在这儿。还是去跳舞吧。” “我绝对不跳。你知道我一向多么讨厌跳舞，除非跟特别熟的人跳。在这样的舞会上跳舞，简直叫人受不了。你的姐妹们都在跟别人跳，要是叫舞场里别的女人跟我跳，没有一个不叫我活受罪的。” “我可不愿意象你那样挑肥拣瘦，”彬格莱嚷道，“随便怎么我也不愿意；不瞒你说，我生平没有见过今天晚上这么许多可爱的姑娘；你瞧，其中几位真是美貌绝伦。” “你当然罗，舞场上唯一的一位漂亮姑娘在跟你跳舞！”达西先生说，一面望着班府上年纪最大的一位小姐。 “噢！我从来没有见过这么美丽的一个尤物！可是她的一个妹妹就坐在你后面，她也很漂亮，而且我敢说，她也很讨人爱。让我来请我的舞伴给你们介绍一下吧。” “你说的是哪一位？”他转过身来，朝着伊丽莎白望了一会儿，等她也看见了他，他才收回自己的目光，冷冷的说：“她还可以，但还没有漂亮到打动我的心，眼前我可没有兴趣去抬举那些受到别人冷眼看待的小姐。你还是回到你的舞伴身边去欣赏她的笑脸吧，犯不着把时间浪费在我的身上。” 彬格莱先生依了达西先生的话走开以后，达西自己也走开了。伊丽莎白依旧坐在那里，对达西先生委实没有甚好感。不过她却满有兴致地把这段偷听到的话去讲给她的朋友听，因为她的个性活泼调皮，遇到任何可笑的事情都会感到兴趣。 班府上全家上这一个晚上大致都过得很高兴。大小姐蒙彬格莱先生邀她跳了两次舞，而且这位贵人的姐妹们都对她另眼相看。班太太看到尼日斐花园的一家人都这么喜爱她的大女儿，觉得非常得意。吉英跟她母亲一样得意，只不过没有象她母亲那样声张。伊丽莎白也为吉英快活。曼丽曾听到人们在彬格莱小姐面前提到她自己，说她是邻近一带最有才干的姑娘；咖苔琳和丽迪雅运气最好，没有那一场舞缺少舞伴，这是她们每逢开舞会时唯一关心的一件事。母女们高高兴兴地回到她们所住的浪搏恩村（她们算是这个村子里的旺族），看见班纳特先生还没有睡觉。且说这位先生平常只要捧上一本书，就忘了时间，可是这次他没有睡觉，却是因为他极想知道大家朝思暮想的这一盛会，经过情形究竟如何。他满以为他太太对那位贵客一定很失望，但是，他立刻就发觉事实并非如此。“噢！我的好老爷，”她一走进房间就这么说，“我们这一个晚上过得太快活了，舞会太好了。你没有去真可惜。吉英那么吃香，简直是无法形容。什么人都说她长得好；彬格莱先生认为她很美，跟她跳了两场舞！你光想想这一点看吧，亲爱的；他确实跟她跳了两场！全场那么多女宾，就只有她一个人蒙受了他两次邀请。他头一场舞是邀请卢卡斯小姐跳的。我看到他站到她身边去，不禁有些气恼！不过，他对她根本没意思，其实，什么人也不会对她有意思；当吉英走下舞池的时候，他可就显得非常着迷了。他立刻打听她的姓名，请人介绍，然后邀她跳下一场舞。他第三场舞是跟金小姐跳的，第四场跟玛丽雅·卢卡斯跳，第五场又跟吉英跳，第六场是跟丽萃跳，还有‘布朗谢’。” “要是他稍许体谅我一点，”她的丈夫不耐烦地叫起来了，“他就不会跳这么多，一半也不会！天哪，不要提他那些舞伴了吧。噢！但愿他头一场舞就跳得脚踝扭了筋！” “噢！亲爱的，”班纳特太太接下去说，“我非常喜欢他。他真太漂亮啦！他的姐妹们也都很讨人喜欢。我生平没有看见过任何东西比她们的衣饰更讲究。我敢说，赫斯脱太太衣服上的花边－－”说到这里又给岔断了。 班纳特先生不愿意听人谈到衣饰。她因此不得不另找话题，于是就谈到达西先生那不可一世的傲慢无礼的态度，她的措辞辛辣刻薄，而又带几分夸张。 “不过我可以告诉你，”她补充道，“丽萃不中他的意，这对丽萃并没有什么可惜，因为他是个最讨厌、最可恶的人不值得去奉承他。那么高傲，那么自大，叫人不可容忍！他一会儿走到这里，一会儿走到那里，把自己看得那么了不起！还要嫌人家不够漂亮，配不上跟他跳舞呢！要是你在场的话，你就可以好好地教训他一顿。我厌恶透了那个人。”"
