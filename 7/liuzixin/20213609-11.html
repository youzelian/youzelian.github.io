<html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iphone计算器</title>

<style>
.b1{
    width: 80px;
    height: 80px;
    border-radius: 40px;
    margin: top 10px;
    background-color: rgba(127, 117, 117, 0.549);
    font-size: 25px;
    color: white;

}
.b2{
    width: 160px;
    height: 80px;
    border-radius: 40px;
    margin: top 10px;
    background-color:  rgba(127, 117, 117, 0.549);
    font-size: 25px;
    color: white;
}
.b3{
    width: 80px;
    height: 80px;
    border-radius: 40px;
    margin: top 10px;
    background-color: rgba(252, 141, 23, 0.984);
    font-size: 25px;
    color: white;
}
.screen{
    width: 335px;
    height: 200px;
    text-align: center;
    padding-right: 10px; 
    font-size: 35px;
    background-color: black;
    border: none;
} 
div{
    padding: 5px;
}
input:hover{
    border:outset;
}
html{
    text-align: center;
    background-color: black;
}
</style>
</head>
<body>
    <div id="screen">
      <input type="text" id="" class="screen"  placeholder="请输入计算公式"> 
    </div> 
    <div>
        <input type="button" value="清除" class="b1">
        <input type="button" value="+/-" class="b1">
        <input type="button" value="%" class="b1">
        <input type="button" value="/" class="b3">
    </div>
    <div >
        <input type="button" value="1" class="b1">
        <input type="button" value="2" class="b1">
        <input type="button" value="3" class="b1">
        <input type="button"value="x" class="b3">
    </div>
    <div>
        <input type="button" value="4" class="b1">
        <input type="button" value="5" class="b1">
        <input type="button" value="6" class="b1">
        <input type="button" value="-" class="b3">
    </div>
    <div>
        <input type="button" value="7" class="b1">
        <input type="button" value="8" class="b1">
        <input type="button" value="9" class="b1">
        <input type="button" value="+" class="b3">
        </div>
    <div>
        <input type="button" value="0" class="b2">
        <input type="button" value="." class="b1">
        <input type="button" value="=" class="b3">

    </div>


</body>


</html>
