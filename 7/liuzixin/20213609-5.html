<body>

下马饮君酒，问君何所之。
君言不得意，归卧南山陲。
但去莫复闻，白云无尽时。

    <div id="show2">
	<p>杜甫《八阵图》</p><br>

    </div>
 
    <script>

            document.getElementById('show2').style.display= 'block';
