<!DOCTYPE html>
<html lang="en">
 <head>
  <meta charset="UTF-8">
  <title>20213611桂祺-5</title>
  <style type="text/css">
	body{
	text-align: center;
	font-family:宋体;
	font-size:50px;
	}
	h2{

	h6{ font-size:50px;
	}
  </style>
 </head>
 <body>
  <input type="button" value="点我出现标题" id="1">
  <input type="button" value="点我出现作者" id="2">
  <input type="button" value="点我出现第一句" id="3">
  <input type="button" value="点我出现第二句" id="4">
  <input type="button" value="点我出现第三句" id="5">
  <input type="button" value="点我出现第四句" id="6">
  <h1></h1>
  <h2></h2>
  <h3></h3>
  <h4></h4>
  <h5></h5>
  <h6></h6>
  <script>
	var b1 = document.getElementById("1");
	var b2 = document.getElementById("2");
	var b3 = document.getElementById("3");
	var b4 = document.getElementById("4");
	var b5 = document.getElementById("5");
	var b6 = document.getElementById("6");
	var headline1= document.querySelector("h1");
	var headline2= document.querySelector("h2");
	var headline3= document.querySelector("h3");
	var headline4= document.querySelector("h4");
	var headline5= document.querySelector("h5");
	var headline6= document.querySelector("h6");
	b1.onclick=function(){
			headline1.textContent = "草";
		};
	b2.onclick=function(){
			headline2.textContent = "——白居易";
		};
	b3.onclick=function(){
			headline3.textContent = "离离原上草，一岁一枯荣。";
		};
	b4.onclick=function(){
			headline4.textContent = "野火烧不尽，春风吹又生。";
		};
	b5.onclick=function(){
			headline5.textContent = "远芳侵古道，晴翠接荒城。";
		};
	b6.onclick=function(){
			headline6.textContent = "又送王孙去，萋萋满别情。";
		};
  </script>
 </body>
