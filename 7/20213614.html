<!DOCTYPE html>
<html lang="en">
 <head>
  <meta charset="UTF-8">
  <title></title>
<style>
body{
		background-image:url("https://pic4.zhimg.com/v2-d68420a0f2f4e428aece63976b2796cf_r.jpg?source=1940ef5cS")
		}
        h1,
        h2,
        h3,
        h3,
        h4,
        h5,
        h6 {
            font-size: 30px;
            font-family: 宋体, 微软雅黑, 楷体, 草书;
            margin: 30px;
	  text-align:center;	
        }
</style>
 </head>
 <body>
  <input type="button" value="1" id="z1">
  <input type="button" value="2" id="z2">
  <input type="button" value="3" id="z3">
  <input type="button" value="4" id="z4">
  <h1></h1>
  <h2></h2>
  <h3></h3>
  <h4></h4>
  <script>
	var b1 =document.getElementById("z1");
	var r1 = document.querySelector("h1");
	var b2 =document.getElementById("z2");
	var r2 = document.querySelector("h2");
	var b3 =document.getElementById("z3");
	var r3 = document.querySelector("h3");
	var b4 =document.getElementById("z4");
	var r4 = document.querySelector("h4");
	b1.onclick=function(){
			r1.textContent = "桃夭";
		};
	b2.onclick=function(){
			r2.textContent = "桃之夭夭，灼灼其华。之子于归，宜其室家。";
		};
	b3.onclick=function(){
			r3.textContent = "桃之夭夭，有蕡其实。之子于归，宜其家室。";
		};
	b4.onclick=function(){
			r4.textContent = "桃之夭夭，其叶蓁蓁。之子于归，宜其家人。";
		};
  </script>
 </body>
</html>
