<!DOCTYPE html>
<html lang="en">
 <head>
  <meta charset="UTF-8">
  <title>20213611-03</title>
<style type="text/css">
a{		font-size:50px;/*链接字体大小*/
		font-weight:bold;/*链接字体加粗*/
		text-decoration:none;/*去掉链接修饰（下划线）*/
		color:yellow;/*链接颜色*/
}
a:link{ border:1px solid white;/*链接方框的宽度、固体、颜色*/
		background-color:blue;/*链接背景颜色*/
		margin:10px;/*链接方框外边距*/
		padding:10px;/*链接方框内边距*/
		}/*对链接本体的修饰*/
a:visited{
		color:red;/*链接访问后呈的颜色*/
		font-size:70px;
}/*对链接访问后的修饰*/
a:hover{color:pink;/*鼠标放上时的颜色*/
		}/*鼠标放上去的属性*/
a:active{
		color:black;/*鼠标点击瞬间的颜色*/
		font-size:60px;/*鼠标点击瞬间的大小*/
		}/*鼠标点击瞬间的属性*/
</style>
 </head>
 <body>
<a href="http://lijianhong.top/WebBasic/">Web学习网址</a>
 </body>
</html>
