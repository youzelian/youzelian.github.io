<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>计算器外观</title>
</head>
<style type="text/css">
/* 背景图*/
body{
	background-image: linear-gradient(-90deg, #29bdd9 0%, #276ace 100%)
}
*{
    /* 按键里面的字符无法被选中 */
    user-select: none;
}
#cal{
    width: 280px;
    height: 440px;
    background-color:#f4f1f4;
    /* 改变形状  边框圆角;圆角半径 */
    border-radius: 10px;

    margin: 10% auto;
}
/*输出框上面的那一部分，增加35px的高度更加美观*/
#kong{
    height: 35px;
	background-color: cyan;
}

#shuchukuang{
    width: 280px;
    height: 65px;
    background-color: #f4f1f4;
}

#shuchukuang input{
    margin: 6px;
    width: 95%;
    height: 60px;
    text-align: right; 
    border: none;
    /* 改变字体 */
    color:#60afe4;
    font-size: 30px;
}

#button{
    width: 100%;
    height: 330px;
    background-color: cyan;
    float: left;
}
#button li{
    /* 去掉标签前面默认的小点点 */
	list-style-type: none;
    float: left;
}
 /* 数字按钮 */
#button .an1{
    width: 50px;
    height: 50px;
    background-color: #7fc1ee;
    /* 添加li之间的间隔 */
    margin: 5px;
    /* 将形状变成圆形 */
    -webkit-border-radius:50px;
    -moz-border-radius: 50px;
    border-radius: 50px;
    /* 文字居中 */
    text-align: center;
    line-height: 50px;
    /* 改变字体 */
    color:#f4f1f4;
    font-size: 25px;
}

/* 按钮位置 */
#button .center{
    position: relative;
    right: 20px;
}
#button .an2{
 width: 50px;
    height: 50px;
    background-color:#FF77FF;
    /* 添加li之间的间隔 */
    margin: 5px;
    /* 改变形状 */
    -webkit-border-radius:50px;
    -moz-border-radius: 50px;
    border-radius: 50px;
    /* 文字居中 */
    text-align: center;
    line-height: 50px;
    /* 改变字体 */
    font-size: 25px;
}
#button .an3{
    width: 50px;
    height: 50px;
    background-color: #60afe4;
    /* 添加li之间的间隔 */
    margin: 5px;
    /* 改变形状 */
    -webkit-border-radius:50px;
    -moz-border-radius: 50px;
    border-radius: 50px;
    /* 文字居中 */
    text-align: center;
    line-height: 50px;
    /* 改变字体颜色 */
    color:#f4f1f4;
    font-size: 25px;
}
#button .an4{
    width: 50px;
    height: 50px;
    background-color: #FF8888;
    /* 添加li之间的间隔 */
    margin: 5px;
    /* 改变形状 */
    -webkit-border-radius:50px;
    -moz-border-radius: 50px;
    border-radius: 50px;
    /* 文字居中 */
    text-align: center;
    line-height: 50px;
    /* 改变字体颜色 */
    color:#f4f1f4;
    font-size: 25px;
}
#button .an5{
    width: 50px;
    height: 50px;
    background-color:#FF77FF;
    /* 添加li之间的间隔 */
    margin: 5px;
    /* 改变形状 */
    -webkit-border-radius:50px;
    -moz-border-radius: 50px;
    border-radius: 50px;
    /* 文字居中 */
    text-align: center;
    line-height: 50px;
    /* 改变字体 */
    font-size: 25px;
}

</style>
<body>
    <div id="cal">

        <div id="kong"></div>
        <div id="shuchukuang">
            <input type="text" id="shu">
        </div>
        <div id="button">
            <ul class="center">
                <li class="an2" onclick="">C</li>
                <li class="an3" onclick="">.</li>
                <li class="an5" onclick="">←</li>
                <li class="an3" onclick="">÷</li>
                <li class="an1" onclick="">1</li>
                <li class="an1" onclick="">2</li>
                <li class="an1" onclick="">3</li>
                <li class="an3" onclick="">×</li>
                <li class="an1" onclick="">4</li>
                <li class="an1" onclick="">5</li>
                <li class="an1" onclick="">6</li>
                <li class="an3" onclick="">+</li>
                <li class="an1" onclick="">7</li>
                <li class="an1" onclick="">8</li>
                <li class="an1" onclick="">9</li>
                <li class="an3" onclick="">-</li>
                <li class="an3" onclick="">(</li>
                <li class="an1" onclick="">0</li>
                <li class="an3" onclick="">)</li>
                <li class="an4" onclick="">=</li>
            </ul>
        </div>

    </div>


    </script>
    
</body>
</html>
