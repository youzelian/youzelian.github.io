<h1>
南山
</h1>
<h2>
唐·李山甫
</h2>
<p>
钝碧顽青几万秋，直无天地始应休。
莫嫌尘土佯遮面，能向楼台强出头。
霁色陡添千尺翠，夕阳闲放一堆愁。
假饶不是神仙骨，终抱琴书向此游。
