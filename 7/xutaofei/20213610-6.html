  <title>第六次作业</title>
  <script>
  var ts=[];
  ts[0]="《感遇·其一》 作者：张九龄 兰叶春葳蕤，桂华秋皎洁。欣欣此生意，自尔为佳节。 谁知林栖者，闻风坐相悦。草木有本心，何求美人折？　";
  ts[1]="《感遇·其二》 作者：张九龄 江南有丹桔，经冬犹绿林。 岂伊地气暖，自有岁寒心。 可以荐佳客，奈何阻重深。 运命唯所遇，循环不可寻。 徒言树桃李，此木岂无阴。 ";
  ts[2]="《下终南山过斛斯山人宿置酒》 作者：李白 暮从碧山下，山月随人归。 却顾所来径，苍苍横翠微。 相携及田家，童稚开荆扉。 绿竹入幽径，青萝拂行衣。 欢言得所憩，美酒聊共挥。 长歌吟松风，曲尽河星稀。 我醉君复乐，陶然共忘机。 ";
ts[3]="将进酒李白〔唐代〕君不见黄河之水天上来，奔流到海不复回。君不见高堂明镜悲白发，朝如青丝暮成雪。人生得意须尽欢，莫使金樽空对月。天生我材必有用，千金散尽还复来。烹羊宰牛且为乐，会须一饮三百杯。岑夫子，丹丘生，将进酒，杯莫停。与君歌一曲，请君为我倾耳听。(倾耳听 一作：侧耳听)钟鼓馔玉不足贵，但愿长醉不愿醒。(不足贵 一作：何足贵；不愿醒 一作：不复醒)古来圣贤皆寂寞，惟有饮者留其名。(古来 一作：自古；惟 通：唯)陈王昔时宴平乐，斗酒十千恣欢谑。主人何为言少钱，径须沽取对君酌。五花马、千金裘，呼儿将出换美酒，与尔同销万古愁。";
ts[4]="水调歌头·明月几时有苏轼〔宋代〕丙辰中秋，欢饮达旦，大醉，作此篇，兼怀子由。明月几时有？把酒问青天。不知天上宫阙，今夕是何年。我欲乘风归去，又恐琼楼玉宇，高处不胜寒。起舞弄清影，何似在人间。(何似 一作：何时；又恐 一作：惟 / 唯恐)转朱阁，低绮户，照无眠。不应有恨，何事长向别时圆？人有悲欢离合，月有阴晴圆缺，此事古难全。但愿人长久，千里共婵娟。(长向 一作：偏向)";
ts[5]="陋室铭刘禹锡〔唐代〕　　山不在高，有仙则名。水不在深，有龙则灵。斯是陋室，惟吾德馨。苔痕上阶绿，草色入帘青。谈笑有鸿儒，往来无白丁。可以调素琴，阅金经。无丝竹之乱耳，无案牍之劳形。南阳诸葛庐，西蜀子云亭。孔子云：何陋之有？";
ts[6]="关雎佚名〔先秦〕关关雎鸠，在河之洲。窈窕淑女，君子好逑。参差荇菜，左右流之。窈窕淑女，寤寐求之。求之不得，寤寐思服。悠哉悠哉，辗转反侧。参差荇菜，左右采之。窈窕淑女，琴瑟友之。参差荇菜，左右芼之。窈窕淑女，钟鼓乐之。";
ts[7]="念奴娇·赤壁怀古苏轼〔宋代〕大江东去，浪淘尽，千古风流人物。故垒西边，人道是，三国周郎赤壁。乱石穿空，惊涛拍岸，卷起千堆雪。(穿空 一作：崩云)江山如画，一时多少豪杰。遥想公瑾当年，小乔初嫁了，雄姿英发。羽扇纶巾，谈笑间，樯橹灰飞烟灭。(樯橹 一作：强虏)故国神游，多情应笑我，早生华发。人生如梦，一尊还酹江月。(人生 一作：人间；尊 同：樽)";
