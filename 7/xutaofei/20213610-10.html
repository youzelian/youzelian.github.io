
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>第十次作业</title>
    <style>/*全为css部分不予介绍*/
        * {
            margin: 0;
            padding: 0;
        }

        body {
            background-color: gray;
            text-align: center;
        }

        input {
            width: 60px;
            height: 60px;
            font-size: 18px;
            border-radius: 30px;
        }

        .gushi {
            white-space: pre-line;
        }

        h3 {
            font: 500 50px 楷体, 微软雅黑;
        }

        p {
            font: 33px/45px 楷体, 微软雅黑;
        }

        .yu {

            float: right;
            margin-top: 250px;
            font-size: 15px;
        }
    </style>
    <script src="https://lijianhong19720904.github.io/ts300.js">
    </script>
</head>

<body>
    <input type="button" value="上一首" id="pre">
    <input type="button" value="下一首" id="next">
	<input type="button" value="抽一首" id="random">
    <div class="gushi">
        <h3></h3>
        <p></p>
    </div>
    <script>
        var pre = document.getElementById("pre");/*抓取*/
        var next = document.getElementById("next");
		var random=document.getElementById("random");
        var h3 = document.querySelector("h3");
        var p = document.querySelector("p");
        var ts = []
        var BEGIN = 10,
            END = 320,
            i = 10,
            p1,
            p2;
        for (i = BEGIN; i < END; i++) {/*循环部分*/
            p1 = ts300.search(toString(i));/*使用定义函数*/
            p2 = ts300.search(toString(i + 1));
            if (p1 !== -1 && p2 !== -1) {
                ts[i - BEGIN] = ts300.substring(p1, p2);
            }
        }
        ts[ts.length - 1] = ts300.substring(p2);
        function toString(i) {/*定义函数tostring使得i变成字符串形式*/
            if (i < 100) {
                return '0' + i;
            }
            else {
                return i + '';
            }
        }
        next.onclick = function () {
            if (i >= 0 && i < 310) {/*简单的循环结构*/
                i++;
                p.textContent = ts[i];
            }
            else {
                i = 0;
                p.textContent = ts[i];
            }

        }
        pre.onclick = function () {
            if (i >= 0 && i < 310) {
                i--;
                p.textContent = ts[i];
            }
            else {
                i = 309;
                p.textContent = ts[i];
            }
        } 
		random.onclick =function(){/*唐诗抽取功能*/
		var min=0; /*定义最小数字*/
		var max=310;/*定义最大数字*/  
		var i =Math.floor(Math.random() * (+max - +min)) + +min; /*随机取数函数*/
		p.textContent=ts[i]/*储存在p当中*/  
		}
    </script>
</body>

</html>
