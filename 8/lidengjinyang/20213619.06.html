<script>
        var title = document.querySelector("h1");
        var content1 = document.querySelector("h2");

        var prev = document.querySelector("input#prev");
        var next = document.querySelector("input#next");
		var i=1;

        prev.onclick = function () {

            content1.textContent = one[i];
            content2.textContent = two[i];
			i--;
			}
		next.onclick = function () {
			title.textContent = ts[i];

			i++;
			}
