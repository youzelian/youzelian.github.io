<!doctype html>
<html lang="en">
 <head>
  <meta charset="UTF-8">  
  <title>盒装模型</title>
  <style type="text/css">
    body{font-size:30px;}
	#boxDad
	{
	display:inline;
	width:500px;
	border:2px solid gray;
	margin:10px;
	}
	#boxSon1,#boxSon2
	{ 
	display:inline
    width:400px;
	border:1px solid black;
	margin:20px;
	text-align:center;
	}
	div{display:inline;}
	</style>
 </head>
 <body>
 <div id="boxDad">
   <div id="boxSon1">
    春晓
	【唐】孟浩然
   </div>
   <div id="boxSon2">
   春眠不觉晓，
   处处闻啼鸟。
   夜来风雨声，
   花落知多少。
   </div>
 </div>
 </body>
</html>
