    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
            font-family: 'Courier New', Courier, monospace;
            color: blue;
        }

        body {
            text-align: center;
            background-image: url("https://c-ssl.duitang.com/uploads/item/202103/31/20210331120343_cMZwJ.jpeg");
            background-repeat: repeat;
            background-position: center;
        }

        header,
        nav,
        article,
        footer {
            border: 1px solid gray;
            font-size: 1.3vw;
        }

        header {
            position: relative;
            height: 20%;
            white-space: pre-line;
        }

        header img {
            position: absolute;
            top: 0;
            right: 0;
            /* width: 10%; */
            height: 80%;
            z-index: 1;
        }

        header p {
            position: absolute;
            bottom: 0;
            right: 1%;
            z-index: 2;
        }

        nav {
            height: 25%;
        }

        article {
            height: 40%;
            font-size: 1.5em;
        }

        input {
            width: 10%;
            margin: 5px;
            box-shadow: 2px 2px 2px gray;
            background-color: #b490b8;
            border: none;
            border-radius: 30px;
            font-size: 0.7em;
            color: black;
            outline: none;
            cursor: pointer;
            line-height: 250%;
        }

        footer {
            height: 15%;
        }

        footer p {
            margin-top: 50px;
        }
    </style>
</head>
