<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>唐诗30首</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        body {
            background-color:lightblue;
            text-align: center;
        }

        input {
            width: 60px;
            height: 40px;
            font-size: 18px;
          
        }

        .gushi {
            white-space: pre-line;
        }

        h3 {
            font: 500 50px 楷体,黑体;
        }

        p {
            font: 33px/45px 楷体,黑体;
        }

        .yu {
            /* 布局定位属性 */
            float: right;
            /* 自身属性 */
            margin-top: 250px;
            /* 文本属性 */
            font-size: 15px;
        }
    </style>
</head>

<body>
    <input type="button" value="上一首" id="pre">
    <input type="button" value="下一首" id="next">
    <div class="gushi">
        <h3></h3>
        <p></p>
    </div>
    <div class="yu">节选（30首）</div>
    <script>
        var poem = "010杜甫:佳人\n绝代有佳人,幽居在空谷。\n自云良家子,零落依草木。\n关中昔丧乱,兄弟遭杀戮。\n官高何足论,不得收骨肉。\n世情恶衰歇,万事随转烛。\n夫婿轻薄儿,新人美如玉。\n合昏尚知时,鸳鸯不独宿。\n但见新人笑,那闻旧人哭。\n在山泉水清,出山泉水浊。\n侍婢卖珠回,牵萝补茅屋。\n摘花不插发,采柏动盈掬。\n天寒翠袖薄,日暮倚修竹。\n011杜甫:梦李白二首之一\n死别已吞声,生别常恻恻。\n江南瘴疠地,逐客无消息。\n故人入我梦,明我长相忆。\n君今在罗网,何以有羽翼。\n恐非平生魂,路远不可测。\n魂来枫林青,魂返关塞黑。\n落月满屋梁,犹疑照颜色。\n水深波浪阔,无使蛟龙得。\n012杜甫:梦李白二首之二\n浮云终日行,游子久不至。\n三夜频梦君,情亲见君意。\n告归常局促,苦道来不易。\n江湖多风波,舟楫恐失坠。\n出门搔白首,若负平生志。\n冠盖满京华,斯人独憔悴。\n孰云网恢恢,将老身反累。\n千秋万岁名,寂寞身后事。\n013王维:送别\n下马饮君酒,问君何所之。\n君言不得意,归卧南山陲。\n但去莫复闻,白云无尽时。\n014王维:送綦毋潜落第还乡\n圣代无隐者,英灵尽来归。\n遂令东山客,不得顾采薇。\n既至金门远,孰云吾道非。\n江淮度寒食,京洛缝春衣。\n置酒长安道,同心与我违。\n行当浮桂棹,未几拂荆扉。\n远树带行客,孤城当落晖。\n吾谋适不用,勿谓知音稀。\n015王维:青溪\n言入黄花川,每逐青溪水。\n随山将万转,趣途无百里。\n声喧乱石中,色静深松里。\n漾漾泛菱荇,澄澄映葭苇。\n我心素已闲,清川澹如此。\n请留盘石上,垂钓将已矣。\n016王维:渭川田家\n斜光照墟落,穷巷牛羊归。\n野老念牧童,倚杖候荆扉。\n雉[句隹]麦苗秀,蚕眠桑叶稀。\n田夫荷锄立,相见语依依。\n即此羡闲逸,怅然吟式微。\n017王维:西施咏\n艳色天下重,西施宁久微。\n朝为越溪女,暮作吴宫妃。\n贱日岂殊众,贵来方悟稀。\n邀人傅脂粉,不自著罗衣。\n君宠益娇态,君怜无是非。\n当时浣纱伴,莫得同车归。\n持谢邻家子,效颦安可希。\n018孟浩然:秋登兰山寄张五\n北山白云里,隐者自怡悦。\n相望始登高,心随雁飞灭。\n愁因薄暮起,兴是清秋发。\n时见归村人,沙行渡头歇。\n天边树若荠,江畔洲如月。\n何当载酒来,共醉重阳节。\n019孟浩然:夏日南亭怀辛大\n山光忽西落,池月渐东上。\n散发乘夜凉,开轩卧闲敞。\n荷风送香气,竹露滴清响。\n欲取鸣琴弹,恨无知音赏。\n感此怀故人,中宵劳梦想。\n020孟浩然:宿业师山房待丁大不至\n夕阳度西岭,群壑倏已暝。\n松月生夜凉,风泉满清听。\n樵人归欲尽,烟鸟栖初定。\n之子期宿来,孤琴候萝径。\n021王昌龄:同从弟南斋玩月忆山阴崔少府\n高卧南斋时,开帷月初吐。\n清辉淡水木,演漾在窗户。\n苒苒几盈虚,澄澄变今古。\n美人清江畔,是夜越吟苦。\n千里其如何,微风吹兰杜。\n022邱为:寻西山隐者不遇\n绝顶一茅茨,直上三十里。\n扣关无僮仆,窥室惟案几。\n若非巾柴车,应是钓秋水。\n差池不相见,黾勉空仰止。\n草色新雨中,松声晚窗里。\n及兹契幽绝,自足荡心耳。\n虽无宾主意,颇得清净理。\n兴尽方下山,何必待之子。\n023綦毋潜:春泛若耶溪\n幽意无断绝,此去随所偶。\n晚风吹行舟,花路入溪口。\n际夜转西壑,隔山望南斗。\n潭烟飞溶溶,林月低向后。\n生事且弥漫,愿为持竿叟。\n024常建:宿王昌龄隐居\n清溪深不测,隐处唯孤云。\n松际露微月,清光犹为君。\n茅亭宿花影,药院滋苔纹。\n余亦谢时去,西山鸾鹤群。\n025岑参:与高适薛据登慈恩寺浮图\n塔势如涌出,孤高耸天宫。\n登临出世界,磴道盘虚空。\n突兀压神州,峥嵘如鬼工。\n四角碍白日,七层摩苍穹。\n下窥指高鸟,俯听闻惊风。\n连山若波涛,奔凑如朝东。\n青槐夹驰道,宫馆何玲珑。\n秋色从西来,苍然满关中。\n五陵北原上,万古青蒙蒙。\n净理了可悟,胜因夙所宗。\n誓将挂冠去,觉道资无穷。\n026元结:贼退示官吏并序\n癸卯岁,西原贼入道州,焚烧杀掠,几尽而去。明年,贼又攻永州,破邵,不犯此州边鄙而退,岂力能制敌欤。盖蒙其伤怜而已。诸史何为忍苦征敛。故作诗一篇以示官吏。\n昔岁逢太平,山林二十年。\n泉源在庭户,洞壑当门前。\n井税有常期,日晏犹得眠。\n忽然遭时变,数岁亲戎旃。\n今来典斯郡,山夷又纷然。\n城小贼不屠,人贫伤可怜。\n是以陷邻境,此州独见全。\n使臣将王命,岂不如贼焉。\n令彼征敛者,迫之如火煎。\n谁能绝人命,以作时世贤。\n思欲委符节,引竿自刺船。\n将家就鱼麦,归老江湖边。\n027韦应物:郡斋雨中与诸文士燕集\n兵卫森画戟,宴寝凝清香。\n海上风雨至,逍遥池阁凉。\n烦疴近消散,嘉宾复满堂。\n自惭居处崇,未睹斯民康。\n理会是非遣,性达形迹忘。\n鲜肥属时禁,蔬果幸见尝。\n俯饮一杯酒,仰聆金玉章。\n神欢体自轻,意欲凌风翔。\n吴中盛文史,群彦今汪洋。\n方知大蕃地,岂曰财赋强。\n028韦应物:初发扬子寄元大校书\n凄凄去亲爱,泛泛入烟雾。\n归棹洛阳人,残钟广陵树。\n今朝为此别,何处还相遇。\n世事波上舟,沿洄安得住。\n029韦应物:寄全椒山中道士\n今朝郡斋冷,忽念山中客。\n涧底束荆薪,归来煮白石。\n欲持一瓢酒,远慰风雨夕。\n落叶满空山,何处寻行迹。\n030韦应物:长安遇冯著\n客从东方来,衣上灞陵雨。\n问客何为来,采山因买斧。\n冥冥花正开,扬扬燕新乳。\n昨别今已春,鬓丝生几缕。\n031韦应物:夕次盱眙县\n落帆逗淮镇,停舫临孤驿。\n浩浩风起波,冥冥日沈夕。\n人归山郭暗,雁下芦洲白。\n独夜忆秦关,听钟未眠客。\n032韦应物:东郊\n吏舍局终年,出郊旷清曙。\n杨柳散和风,青山澹吾虑。\n依丛适自憩,缘涧还复去。\n微雨霭芳原,春鸠鸣何处。\n乐幽心屡止,遵事迹犹遽。\n终罢斯结庐,慕陶真可庶。\n033韦应物:送杨氏女\n永日方戚戚,出行复悠悠。\n女子今有行,大江溯轻舟。\n尔辈苦无恃,抚念益慈柔。\n幼为长所育,两别泣不休。\n对此结中肠,义往难复留。\n自小阙内训,事姑贻我忧。\n赖兹托令门,仁恤庶无尤。\n贫俭诚所尚,资从岂待周。\n孝恭遵妇道,容止顺其猷。\n别离在今晨,见尔当何秋。\n居闲始自遣,临感忽难收。\n归来视幼女,零泪缘缨流。\n034柳宗元:晨诣超师院读禅经\n汲井漱寒齿,清心拂尘服。\n闲持贝叶书,步出东斋读。\n真源了无取,忘迹世所逐。\n遗言冀可冥,缮性何由熟。\n道人庭宇静,苔色连深竹。\n日出雾露馀,青松如膏沐。\n澹然离言说,悟悦心自足。\n035柳宗元:溪居\n久为簪组累,幸此南夷谪。\n闲依农圃邻,偶似山林客。\n晓耕翻露草,夜榜响溪石。\n来往不逢人,长歌楚天碧。\n036王昌龄:塞上曲\n蝉鸣空桑林,八月萧关道。\n出塞复入塞,处处黄芦草。\n从来幽并客,皆向沙场老。\n莫学游侠儿,矜夸紫骝好。\n037王昌龄:塞下曲\n饮马渡秋水,水寒风似刀。\n平沙日未没,黯黯见临洮。\n昔日长城战,咸言意气高。\n黄尘足今古,白骨乱蓬蒿。\n038李白:关山月\n明月出天山,苍茫云海间。\n长风几万里,吹度玉门关。\n汉下白登道,胡窥青海湾。\n由来征战地,不见有人还。\n戍客望边色,思归多苦颜。\n高楼当此夜,叹息未应闲。\n039李白:子夜四时歌:春歌\n秦地罗敷女,采桑绿水边。\n素手青条上,红妆白日鲜。\n蚕饥妾欲去,五马莫留连。";
        //定义向前向后的按钮
        var pre = document.getElementById("pre");
        var next = document.getElementById("next");
        //定义标题和内容
        var h3 = document.querySelector("h3");
        var p = document.querySelector("p");
        // 搜索所有的数字
        var arr = poem.match(/\d+(.\d+)?/g);
        var i = 0;
        var poemcontent = poem.substring(poem.search(arr[i]), poem.search(arr[i + 1]));
        var poembreak = poemcontent.split("\n");
        h3.textContent = poembreak[0];
        var Enter = poemcontent.search("\n");
        p.textContent = poem.substring(poem.search(arr[i]), poem.search(arr[i + 1])).substring(Enter, poem.search(arr[i + 1]));
        pre.onclick = function () {
            if (i == -1) {
                i = 29;
            }
            if (i == 0) {
                i = 30;
            }
            if (i > 0) {
                i--;
                poemcontent = poem.substring(poem.search(arr[i]), poem.search(arr[i + 1]));
                poembreak = poemcontent.split("\n");
                h3.textContent = poembreak[0];
                Enter = poemcontent.search("\n");
                p.textContent = poem.substring(poem.search(arr[i]), poem.search(arr[i + 1])).substring(Enter, poem.search(arr[i + 1]));
            }
            if (i == 309) {
                poemcontent = poem.substring(poem.search(arr[309]));
                poembreak = poemcontent.split("\n");
                h3.textContent = poembreak[0];
                Enter = poemcontent.search("\n");
                p.textContent = poemcontent.substring(Enter);
            }
        }
        next.onclick = function () {
            if (i < arr.length - 1) {
                i++;
            }
            poemcontent = poem.substring(poem.search(arr[i]), poem.search(arr[i + 1]));
            poembreak = poemcontent.split("\n");
            h3.textContent = poembreak[0];
            Enter = poemcontent.search("\n");
            p.textContent = poemcontent.substring(Enter, poem.search(arr[i + 1]));
            if (i == 29) {
                i = -1;
                poemcontent = poem.substring(poem.search(arr[309]));
                poembreak = poemcontent.split("\n");
                h3.textContent = poembreak[0];
                Enter = poemcontent.search("\n");
                p.textContent = poemcontent.substring(Enter);
            }
        }
    </script>
</body>

</html>
