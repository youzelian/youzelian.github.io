 <body>
  <h1>
  酬乐天扬州初逢席上见赠
  </h1>
  <h2>
 刘禹锡
  </h2>
  <p>
  巴山楚水凄凉地，二十三年弃置身。
  </p>
  <p>
  怀旧空吟闻笛赋，到乡翻似烂柯人。
  </p>
  <p>
  沉舟侧畔千帆过，病树前头万木春。
  </p>
  <p>
  今日听君歌一曲，暂凭杯酒长精神。
  </p>
