    <h1>《莲叶》</h1>
    <h2>[ 唐 ] 郑谷</h2>

    <p>移舟水溅差差绿，倚槛风摇柄柄香。</p>

    <p>多谢浣溪人不折，雨中留得盖鸳鸯。</p>
