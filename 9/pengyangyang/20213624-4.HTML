<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Document</title>
    <style type="text/css">
        body {
            background-image: url(https://p5.ssl.qhimgs1.com/sdr/400__/t0123655bc7c9d1550f.jpg);
            background-repeat: no-repeat;
            background-size: 58%;
            background-position: center;
        }
        
        div {
            padding-top: 170px;
        }
    </style>
</head>

<body>
    <div>
        <table align="center" width="40%" border="1" cellpadding="0" cellspacing="0">
            <tr>
                <th colspan="3"> 疫情防控调查 </th>
            </tr>
            <tr>
                <td>姓名<input type="text" id="usename" name="usename"></td>
                <td colspan="2">电话号码<input type="password" id="tf" name="tf"></td>
            </tr>
            <tr>
                <td>身份证号码<input type="password" id="shenfenzhenghaoma" name="shenfenzhenghaoma"></td>
                <td colspan="2">家庭地址<input type="text" name="dizhi" id="dizhi"></td>
            </tr>
            <tr>
                <td>性别</td>
                <td colspan="2"><input type="radio" id="nan" name="sex"> 男 <input type="radio" id="nv" name="sex"> 女 </td>
            </tr>
            <tr>
                <td>爱好</td>
                <td colspan="2"><input type="checkbox" name="hobby">听歌<input type="checkbox" name="hobby">运动<input type="checkbox" name="hobby">看书<input type="checkbox" name="hobby">唱歌<input type="checkbox" name="hobby">其他</td>
            </tr>
            <tr>
                <td>电子健康码</td>
                <td colspan="2"> 绿码 <input type="radio" id="green" name="ma"> 黄码 <input type="radio" id="yellow" name="ma"> 红码 <input type="radio" id="red" name="ma"></td>
            </tr>
            <tr>
                <td>前14天是否有右边症状</td>
                <td> 否 <input type="checkbox" id="fou" name="zhengzhuang"></td>
                <td> 发热 <input type="checkbox" name="zhengzhuang"> 腹泻 <input type="checkbox" name="zhengzhuang"> 咳嗽 <input type="checkbox" name="zhengzhuang"></td>
            </tr>
            <tr>
                <td>前14天是否有高风险地区居住史</td>
                <td>否 <input type="checkbox" name="juzhu"></td>
                <td> 返回时间：<br><input type="number" name="juzhu" value="2022"> 年 <input type="number" name="juzhu" value="6"> 月 <input type="number" name="juzhu" value="15"> 日 </td>
            </tr>
            <tr>
                <td>前28天是否有出境史</td>
                <td>否 <input type="checkbox" name="chujing"></td>
                <td> 出境时间：<br><input type="number" name="chujing" value="2022"> 年 <input type="number" name="chujing" value="6"> 月 <input type="number" name="chujing" value="15"> 日 </td>
            </tr>
            <tr>
                <td>承诺人：<input type="text" name="chengnuoren"></td>
                <td>日期</td>
                <td><input type="number" name="chengnuoren" value="2022"> 年 <input type="number" name="chujchengnuorening" value="6"> 月 <input type="number" name="chengnuoren" value="15"> 日 </td>
            </tr>
            <td colspan="3">
                <h5>*本人对以上提供的健康信息的真实性负责，如因信息不实，引起疫情传播或扩散，愿承担由此带来的全部法律责任。</h5>
            </td>
        </table>
    </div>


</body>

</html>
