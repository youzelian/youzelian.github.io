<!doctype html>
<html lang="en">
 <head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>唐诗三百首</title>
<script src="https://youzelian.github.io/ts300.js">
</script>
<style type="text/css">
   body {
            font-family: serif;
            text-align: center;
            background-repeat: no-repeat;
        }
        
     h1 {
            font-size: 50px;
            color: rgb(253, 7, 130);
        }
        
      p {
            font-size: 35px;
        }
  input {
            width: 60px;
            height: 60px;
            font-size: 18px;
            border-radius: 25px;
			color:red;
        }   
    </style>
 </head>
 <body>
 <input type="button" id="p" value="上一首">
        <input type="button" id="n" value="下一首">
        <h1 id="bt"></h1>
        <p id="sj"></p>
    </center>

    <script>
        var i = 0;
        var v = poem.match(/\d+/g);
        var bt = document.querySelector("#bt");
        var sj = document.querySelector("#sj");
        var p = document.querySelector("#p");
        var n = document.querySelector("#n");
        var zsj = poem.substring(poem.search(v[i]), poem.search(v[i + 1]));
        var enter = zsj.match("\n");
        bt.textContent = zsj.substring(zsj.search(v[i]), zsj.search("\n"));
        sj.textContent = poem.substring(poem.search(v[i]), poem.search(v[i + 1])).substring(zsj.search("\n"), poem.search(v[i + 1]));
        n.onclick = function() {
            i = i + 1;
            if (i == 300) {
                alert("已经到底了,跳回第一首!!!!!");
                i = 0;
            }
            var zsj = poem.substring(poem.search(v[i]), poem.search(v[i + 1]));
            bt.textContent = zsj.substring(zsj.search(v[i]), zsj.search("\n"));
            sj.textContent = poem.substring(poem.search(v[i]), poem.search(v[i + 1])).substring(zsj.search("\n"), poem.search(v[i + 1]));

        }
        p.onclick = function() {
            i = i - 1;
            if (i == -1) {
                alert("已经到顶了,跳回最后一首!!!!!");
                i = 299;
            }
            var zsj = poem.substring(poem.search(v[i]), poem.search(v[i + 1]));
            bt.textContent = zsj.substring(zsj.search(v[i]), zsj.search("\n"));
            sj.textContent = poem.substring(poem.search(v[i]), poem.search(v[i + 1])).substring(zsj.search("\n"), poem.search(v[i + 1]));

        }
    </script>
  
 </body>
</html>
