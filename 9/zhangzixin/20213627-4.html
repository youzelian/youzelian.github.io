    <div id="content">钟南山，男，汉族，中共党员，1936年10月20日出生于江苏南京，福建厦门人，呼吸内科学家，广州医科大学附属第一医院国家呼吸系统疾病临床医学研究中心主任，中国工程院院士，中国医学科学院学部委员，中国抗击非典型肺炎、新冠肺炎疫情的领军人物，曾任广州医学院（现广州医科大学）党委书记、院长及第一附属医院院长，中华医学会会长，呼吸疾病国家重点实验室主任，国家卫健委高级别专家组组长，国家健康科普专家</div>
