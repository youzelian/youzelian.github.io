 <body>
  <h1>
 虞美人
 </h1>
 <h2>
 李煜
 </h2>
 <p>
 春花秋月何时了，
 </p>
 <p>
 往事知多少？
 </p>
 <p>
 小楼昨夜又东风，
 </p>
 <p>
 故国不堪回首月明中！
 </p>
 <p>
 雕阑玉砌应犹在，
 </p>
 <p>
 只是朱颜改。
 </p>
 <p>
 问君能有几多愁？
 </p>
 <p>
 恰似一江春水向东流。
 </p>
