<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>简易计算器</title>
    <style>
        body {
            text-align: center;
        }
        
        input {
            border: outset 2px solid;
            border-radius: 45px;
            width: 50px;
            height: 50px;
            font-size: 40px;
            text-align: center;
            margin: 10px;
            background-color: rgb(130, 115, 115);
            cursor: pointer;
        }
        
        input[value="请输入"] {
            width: 300px;
        }
        
        input[value="="] {
            width: 150px;
        }
        
        input:hover {
            background-color: rgb(190, 190, 190);
        }
        
        input:active {
            color: rgb(250, 250, 250);
            border: inset 2px solid;
        }
        
        input#output {
            display: block;
            width: 280px;
        }
    </style>
</head>

<body>
    <h1>简易计算器</h1>
    <div><input type="text" value="请输入"></div>
    <script>
        var sb = ['1', '2', '3', '+', '4', '5', '6', '-', '7', '8', '9', '*', '<—', '0', '.', '/', '='];
        for (var i = 0; i < sb.length / 4; i++) {
            var div = document.createElement('div');
            document.body.appendChild(div);
            for (var j = 0; j < 4; j++) {
                if (i * 4 + j < sb.length) {
                    var input = document.createElement('input');
                    input.type = "button";
                    input.value = sb[i * 4 + j];
                    div.appendChild(input);
                }
            }

        }
    </script>
</body>

</html>
