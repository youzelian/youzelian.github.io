    <title>Document</title>
    <style>
        div {
            height: 150px;
            width: 200px;
            border: 2px solid green;
            animation-direction: alternate;
            animation-duration: 8s;
            animation-delay: 0s;
            animation-iteration-count: infinite;
            animation-play-state: running;
            animation-name: move;
        }
        
        body {
            background-image: url(https://p5.ssl.qhimgs1.com/sdr/400__/t01d8d124f7ab13a435.png);
        }
        
        h1 {
            font-size: 45px;
        }
        
        h5 {
            font-size: 15px;
        }
        
        h3 {
            font-size: 40px;
        }
        
        h2 {
            font-size: 40px;
        }
        
        @keyframes move {
            0% {
                transform: translate(0px, 0px);
            }
            25% {
                transform: translate(1300px, 0px);
            }
            50% {
                transform: translate(1300px, 500px);
            }
            75% {
                transform: translate(0px, 500px);
            }
            100% {
                transform: translate(0px, 0px);
            }
        }
        
        div:hover {
            animation-play-state: paused;
        }
        
        input:hover {
            transform: translateY(5px);
        }
    </style>
</head>
