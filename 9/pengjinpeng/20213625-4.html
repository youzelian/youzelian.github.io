    <h1>青溪</h1>
     <a href="https://baike.baidu.com/item/%E7%8E%8B%E7%BB%B4/37558?fr=aladdin" title="点击了解详情" target="_back">王维</a>
    <p>
言入黄花川，每逐青溪水。</br>
随山将万转，趣途无百里。</br>
声喧乱石中，色静深松里。</br>
漾漾泛菱荇，澄澄映葭苇。</br>        
我心素已闲，清川澹如此。</br>
请留盘石上，垂钓将已矣。</br>
    </p>
