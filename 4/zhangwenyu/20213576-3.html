  <h1>
  唐诗三百首
  </h1>
  <p>
  《唐诗三百首》是一部流传很广的唐诗选集孙琴安《唐诗选本六百种提要·自序》指出，“唐诗选本经大量散佚，尚存三百余种。当中最流行而家传户晓的，要算《唐诗三百首》。”《唐诗三百首》选诗范围相当广泛，收录了77家诗，在数量上以(1)杜甫诗最多，有38首、(2)王维诗29首、(3)李白诗27首、(4)李商隐诗22首。
