 <h1 align="center">
 <font size="6" color="red">
 七夕
      ---不如吃茶去
 </font>
 </h1>
 <p>
 <font color="black">
 </p>
当日罗带轻分缘定今生<br>
时光一去如梭似你穿针<br>
魁星未拜<br>
禅门苔上屐痕<br>
到访三五痴心人<br>
夜幕垂鹊桥会<br>
七夕的念想<br>
皎月归我轻随<br>
烟火对影赏<br>
小城老街上<br>
有情人执手同徜徉<br>
夜幕垂鹊桥会<br>
七夕的念想<br>
你没归我独醉<br>
情话无人讲<br>
也就不用讲<br>
且把浓情化作诗两行<br>
