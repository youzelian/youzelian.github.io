 <h1>
 《庐州月》
 </h1>
  <p>
 <font color="green">
儿时凿壁偷了谁家的光<br>
宿昔不梳 一苦十年寒窗<br>
如今灯下闲读 红袖添香<br>
半生浮名只是虚妄<br>
三月 一路烟霞 莺飞草长<br>
柳絮纷飞里看见了故乡<br>
不知心上的你是否还在庐阳<br>
一缕青丝一生珍藏<br>
桥上的恋人入对出双<br>
桥边红药叹夜太漫长<br>
月也摇晃 人也彷徨<br>
乌蓬里传来了一曲离殇<br>
</p>
