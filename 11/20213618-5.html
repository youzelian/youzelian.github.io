 body{

  }
  h1{   color:LightSeaGreen;
        font-size:53px;
		text-shadow:2px 3px 4px green;
		text-align:"center"     }
  input{color:black;
       font-size:50px;
	   border-bottom-color:LightSlateGray;

 </head>
 <body  >
<img id='image1' src='https://tse4-mm.cn.bing.net/th/id/OIP-C.c8pLrvlbSADHZnDg2zuonwHaDG?w=336&h=146&c=7&r=0&o=5&dpr=1.25&pid=1.7'>
<button onclick="changeimg()">修改图标</button><br>
<input type="button" value="断章" onclick="bt1();">
<input type="button" value="关雎" onclick="bt2();">
 <h1>
 《雨后天》 林徽因      <br>
    我爱这雨后天，      <br>
    这平原的青草一片！  <br>
    我的心没底止的跟着风吹，<br>
	风吹：  <br>
    吹远了香草，落叶，吹远了一缕云，一象烟。<br>
 </h1>
<script>
     function bt1(){
	 var headline = document.querySelector("h1");
    headline.textContent = "《断章》 卞之琳 你站在桥上看风景， 看风景的人在楼上看你。明月装饰了你的窗子， 你装饰了别人的梦。" ;
   }
    function bt2(){
    var headline = document.querySelector("h1");
	headline.textContent = "关关雎鸠，在河之洲。窈窕淑女，君子好逑。参差荇菜，左右流之。窈窕淑女，寤寐求之。求之不得，寤寐思服。悠哉悠哉，辗转反侧。参差荇菜，左右采之。窈窕淑女，琴瑟友之。参差荇菜，左右芼之。窈窕淑女，钟鼓乐之。" ;
}
    function changeimg(){
	 document.getElementById("image1").src="https://tse1-mm.cn.bing.net/th/id/OIP-C.Ot37VdyBTCUmenGkv996XQHaEo?w=271&h=180&c=7&r=0&o=5&dpr=1.25&pid=1.7";
};
