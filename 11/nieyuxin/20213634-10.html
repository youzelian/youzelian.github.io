<html lang="en">
 <head>

  <style type="text/css">
    body{
		background:url(https://gimg2.baidu.com/image_search/src=http%3A%2F%2Fimg.pptjia.com%2Fimage%2F20181227%2F08c1ad4a692d8b5cdcfd5795d650584d.jpg&refer=http%3A%2F%2Fimg.pptjia.com&app=2002&size=f9999,10000&q=a80&n=0&g=0n&fmt=jpeg?sec=1649404976&t=4c4677a70aa11613fb5a944d093a2cde) no-repeat center top;
		background-size:cover;
		font-family:华文新魏;
		text-align: center;
		font-size:30px ;
	}
	h1#tsTitle{
		text-shadow: 1px 1px rgba(197, 223, 248,0.8),2px 2px rgba(197, 223, 248,0.8),3px 3px rgba(197, 223, 248,0.8),4px 4px rgba(197, 223, 248,0.8),5px 5px rgba(197, 223, 248,0.8);
	}
	p#tsContent{
		font-size: 2em;
		width: 12em ;
		margin: auto ;
	}
	div#box
		{
		border:2px solid ;
		border-radius:2em;
		padding-bottom:1.5em;
		background-color:rgba(250,250,250,0.6);
		margin:20px auto;
		width:800px;
		}	
    input{
		font-size: 1.5em;
		display:inline-block;
		with:100px;
		hight:80px;
		border-radius:5px;
		box-shadow:5px 5px red;
		margin:20px;
	}
   }
	</style>
	<script src="ts300.js">
	</script>
	</head>
 
	 <body>
	 <h1>唐诗三百首</h1>
	  <input type="button" value="上一首诗" id="prev">  
	  <input type="button" value="下一首诗" id="next">
	 <div id="box">
	   <h1 id="tsTitle"></h1>
	   <p id="tsContent"></p>
	 </div>
	 <script type="text/javascript"> 
		var BEGIN = 100 ;
		var END = 300 ;
		var tsArr = [] ;
		for (var i = BEGIN ; i <= END ; i++){
		   var pos1 = ts300.search(i)  ;
		   var pos2 = ts300.search(i + 1) ;
		   tsArr[i - BEGIN] = ts300.substring(pos1,pos2);
		}
		
		var tsTitle = [] ,
			tsContent = [] ;
		for (var i=0; i < tsArr.length; i++){
		 var sTmp = tsArr[i] ;
		  tsTitle[i] = sTmp.substring(3,sTmp.search("\n")) ; 
		  tsContent[i] = sTmp.substring(sTmp.search("\n"));
		}
	 
	  var i = 0 ;
	  var tsTitleDom = document.querySelector("h1#tsTitle") ;
	  var tsContentDom = document.querySelector("p#tsContent") ;
	  tsTitleDom.textContent = tsTitle[i] ;
	  tsContentDom.textContent = tsContent[i] ;
	  
	   document.querySelector("input#prev").onclick = function(){
		if (i >0 ){
			i-- ;
		}else{
			i = tsTitle.length -1 ;
		}
		 showTs(i);
	   } ;
	   document.querySelector("input#next").onclick = function(){
		if (i < tsTitle.length -1){
			i++ ;
		}else{
			i = 0 ;
		}
		  showTs(i);
	   } ;
	  function showTs(i){
	   var tsTitleDom = document.querySelector("h1#tsTitle") ;
	   var tsContentDom = document.querySelector("p#tsContent") ;
	   tsTitleDom.textContent = tsTitle[i] ;
	   tsContentDom.textContent = tsContent[i] ;
	  }
	 
	 </script>
	 </body>
	</html>
