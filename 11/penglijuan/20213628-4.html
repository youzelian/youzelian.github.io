 <body>
  <div id="box1">
	<p>
  	夏日南亭怀辛大<br>
	[孟浩然]<br>
	</p>
    山光忽西落，池月渐东上。<br>
    散发乘夜凉，开轩卧闲敞。<br>
    荷风送香气，竹露滴清响。<br>
    欲取鸣琴弹，恨无知音赏。<br>
    感此怀故人，中宵劳梦想。<br>
  </div> 
  <div id="box2">
	<p>
  	春泛若耶溪<br>
	  [綦毋潜]<br>
	</p>
    幽意无断绝，此去随所偶。<br>
    晚风吹行舟，花路入溪口。<br>
    际夜转西壑，隔山望南斗。<br>
    潭烟飞溶溶，林月低向后。<br>
    生事且弥漫，愿为持竿叟。<br>
  </div>
