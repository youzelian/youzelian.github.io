  <h1>
夏日南亭怀辛大
           
</h1>
<h2>

           孟浩然
</h2>
<p>
山光忽西落，池月渐东上。
散发乘夜凉，开轩卧闲敞。
荷风送香气，竹露滴清响。
欲取鸣琴弹，恨无知音赏。
感此怀故人，中宵劳梦想。
</p>
