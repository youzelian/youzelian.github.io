<!doctype html>
<html lang="en">
 <head>
  <meta charset="UTF-8">

  <title>Document</title>
  <style type="text/css">
	 body{ background:url(https://bpic.588ku.com/back_pic/06/00/61/525fbc7513952f7.jpg)no-repeat center top;
        text-align:center;
		background-repeat: no-repeat;
		background-size:cover;
		font-family:华文新魏;
	}
	h1#tsTitle{   color:gray;
        font-size:50px;
		text-shadow:3px 3px 4px black;
		   }
	p#tsContent {  color:gray;
       font-size:40px;
	   width:500px ;
	   margin:auto ;
	   line-height:55px;
	   font-family:华文新魏;
       }
  input {color:gray;
       font-size:30px;
	   border-bottom-color:LightSlateGray;
	   border-radius:2em;
	   with:100px;
	   hight:80px;
	   font-family:华文新魏;}
  </style>
  <script src="ts300.js">
  </script>
 </head>
 <body>
 <h1>唐诗三百首</h1>
  <input type="button" value="上一首" id="prev">  
  <input type="button" value="下一首" id="next">
 <div id="ts">
   <h1 id="tsTitle"></h1>
   <p id="tsContent"></p>
 </div>
 <script type="text/javascript">
 <!--
   
	var BEGIN = 100 ;
    var END = 300 ;
	var tsArr = [] ;
	for (var i = BEGIN ; i <= END ; i++){
	   var pos1 = ts300.search(i)  ;
	   var pos2 = ts300.search(i + 1) ;
       tsArr[i - BEGIN] = ts300.substring(pos1,pos2);
	}
	
	var tsTitle = [] ,
	    tsContent = [] ;
    for (var i=0; i < tsArr.length; i++){
     var sTmp = tsArr[i] ;
	  tsTitle[i] = sTmp.substring(3,sTmp.search("\n")) ; 
	  tsContent[i] = sTmp.substring(sTmp.search("\n"));
    }
 
  var i = 0 ;
  var tsTitleDom = document.querySelector("h1#tsTitle") ;
  var tsContentDom = document.querySelector("p#tsContent") ;
  tsTitleDom.textContent = tsTitle[i] ;
  tsContentDom.textContent = tsContent[i] ;
  
   document.querySelector("input#prev").onclick = function(){
    if (i >0 ){
		i-- ;
    }else{
	    i = tsTitle.length -1 ;
	}
     showTs(i);
   } ;
   document.querySelector("input#next").onclick = function(){
    if (i < tsTitle.length -1){
		i++ ;
    }else{
	    i = 0 ;
	}
      showTs(i);
   } ;
  function showTs(i){
   var tsTitleDom = document.querySelector("h1#tsTitle") ;
   var tsContentDom = document.querySelector("p#tsContent") ;
   tsTitleDom.textContent = tsTitle[i] ;
   tsContentDom.textContent = tsContent[i] ;
  }
 
 </script>
 </body>
</html>
