<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">

	body{
		background:url(https://gimg2.baidu.com/image_search/src=http%3A%2F%2Fimg.pptjia.com%2Fimage%2F20181227%2F08c1ad4a692d8b5cdcfd5795d650584d.jpg&refer=http%3A%2F%2Fimg.pptjia.com&app=2002&size=f9999,10000&q=a80&n=0&g=0n&fmt=jpeg?sec=1649404976&t=4c4677a70aa11613fb5a944d093a2cde) no-repeat center top;
		background-size:cover;
		text-align:center;
		font-family:华文新魏;
		font-size:40px;
	 }
	 
	h1{
		font-size:45px;
		color:black;
	
	}
	h2{
		font-size:50px;
		color:brown;
	}
	h3{
		font-size:50px;
		color:blue;
		
	}
	h4{
		font-size:50px;
		color:red;
		
	}
	input{
		font-size:50px;
		
	}
	</style>
</head>
<body>
	<br><br><br>
	<h1><mark>请<big>按顺序</big>点击一下古诗名称，浏览古诗内容吧。</mark></h1>
	<input-1 type="button" value="《行宫》">
	<h2>《行宫》</h2>
	<input-2 type="button" value="《相思》">
	<h3>《相思》</h3>
	<input-3 type="button" value="《竹里馆》">
	<h4>《竹里馆》</h4>
	<p><small>********************</small></p>
	<script>
	var p1 =document.querySelector("h2");
	var button =document.querySelector("input-1");
		button.onclick=function(){
		p1.textContent="寥落古行宫，宫花寂寞红。白头宫女在，闲坐说玄宗。";
		};
	var p2 =document.querySelector("h3");
	var button =document.querySelector("input-2");
		button.onclick=function(){
		p2.textContent="红豆生南国，春来发几枝。愿君多采撷，此物最相思。";
		};
	var p3 =document.querySelector("h4");
	var button =document.querySelector("input-3");
		button.onclick=function(){
		p3.textContent="独坐幽篁里，弹琴复长啸。深林人不知，明月来相照。";
		};
	</script>
</body>
</html>
