<!doctype html>
<html lang="en">
 <head>
  <meta charset="UTF-8">
  <style type="text/css">
  body{
  background:url(https://img.zcool.cn/community/01ae135940d16ba8012193a335cb7d.jpg@2o.jpg) no-repeat center top;
  background-size:cover;
  background-attachment:fixed;
  font-size:25px;  /*控制上下之的间距*/ 
  color:teal;     /*控制边框的颜色*/ 
  text-align:"center"
 }
div{                             /*可以起分割的作用，分开内容进行分段*/
	 width:600px;         /*控制边框的大小宽度*/   
	 border:2px solid ;
	 border-radius:6em;   /*控制边框的四个圆角的弧度*/
	 margin:1em auto ;
	 padding:2em;         /*控制边框的内边距*/
	 padding-bottom:4em;
	 text-align:center;
	 line-height:2em;      /*控制边框的行高 可以将字间的距离拉开*/
     }
.greenFont{color:green;
           background-color:gold; }
    .greyFont{color:grey}           /*可以控制各个段落的颜色*/
        .blueFont{color:navy}
		    .indigoFont{color:indigo;}
	#special{color:white;
	         background-color:black }
p{
     font-size:45px;
     text-align:center;
	 font-family:黑体;
	 font-style:仿宋;
     align="center"
    }
  h1
  {
     font-size:40px;
	 text-align:center;
     font-family:黑体;
     font-style:宋体;
     align="center"
	}
  </style>
</head>
<body>
 <div>    
   <h1 id="special" >
 《月下独酌四首·其一》<br>
   ——李白<br>
</h1>
<p class="greyFont"  >
花间一壶酒，独酌无相亲。<br>

举杯邀明月，对影成三人。<br>
</p>
<p class="greenFont"  >
月既不解饮，影徒随我身。<br>

暂伴月将影，行乐须及春。<br>
</p>
<p  class="blueFont" >
我歌月徘徊，我舞影零乱。<br>

醒时同交欢，醉后各分散。<br>

永结无情游，相期邈云汉。<br>
</p>
 </div> 
  <div >   
    <p text-align:center;>
  	《小巷》 /顾城
	</p>
    <p class="indigoFont" >
	小巷<br>
	又弯又长<br>
    没有门<br>
	没有锁<br>
	我拿把旧钥匙<br>
	敲着厚厚的墙<br>
    </p>
  </div>
 </body>
</html>
