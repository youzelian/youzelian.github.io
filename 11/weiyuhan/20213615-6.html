	<h1>王维：送别</h1>
	<p> 	
	下马饮君酒，问君何所之。君言不得意，归卧南山陲。但去莫复闻，白云无尽时。
	</p>
	<input id="prevBt" type="button" value="上一页">
	<input id="nextBt" type="button" value="下一页">
	<script>

	var songbie=[];
		songbie[0]="王维：送别";
		songbie[1]="下马饮君酒，问君何所之。";
		songbie[2]="君言不得意，归卧南山陲。";
		songbie[3]="但去莫复闻，白云无尽时。，";

	var xiju=[];
	xiju[0]="柳宗元：溪居";
	xiju[1]="久为簪组累，幸此南夷谪。";
	xiju[2]="闲依农圃邻，偶似山林客。";
	xiju[3]="晓耕翻露草，夜榜响溪石。";
	xiju[4]="来往不逢人，长歌楚天碧。";
	
	var youziyin=[];
	youziyin[0]="孟郊：游子吟";
	youziyin[1]="慈母手中线，游子身上衣。";
	youziyin[2]="临行密密缝，意恐迟迟归。";
	youziyin[3]="谁言寸草心，报得三春辉？";
	
	var title =document.querySelector("h1");
	var content =document.querySelector("p");
	var prevBt = document.getElementById("prevBt");
	var nextBt = document.getElementById("nextBt");
	
	title.textContent = songbie[0];
	content.textContent = songbie[1]+songbie[2]+songbie[3];
	title.textContent =youziyin[0];
	
	prevBt.onclick = function(){
	content.textContent=youziyin[1]+youziyin[2]+youziyin[3]+youziyin[4];
	title.textContent =youziyin[0];
	}
	
	nextBt.onclick = function(){
	content.textContent=xiju[1]+xiju[2]+xiju[3];
	title.textContent =xiju[0];
	}
	</script>
